<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Client | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="portailClientPage()" x-init="init()">

<!-- Token Invalid View -->
<template x-if="!tokenValid">
  <div class="min-h-screen bg-slate-50 flex items-center justify-center">
    <div class="text-center max-w-md px-6">
      <div class="w-20 h-20 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-key text-sky-500 text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 mb-2">Token invalide</h1>
      <p class="text-slate-500 mb-6">Le lien d'accès a expiré ou n'est pas valide. Veuillez contacter votre fournisseur pour recevoir un nouveau lien.</p>
      <a href="./login.html" class="inline-flex items-center gap-2 px-6 py-3 bg-sky-500 hover:bg-sky-600 text-white rounded-lg font-medium">
        <i class="fas fa-sign-in-alt"></i>
        Se connecter
      </a>
    </div>
  </div>
</template>

<!-- Main Portail (when token valid) -->
<template x-if="tokenValid">
  <div class="min-h-screen bg-slate-50 flex">
    
    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen">
      <!-- Header Sidebar -->
      <div class="h-16 flex items-center px-6 border-b border-slate-100">
        <h1 class="text-lg font-semibold text-slate-800" x-text="client?.nom"></h1>
      </div>
      
      <!-- Navigation -->
      <nav class="flex-1 p-4 space-y-1">
        <button 
          @click="activeTab = 'factures'"
          :class="activeTab === 'factures' ? 'bg-sky-50 text-sky-700 border-r-2 border-sky-500' : 'text-slate-600 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all"
        >
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
               :class="activeTab === 'factures' ? 'bg-sky-100 text-sky-600' : 'bg-slate-100 text-slate-500'">
            <i class="fas fa-file-invoice"></i>
          </div>
          <div class="text-left">
            <p>Mes factures</p>
            <p class="text-xs opacity-70" x-text="stats.totalFactures + ' factures'"></p>
          </div>
        </button>
        
        <button 
          @click="activeTab = 'apporteur'"
          :class="activeTab === 'apporteur' ? 'bg-sky-50 text-sky-700 border-r-2 border-sky-500' : 'text-slate-600 hover:bg-slate-50'"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all"
        >
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
               :class="activeTab === 'apporteur' ? 'bg-sky-100 text-sky-600' : 'bg-slate-100 text-slate-500'">
            <i class="fas fa-handshake"></i>
          </div>
          <div class="text-left">
            <p>Apporteur</p>
            <p class="text-xs opacity-70">Factures en attente</p>
          </div>
        </button>
      </nav>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      
      <!-- Header -->
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900" x-text="getTabTitle()"></h2>
        <p class="text-slate-500 mt-1" x-text="getTabDescription()"></p>
      </div>
      
      <!-- Stats Cards (visible on factures tab) -->
      <div x-show="activeTab === 'factures'" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white rounded-xl border border-slate-200 p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-sky-100 flex items-center justify-center text-sky-600">
            <i class="fas fa-file-invoice text-xl"></i>
          </div>
          <div>
            <p class="text-2xl font-bold text-slate-900" x-text="stats.totalFactures"></p>
            <p class="text-sm text-slate-500">Factures totales</p>
          </div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center text-amber-600">
            <i class="fas fa-clock text-xl"></i>
          </div>
          <div>
            <p class="text-2xl font-bold text-slate-900" x-text="formatMoney(stats.totalImpayes)"></p>
            <p class="text-sm text-slate-500">En attente de paiement</p>
          </div>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-5 flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-sky-100 flex items-center justify-center text-sky-600">
            <i class="fas fa-check-circle text-xl"></i>
          </div>
          <div>
            <p class="text-2xl font-bold text-slate-900" x-text="getPaidCount()"></p>
            <p class="text-sm text-slate-500">Factures payées</p>
          </div>
        </div>
      </div>
      
      <!-- Factures Tab - Vue en cartes -->
      <template x-if="activeTab === 'factures'">
        <div class="space-y-4">
          <template x-for="facture in clientFactures" :key="facture.id">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 hover:shadow-md transition-shadow">
              <div class="flex items-start justify-between">
                <div class="flex-1">
                  <div class="flex items-center gap-3 mb-2">
                    <span class="font-semibold text-slate-900 text-lg" x-text="facture.numero"></span>
                    <span class="px-2.5 py-1 text-xs font-medium rounded-full"
                      :class="facture.statut === 'payee' ? 'bg-sky-100 text-sky-700' : 'bg-amber-100 text-amber-700'"
                      x-text="facture.statut === 'payee' ? 'Payée' : 'En attente'">
                    </span>
                  </div>
                  <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm text-slate-600">
                    <span class="flex items-center gap-2">
                      <i class="fas fa-folder text-slate-400"></i>
                      <span x-text="facture.numeroDossier || 'Pas de dossier'"></span>
                    </span>
                    <span class="flex items-center gap-2">
                      <i class="fas fa-calendar text-slate-400"></i>
                      <span x-text="facture.date + ' → ' + facture.echeance"></span>
                    </span>
                    <span class="flex items-center gap-2" :class="facture.joursDepuisEcheance > 0 ? 'text-amber-600 font-medium' : ''">
                      <i class="fas fa-clock text-slate-400"></i>
                      <span x-text="facture.joursDepuisEcheance > 0 ? facture.joursDepuisEcheance + ' jours de retard' : 'Dans ' + Math.abs(facture.joursDepuisEcheance) + ' jours'"></span>
                    </span>
                  </div>
                  <div class="mt-3 flex flex-wrap gap-2">
                    <template x-for="mission in facture.missions" :key="mission">
                      <span class="px-2 py-1 text-xs bg-slate-100 text-slate-600 rounded" x-text="mission"></span>
                    </template>
                  </div>
                  <p class="mt-3 text-sm text-slate-500 flex items-center gap-2">
                    <i class="fas fa-map-marker-alt text-slate-400"></i>
                    <span x-text="facture.adresseBien || 'Adresse non renseignée'"></span>
                  </p>
                </div>
                <div class="text-right ml-6">
                  <p class="text-2xl font-bold text-slate-900" x-text="formatMoney(facture.montant)"></p>
                  <div class="mt-3 flex items-center gap-2">
                    <button @click="reglerFacture(facture)" x-show="facture.statut !== 'payee'" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white text-sm rounded-lg font-medium">
                      Payer
                    </button>
                    <button @click="downloadFacture(facture)" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg" title="Télécharger">
                      <i class="fas fa-download"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>
      
      <!-- Apporteur Tab -->
      <template x-if="activeTab === 'apporteur'">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
            <p class="text-slate-600">Factures pour lesquelles vous êtes apporteur d'affaires</p>
          </div>
          <div class="divide-y divide-slate-100">
            <template x-for="facture in facturesApporteur" :key="facture.id">
              <div class="p-6 flex items-center justify-between hover:bg-slate-50/50">
                <div>
                  <p class="font-medium text-slate-900" x-text="facture.clientFinal"></p>
                  <p class="text-sm text-slate-500" x-text="facture.numero + ' · ' + facture.date"></p>
                </div>
                <div class="text-right">
                  <p class="font-semibold text-slate-900" x-text="formatMoney(facture.montant)"></p>
                  <span class="px-2 py-1 text-xs font-medium rounded-full mt-1 inline-block"
                    :class="facture.statut === 'payee' ? 'bg-sky-100 text-sky-700' : 'bg-amber-100 text-amber-700'"
                    x-text="facture.statut === 'payee' ? 'Payée' : 'En attente'">
                  </span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

    </main>
  </div>
</template>

<script>
function portailClientPage() {
  return {
    toast: { show: false, type: 'success', title: '', message: '' },
    tokenValid: true,
    activeTab: 'factures',
    
    client: {
      id: 1,
      nom: 'ACME Corp',
      email: 'contact@acme.fr'
    },
    
    stats: {
      totalFactures: 12,
      totalImpayes: 45230,
    },
    
    clientFactures: [
      { id: 1, numero: 'FAC-2024-001', numeroDossier: 'D-2024-045', missions: ['Diag amiante', 'DPE'], date: '15/01/2024', echeance: '15/02/2024', joursDepuisEcheance: 45, adresseBien: '12 Rue de la Paix, 75002 Paris', dateIntervention: '10/01/2024', montant: 12500, statut: 'impayee' },
      { id: 2, numero: 'FAC-2024-015', numeroDossier: 'D-2024-078', missions: ['Audit énergétique'], date: '10/02/2024', echeance: '10/03/2024', joursDepuisEcheance: 15, adresseBien: '25 Avenue Victor Hugo, 75016 Paris', dateIntervention: '05/02/2024', montant: 8900, statut: 'impayee' },
      { id: 3, numero: 'FAC-2024-023', numeroDossier: 'D-2024-089', missions: ['Termites', 'DPE'], date: '05/03/2024', echeance: '05/04/2024', joursDepuisEcheance: -15, adresseBien: '8 Boulevard Haussmann, 75009 Paris', dateIntervention: '01/03/2024', montant: 12300, statut: 'impayee' },
      { id: 4, numero: 'FAC-2023-089', numeroDossier: 'D-2023-156', missions: ['Diagnostic complet'], date: '20/11/2023', echeance: '20/12/2023', joursDepuisEcheance: 120, adresseBien: '42 Rue de Rivoli, 75001 Paris', dateIntervention: '15/11/2023', montant: 9500, statut: 'payee' },
    ],
    
    facturesApporteur: [
      { id: 5, clientFinal: 'Startup XYZ', numero: 'FAC-2024-050', date: '01/03/2024', montant: 15000, statut: 'payee' },
      { id: 6, clientFinal: 'BuildPlus SA', numero: 'FAC-2024-055', date: '10/03/2024', montant: 22000, statut: 'impayee' },
    ],
    
    init() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (window.location.search.includes('invalid=true') || !token) {
        if (window.location.search.includes('invalid=true')) {
          this.tokenValid = false;
        }
      }
    },
    
    getTabTitle() {
      const titles = {
        'factures': 'Mes factures',
        'apporteur': 'Apporteur d\'affaires'
      };
      return titles[this.activeTab] || '';
    },
    
    getTabDescription() {
      const descriptions = {
        'factures': 'Gérez vos factures et effectuez vos paiements',
        'apporteur': 'Suivez les factures où vous êtes apporteur'
      };
      return descriptions[this.activeTab] || '';
    },
    
    getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    },
    
    getPaidCount() {
      return this.clientFactures.filter(f => f.statut === 'payee').length;
    },
    
    reglerFacture(facture) {
      this.showToast('Info', 'Redirection vers la page de paiement pour ' + facture.numero, 'success');
    },
    
    downloadFacture(facture) {
      this.showToast('Info', 'Téléchargement facture ' + facture.numero, 'success');
    },
    
    formatMoney(amount) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
    },
    
    showToast(title, message, type = 'success') {
      this.toast = { show: true, title, message, type };
      setTimeout(() => this.toast.show = false, 3000);
    }
  }
}
</script>


    <!-- Toast Notification -->
    <div x-show="toast.show" x-transition class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50">
      <i :class="toast.type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'" class="fas"></i>
      <div>
        <p class="font-medium text-sm" x-text="toast.title"></p>
        <p class="text-xs text-slate-300" x-text="toast.message"></p>
      </div>
    </div>
</body>
</html>
