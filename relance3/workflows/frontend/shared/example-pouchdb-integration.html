<!--
  Exemple d'intégration PouchDB/CouchDB avec Alpine.js
  
  Ce fichier montre comment utiliser le workflow PouchDB dans un mockup:
  - Réplication bidirectionnelle live
  - Chargement depuis PouchDB local
  - Indicateurs de synchronisation
  - Gestion offline/online
-->

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemple PouchDB Integration</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PouchDB -->
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.find.min.js"></script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  
  <!-- ============================================ -->
  <!-- APP PRINCIPALE -->
  <!-- ============================================ -->
  <div x-data="appManager()" x-init="init()" class="min-h-screen">
    
    <!-- Header avec indicateur de sync -->
    <header class="bg-white shadow-sm border-b">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
          <h1 class="text-2xl font-bold text-gray-800">
            Gestion des Items (PouchDB)
          </h1>
          
          <!-- Indicateur de synchronisation -->
          <div class="flex items-center space-x-3">
            <!-- Status indicator -->
            <div class="flex items-center space-x-2 bg-gray-50 px-3 py-2 rounded-lg">
              <span 
                class="w-3 h-3 rounded-full transition-all duration-300"
                :class="{
                  'bg-green-500': syncStatus === 'complete',
                  'bg-blue-500 animate-pulse': syncStatus === 'syncing',
                  'bg-yellow-500': syncStatus === 'paused' && isOnline,
                  'bg-orange-500': !isOnline,
                  'bg-red-500': syncStatus === 'error'
                }"
              ></span>
              <span class="text-sm text-gray-600" x-text="syncStatusLabel"></span>
            </div>
            
            <!-- Pending changes badge -->
            <span 
              x-show="pendingChanges > 0"
              class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded-full"
              x-text="pendingChanges + ' en attente'"
            ></span>
            
            <!-- Last sync time -->
            <span 
              x-show="lastSync"
              class="text-xs text-gray-400"
              x-text="'Dernière sync: ' + formatTime(lastSync)"
            ></span>
            
            <!-- Force sync button -->
            <button 
              @click="forceSync()"
              :disabled="syncStatus === 'syncing' || !isOnline"
              class="text-sm bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 text-white px-3 py-1 rounded transition-colors"
            >
              <span x-show="syncStatus !== 'syncing'">Sync</span>
              <span x-show="syncStatus === 'syncing'">...</span>
            </button>
          </div>
        </div>
        
        <!-- Alertes de conflits -->
        <div x-show="conflicts.length > 0" class="mt-3 bg-red-50 border border-red-200 rounded-lg p-3">
          <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
              <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <span class="text-red-700 text-sm font-medium">
                <span x-text="conflicts.length"></span> conflit(s) détecté(s)
              </span>
            </div>
            <button 
              @click="resolveAllConflicts()"
              class="text-sm text-red-600 hover:text-red-800 font-medium"
            >
              Résoudre tous
            </button>
          </div>
        </div>
        
        <!-- Offline warning -->
        <div x-show="!isOnline" class="mt-3 bg-orange-50 border border-orange-200 rounded-lg p-3">
          <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.138m2.167 9.138l-2.829 2.829M21 21l-2.829-2.829"/>
            </svg>
            <span class="text-orange-700 text-sm">
              Mode hors ligne. Les modifications seront synchronisées dès que la connexion sera rétablie.
            </span>
          </div>
        </div>
      </div>
    </header>
    
    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
      
      <!-- Loading state -->
      <div x-show="loading" class="flex items-center justify-center py-12">
        <div class="text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
          <p class="mt-4 text-gray-600">Chargement depuis PouchDB...</p>
        </div>
      </div>
      
      <!-- Error state -->
      <div x-show="error" x-cloak class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
        <div class="flex items-center space-x-2">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          <span class="text-red-700" x-text="error"></span>
        </div>
        <button 
          @click="retryLoad()"
          class="mt-2 text-sm text-red-600 hover:text-red-800 underline"
        >
          Réessayer
        </button>
      </div>
      
      <!-- Content -->
      <div x-show="!loading && !error" x-cloak>
        
        <!-- Stats cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Total items</div>
            <div class="text-2xl font-bold text-gray-800" x-text="stats.total"></div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Actifs</div>
            <div class="text-2xl font-bold text-green-600" x-text="stats.actif"></div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Inactifs</div>
            <div class="text-2xl font-bold text-gray-600" x-text="stats.inactif"></div>
          </div>
          <div class="bg-white rounded-lg shadow p-4">
            <div class="text-sm text-gray-500">Documents</div>
            <div class="text-2xl font-bold text-blue-600" x-text="docCount"></div>
          </div>
        </div>
        
        <!-- Actions toolbar -->
        <div class="bg-white rounded-lg shadow mb-6 p-4">
          <div class="flex flex-wrap items-center justify-between gap-4">
            
            <!-- Search -->
            <div class="flex-1 min-w-[200px]">
              <input 
                type="text"
                x-model="searchQuery"
                @input.debounce.300ms="applyFilters()"
                placeholder="Rechercher..."
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              >
            </div>
            
            <!-- Filter status -->
            <select 
              x-model="filterStatus"
              @change="applyFilters()"
              class="border border-gray-300 rounded-lg px-4 py-2"
            >
              <option value="all">Tous les statuts</option>
              <option value="actif">Actif</option>
              <option value="inactif">Inactif</option>
            </select>
            
            <!-- Create button -->
            <button 
              @click="openCreateModal()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center space-x-2"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              <span>Nouveau</span>
            </button>
          </div>
        </div>
        
        <!-- Items table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Statut</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Créé le</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
              <template x-for="item in paginatedItems" :key="item._id">
                <tr class="hover:bg-gray-50">
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="item._id.slice(-8)"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="item.nom"></td>
                  <td class="px-6 py-4 whitespace-nowrap">
                    <span 
                      class="px-2 py-1 text-xs rounded-full"
                      :class="{
                        'bg-green-100 text-green-800': item.status === 'actif',
                        'bg-gray-100 text-gray-800': item.status === 'inactif'
                      }"
                      x-text="item.status"
                    ></span>
                  </td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(item.createdAt)"></td>
                  <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <div class="flex space-x-2">
                      <button 
                        @click="editItem(item)"
                        class="text-blue-600 hover:text-blue-800"
                      >
                        Modifier
                      </button>
                      <button 
                        @click="deleteItem(item._id)"
                        class="text-red-600 hover:text-red-800"
                      >
                        Supprimer
                      </button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          
          <!-- Empty state -->
          <div x-show="filteredItems.length === 0" class="text-center py-12">
            <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <p class="text-gray-500">Aucun item trouvé</p>
          </div>
          
          <!-- Pagination -->
          <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
            <div class="text-sm text-gray-500">
              <span x-text="filteredItems.length"></span> items • Page <span x-text="currentPage"></span> / <span x-text="totalPages"></span>
            </div>
            <div class="flex space-x-2">
              <button 
                @click="prevPage()"
                :disabled="currentPage === 1"
                class="px-3 py-1 border rounded hover:bg-gray-50 disabled:opacity-50"
              >
                Précédent
              </button>
              <button 
                @click="nextPage()"
                :disabled="currentPage >= totalPages"
                class="px-3 py-1 border rounded hover:bg-gray-50 disabled:opacity-50"
              >
                Suivant
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    
    <!-- Create/Edit Modal -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto">
      <div class="flex items-center justify-center min-h-screen px-4">
        <!-- Backdrop -->
        <div 
          x-show="showModal"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          @click="closeModal()"
          class="fixed inset-0 bg-black bg-opacity-50"
        ></div>
        
        <!-- Modal -->
        <div 
          x-show="showModal"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-100 scale-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100 scale-100"
          x-transition:leave-end="opacity-0 scale-95"
          class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6"
        >
          <h2 class="text-xl font-bold mb-4" x-text="isEditing ? 'Modifier' : 'Nouveau'"></h2>
          
          <form @submit.prevent="saveItem()">
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
              <input 
                type="text"
                x-model="currentItem.nom"
                required
                class="w-full border border-gray-300 rounded-lg px-3 py-2"
              >
            </div>
            
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Statut</label>
              <select 
                x-model="currentItem.status"
                class="w-full border border-gray-300 rounded-lg px-3 py-2"
              >
                <option value="actif">Actif</option>
                <option value="inactif">Inactif</option>
              </select>
            </div>
            
            <div class="mb-4">
              <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
              <textarea 
                x-model="currentItem.description"
                rows="3"
                class="w-full border border-gray-300 rounded-lg px-3 py-2"
              ></textarea>
            </div>
            
            <div class="flex justify-end space-x-3">
              <button 
                type="button"
                @click="closeModal()"
                class="px-4 py-2 border rounded-lg hover:bg-gray-50"
              >
                Annuler
              </button>
              <button 
                type="submit"
                :disabled="saving"
                class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 disabled:opacity-50"
              >
                <span x-show="!saving" x-text="isEditing ? 'Mettre à jour' : 'Créer'"></span>
                <span x-show="saving">Sauvegarde...</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    
  </div>
  
  <!-- ============================================ -->
  <!-- WORKFLOW POUCHDB -->
  <!-- ============================================ -->
  <script>
    function appManager() {
      return {
        // Configuration
        COUCHDB_URL: 'https://admin:admin@dev.markidiags.com/data',
        DB_NAME: 'marki_demo_items',
        
        // Données
        items: [],
        filteredItems: [],
        currentItem: { nom: '', status: 'actif', description: '' },
        
        // Sync state
        syncStatus: 'initial',
        isOnline: navigator.onLine,
        lastSync: null,
        pendingChanges: 0,
        conflicts: [],
        
        // UI state
        loading: true,
        saving: false,
        error: null,
        showModal: false,
        isEditing: false,
        editingId: null,
        
        // Filters
        searchQuery: '',
        filterStatus: 'all',
        currentPage: 1,
        pageSize: 10,
        totalPages: 1,
        
        // Stats
        stats: { total: 0, actif: 0, inactif: 0 },
        docCount: 0,
        
        // PouchDB instances
        localDB: null,
        remoteDB: null,
        syncHandler: null,
        
        // ========================================
        // INITIALISATION
        // ========================================
        async init() {
          this.loading = true;
          
          try {
            // Initialize PouchDB
            this.localDB = new PouchDB(this.DB_NAME);
            this.remoteDB = new PouchDB(`${this.COUCHDB_URL}/${this.DB_NAME}`, { skip_setup: true });
            
            // Setup design docs
            await this.ensureDesignDocs();
            
            // Setup replication
            await this.setupReplication();
            
            // Load data
            await this.loadItems();
            
            // Setup network listeners
            this.setupNetworkListeners();
            
            this.loading = false;
            
          } catch (err) {
            console.error('Init error:', err);
            this.error = err.message;
            this.loading = false;
          }
        },
        
        async ensureDesignDocs() {
          const designDocs = [
            {
              _id: '_design/items',
              views: {
                all: {
                  map: function(doc) { if (doc.type === 'item') emit(doc._id, doc); }.toString()
                },
                by_status: {
                  map: function(doc) { if (doc.type === 'item' && doc.status) emit(doc.status, doc); }.toString()
                }
              }
            }
          ];
          
          for (const doc of designDocs) {
            try {
              const existing = await this.localDB.get(doc._id);
              if (JSON.stringify(existing.views) !== JSON.stringify(doc.views)) {
                await this.localDB.put({ ...doc, _rev: existing._rev });
              }
            } catch (err) {
              if (err.status === 404) {
                await this.localDB.put(doc);
              }
            }
          }
        },
        
        async setupReplication() {
          this.syncHandler = this.localDB.sync(this.remoteDB, {
            live: true,
            retry: true,
            heartbeat: 10000
          })
          .on('change', (info) => {
            this.pendingChanges = info.change?.pending || 0;
            if (info.direction === 'pull') {
              this.loadItems();
            }
          })
          .on('paused', (err) => {
            this.syncStatus = err ? 'error' : 'paused';
            this.lastSync = new Date().toISOString();
          })
          .on('active', () => {
            this.syncStatus = 'syncing';
            this.isOnline = true;
          })
          .on('error', (err) => {
            console.error('Sync error:', err);
            this.syncStatus = 'error';
            this.isOnline = false;
          });
        },
        
        // ========================================
        // DATA OPERATIONS
        // ========================================
        async loadItems() {
          try {
            const result = await this.localDB.allDocs({ include_docs: true, conflicts: true });
            
            this.items = result.rows
              .filter(r => r.doc.type === 'item')
              .map(r => ({
                ...r.doc,
                id: r.doc._id
              }));
            
            // Detect conflicts
            this.conflicts = result.rows
              .filter(r => r.doc._conflicts?.length > 0)
              .map(r => ({ id: r.doc._id, conflictRevs: r.doc._conflicts }));
            
            // Get doc count
            const info = await this.localDB.info();
            this.docCount = info.doc_count;
            
            this.calculateStats();
            this.applyFilters();
            
          } catch (err) {
            console.error('Load error:', err);
            this.error = err.message;
          }
        },
        
        calculateStats() {
          this.stats = {
            total: this.items.length,
            actif: this.items.filter(i => i.status === 'actif').length,
            inactif: this.items.filter(i => i.status === 'inactif').length
          };
        },
        
        async saveItem() {
          this.saving = true;
          
          try {
            if (this.isEditing) {
              // Update
              const doc = await this.localDB.get(this.editingId);
              await this.localDB.put({
                ...doc,
                ...this.currentItem,
                updatedAt: new Date().toISOString()
              });
            } else {
              // Create
              const id = `item_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
              await this.localDB.put({
                _id: id,
                type: 'item',
                ...this.currentItem,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
              });
            }
            
            await this.loadItems();
            this.closeModal();
            
          } catch (err) {
            console.error('Save error:', err);
            this.error = err.message;
          }
          
          this.saving = false;
        },
        
        async deleteItem(id) {
          if (!confirm('Êtes-vous sûr de vouloir supprimer cet item ?')) return;
          
          try {
            const doc = await this.localDB.get(id);
            await this.localDB.remove(doc);
            await this.loadItems();
          } catch (err) {
            console.error('Delete error:', err);
            this.error = err.message;
          }
        },
        
        // ========================================
        // FILTERS & PAGINATION
        // ========================================
        applyFilters() {
          let filtered = [...this.items];
          
          if (this.filterStatus !== 'all') {
            filtered = filtered.filter(i => i.status === this.filterStatus);
          }
          
          if (this.searchQuery) {
            const query = this.searchQuery.toLowerCase();
            filtered = filtered.filter(i => 
              (i.nom && i.nom.toLowerCase().includes(query)) ||
              (i.description && i.description.toLowerCase().includes(query))
            );
          }
          
          this.filteredItems = filtered;
          this.totalPages = Math.max(1, Math.ceil(filtered.length / this.pageSize));
          
          if (this.currentPage > this.totalPages) {
            this.currentPage = this.totalPages;
          }
        },
        
        get paginatedItems() {
          const start = (this.currentPage - 1) * this.pageSize;
          return this.filteredItems.slice(start, start + this.pageSize);
        },
        
        prevPage() {
          if (this.currentPage > 1) this.currentPage--;
        },
        
        nextPage() {
          if (this.currentPage < this.totalPages) this.currentPage++;
        },
        
        // ========================================
        // MODAL
        // ========================================
        openCreateModal() {
          this.isEditing = false;
          this.editingId = null;
          this.currentItem = { nom: '', status: 'actif', description: '' };
          this.showModal = true;
        },
        
        editItem(item) {
          this.isEditing = true;
          this.editingId = item._id;
          this.currentItem = {
            nom: item.nom,
            status: item.status,
            description: item.description
          };
          this.showModal = true;
        },
        
        closeModal() {
          this.showModal = false;
        },
        
        // ========================================
        // SYNC
        // ========================================
        async forceSync() {
          this.syncStatus = 'syncing';
          
          try {
            await this.localDB.replicate.to(this.remoteDB);
            await this.localDB.replicate.from(this.remoteDB);
            await this.loadItems();
            this.syncStatus = 'complete';
            this.lastSync = new Date().toISOString();
          } catch (err) {
            console.error('Force sync error:', err);
            this.syncStatus = 'error';
          }
        },
        
        async resolveAllConflicts() {
          for (const conflict of this.conflicts) {
            try {
              const doc = await this.localDB.get(conflict.id, { conflicts: true });
              for (const rev of doc._conflicts || []) {
                await this.localDB.remove(conflict.id, rev);
              }
            } catch (err) {
              console.error('Conflict resolution error:', err);
            }
          }
          await this.loadItems();
        },
        
        setupNetworkListeners() {
          window.addEventListener('online', () => {
            this.isOnline = true;
            this.forceSync();
          });
          
          window.addEventListener('offline', () => {
            this.isOnline = false;
          });
        },
        
        retryLoad() {
          this.error = null;
          this.init();
        },
        
        // ========================================
        // UTILITIES
        // ========================================
        formatDate(dateString) {
          if (!dateString) return '-';
          return new Date(dateString).toLocaleDateString('fr-FR');
        },
        
        formatTime(dateString) {
          if (!dateString) return '';
          return new Date(dateString).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        },
        
        get syncStatusLabel() {
          if (!this.isOnline) return 'Hors ligne';
          const labels = {
            syncing: 'Synchronisation...',
            paused: 'À jour',
            error: 'Erreur',
            complete: 'Synchronisé'
          };
          return labels[this.syncStatus] || '...';
        }
      };
    }
  </script>
  
</body>
</html>
