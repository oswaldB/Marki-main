<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('evenements', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            loading: true,
            error: null,
            
            events: [],
            filterRead: '',
            
            get filteredEvents() {
                if (this.filterRead === '') return this.events;
                return this.events.filter(e => e.lu.toString() === this.filterRead);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('fr-FR', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'evenements/workflows/initial-load.html' %},
            {% include 'evenements/workflows/mark-as-read.html' %},
            {% include 'evenements/workflows/mark-all-read.html' %},
            
            // =====================================================
            // 3. INIT
            // =====================================================
            {% include 'evenements/workflows/workflow-init.html' %}
        }));
    });
</script>
