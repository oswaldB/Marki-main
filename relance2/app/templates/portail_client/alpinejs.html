<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('portailClient', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            activeTab: 'factures',
            
            // Data
            contact: null,
            factures: [],
            impayes: [],
            
            // Getters calculés
            get totalDu() {
                return this.impayes.reduce((sum, i) => sum + (i.reste_a_payer || 0), 0);
            },
            
            // Helpers
            formatMoney(amount) {
                return new Intl.NumberFormat('fr-FR', { 
                    style: 'currency', 
                    currency: 'EUR',
                    minimumFractionDigits: 2
                }).format(amount || 0);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return new Intl.DateTimeFormat('fr-FR', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric'
                }).format(date);
            },
            
            getContactTokenFromUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('token');
            },
            
            // =====================================================
            // 2. INIT (EN PREMIER)
            // =====================================================
            {% include 'portail_client/workflows/workflow-init.html' %},
            
            // =====================================================
            // 3. WORKFLOWS
            // =====================================================
            {% include 'portail_client/workflows/initial-load.html' %},
            {% include 'portail_client/workflows/switch-tab-factures.html' %},
            {% include 'portail_client/workflows/switch-tab-apporteur.html' %},
            {% include 'portail_client/workflows/regler-facture.html' %},
            {% include 'portail_client/workflows/download-facture.html' %}
        }));
    });
</script>
