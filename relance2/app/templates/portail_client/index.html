<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Client - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div x-data="portailClient" x-init="init()" x-cloak>
        
        <!-- Header -->
        <header class="bg-white border-b border-slate-200">
            <div class="max-w-6xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-sky-500 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg">M</span>
                        </div>
                        <div>
                            <h1 class="font-semibold text-slate-900">Portail Client</h1>
                            <p class="text-sm text-slate-500" x-text="contact?.nom + ' ' + contact?.prenom"></p>
                        </div>
                    </div>
                    <button @click="logout()" class="text-slate-500 hover:text-slate-700">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-6 py-8">
            
            <!-- Loading -->
            <div x-show="loading" class="flex items-center justify-center py-12">
                <i class="fas fa-circle-notch fa-spin text-2xl text-sky-500"></i>
            </div>
            
            <!-- Content -->
            <div x-show="!loading" class="space-y-6">
                
                <!-- Stats -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white rounded-xl border border-slate-200 p-6 text-center">
                        <div class="text-3xl font-bold text-sky-600" x-text="impayes.length"></div>
                        <div class="text-sm text-slate-500 mt-1">Factures impayées</div>
                    </div>
                    <div class="bg-white rounded-xl border border-slate-200 p-6 text-center">
                        <div class="text-3xl font-bold text-amber-600" x-text="formatMoney(totalDu)"></div>
                        <div class="text-sm text-slate-500 mt-1">Total dû</div>
                    </div>
                    <div class="bg-white rounded-xl border border-slate-200 p-6 text-center">
                        <div class="text-3xl font-bold text-emerald-600" x-text="factures.length"></div>
                        <div class="text-sm text-slate-500 mt-1">Factures payées</div>
                    </div>
                </div>
                
                <!-- Tabs -->
                <div class="bg-white rounded-xl border border-slate-200">
                    <div class="border-b border-slate-200">
                        <div class="flex">
                            <button @click="switchTabFactures()" 
                                    :class="activeTab === 'factures' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-500'"
                                    class="px-6 py-4 font-medium text-sm">
                                Mes Factures
                            </button>
                            <button @click="switchTabApporteur()" 
                                    :class="activeTab === 'apporteur' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-500'"
                                    class="px-6 py-4 font-medium text-sm">
                                Mon Compte
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <!-- Factures Tab -->
                        <div x-show="activeTab === 'factures'" class="space-y-4">
                            <template x-for="impaye in impayes" :key="impaye.id">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg">
                                    <div>
                                        <div class="font-medium text-slate-900" x-text="impaye.nfacture"></div>
                                        <div class="text-sm text-slate-500" x-text="formatDate(impaye.date_echeance)"></div>
                                    </div>
                                    <div class="text-right">
                                        <div class="font-bold text-slate-900" x-text="formatMoney(impaye.reste_a_payer)"></div>
                                        <button @click="reglerFacture(impaye)" 
                                                class="mt-1 px-4 py-1 bg-sky-500 text-white text-sm rounded-lg hover:bg-sky-600">
                                            Payer
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        
                        <!-- Apporteur Tab -->
                        <div x-show="activeTab === 'apporteur'" class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm text-slate-500">Nom</label>
                                    <div class="font-medium" x-text="contact?.nom"></div>
                                </div>
                                <div>
                                    <label class="text-sm text-slate-500">Prénom</label>
                                    <div class="font-medium" x-text="contact?.prenom"></div>
                                </div>
                                <div>
                                    <label class="text-sm text-slate-500">Email</label>
                                    <div class="font-medium" x-text="contact?.email"></div>
                                </div>
                                <div>
                                    <label class="text-sm text-slate-500">Téléphone</label>
                                    <div class="font-medium" x-text="contact?.telephone || '-'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    {% include 'portail_client/alpinejs.html' %}
</body>
</html>
