<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Marki{% endblock %} | Marki</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        html { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    
    <!-- Sidebar Navigation Dual -->
    <sidebar-nav-dual page="{% block active_page %}{% endblock %}"></sidebar-nav-dual>
    
    <!-- Main Content -->
    <div class="ml-[284px] min-h-screen">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <h1 class="text-lg font-semibold text-slate-800">{% block header_title %}{{ self.page_title() }}{% endblock %}</h1>
                {% block header_actions %}{% endblock %}
            </div>
            <div class="flex items-center gap-2">
                {% block header_right %}{% endblock %}
            </div>
        </header>
        
        <!-- Page Content -->
        <main class="p-6">
            {% block content %}{% endblock %}
        </main>
        
    </div>
    
    <!-- Scripts -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/components/sidebar-nav-dual.js"></script>
    {% block page_scripts %}{% endblock %}
    
</body>
</html>
