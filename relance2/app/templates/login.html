<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | Marki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center" x-data="loginPage()">

  <div class="w-full max-w-md px-4">
    
    <!-- Logo + Tagline -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl mb-4 overflow-hidden">
        <img src="{{ url_for('static', filename='marki-logo.png') }}" alt="Marki" class="w-full h-full object-contain">
      </div>
      <h1 class="text-2xl font-semibold text-slate-900">Marki</h1>
      <p class="text-sm text-slate-500 mt-1">Marki : le meilleur ami des Diagnostiqueurs immobiliers. Simplifier, renforcer et développer votre marge.</p>
    </div>

    <!-- Card Connexion -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm">
      <!-- Header -->
      <div class="px-6 py-4 border-b border-slate-100">
        <h2 class="text-base font-semibold text-slate-900">Connexion</h2>
      </div>

      <!-- Form -->
      <form class="p-6 space-y-4" @submit.prevent="handleLogin">
        
        <!-- Identifiant ou email -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Identifiant ou email</label>
          <input 
            type="text" 
            x-model="form.username"
            placeholder="Votre identifiant ou email"
            autocomplete="username"
            required
            class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm text-slate-900
                   placeholder:text-slate-400
                   focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500
                   transition-all"
          >
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Mot de passe</label>
          <input 
            type="password" 
            x-model="form.password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm text-slate-900
                   placeholder:text-slate-400
                   focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500
                   transition-all"
          >
        </div>

        <!-- Error Alert -->
        <template x-if="error">
          <div class="flex items-start gap-3 p-3 bg-sky-50 border border-sky-100 rounded-lg">
            <svg class="w-5 h-5 text-sky-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-sm text-sky-700" x-text="error"></p>
          </div>
        </template>

        <!-- Submit Button -->
        <button 
          type="submit"
          :disabled="loading"
          class="w-full flex items-center justify-center gap-2 mt-2 bg-sky-500 hover:bg-sky-600 disabled:bg-sky-300
                 text-white py-2.5 px-4 rounded-lg text-sm font-medium transition-all"
        >
          <svg x-show="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span x-text="loading ? 'Connexion...' : 'Se connecter'"></span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-400 mt-6">
      © 2024 Marki - Tous droits réservés
    </p>

  </div>

  <script>
    function loginPage() {
      return {
        form: {
          username: '',
          password: ''
        },
        loading: false,
        error: '',
        
        async handleLogin() {
          this.loading = true;
          this.error = '';
          
          try {
            const response = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form)
            });
            
            const data = await response.json();
            
            if (!response.ok) {
              this.error = data.error || 'Identifiants incorrects';
              this.loading = false;
              return;
            }
            
            // Stockage du token
            localStorage.setItem('marki_token', data.token);
            localStorage.setItem('marki_user', JSON.stringify(data.user));
            
            // Redirection vers le dashboard
            window.location.href = '/dashboard';
            
          } catch (err) {
            this.error = 'Erreur de connexion au serveur';
            this.loading = false;
          }
        }
      }
    }
  </script>

</body>
</html>
