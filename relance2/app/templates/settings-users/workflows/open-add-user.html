<!-- Workflow: Open Add User -->

/**
 * @action Ouvrir le modal d'ajout utilisateur
 * @checkpoint modal-opened
 */
openAddUser() {
  if (!this.isAdmin) return;
  
  this.newUser = {
    prenom: '',
    nom: '',
    username: '',
    email: '',
    password: '',
    role: 'user'
  };
  this.showAddForm = true;
}
