<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('relancesCalendrier', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Data
            relances: [],
            currentDate: new Date(),
            viewMode: 'month',
            editingRelance: null,
            showEditModal: false,
            
            // Helpers
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return new Intl.DateTimeFormat('fr-FR', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric'
                }).format(date);
            },
            
            // =====================================================
            // 2. INIT (EN PREMIER)
            // =====================================================
            {% include 'relances_calendrier/workflows/workflow-init.html' %},
            
            // =====================================================
            // 3. WORKFLOWS
            // =====================================================
            {% include 'relances_calendrier/workflows/initial-load.html' %},
            {% include 'relances_calendrier/workflows/switch-view-month.html' %},
            {% include 'relances_calendrier/workflows/switch-view-week.html' %},
            {% include 'relances_calendrier/workflows/previous-period.html' %},
            {% include 'relances_calendrier/workflows/next-period.html' %},
            {% include 'relances_calendrier/workflows/go-today.html' %},
            {% include 'relances_calendrier/workflows/open-edit-relance.html' %},
            {% include 'relances_calendrier/workflows/save-edit.html' %},
            {% include 'relances_calendrier/workflows/close-modal.html' %}
        }));
    });
</script>
