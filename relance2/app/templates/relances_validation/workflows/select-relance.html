// Workflow: Toggle selection
toggleAll: function(checked) {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'toggleAll', checked });
    
    this.relances.forEach(r => {
        this.selected[r.id] = checked;
    });
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
