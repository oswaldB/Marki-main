<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('relancesValidation', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            loading: true,
            error: null,
            
            relances: [],
            selected: {},
            
            get selectedCount() {
                return Object.values(this.selected).filter(v => v).length;
            },
            
            get allSelected() {
                return this.relances.length > 0 && this.relances.every(r => this.selected[r.id]);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('fr-FR');
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'relances_validation/workflows/initial-load.html' %},
            {% include 'relances_validation/workflows/valider-relance.html' %},
            {% include 'relances_validation/workflows/supprimer-relance.html' %},
            {% include 'relances_validation/workflows/select-relance.html' %},
            {% include 'relances_validation/workflows/valider-selection.html' %},
            
            // =====================================================
            // 3. INIT
            // =====================================================
            {% include 'relances_validation/workflows/workflow-init.html' %}
        }));
    });
</script>
