<!-- templates/machine_a_cafe/index.html -->
<!-- Exemple complet: Machine à Café avec architecture Alpine.js + Jinja2 -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Café ☕</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    
    <!-- Conteneur principal avec données Alpine -->
    <div x-data="machineCafe" x-init="init()" class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">☕ Machine à Café</h1>
            <p class="text-sm text-gray-500 mt-1" x-text="status">En attente...</p>
        </div>
        
        <!-- Indicateurs d'état -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <!-- Niveau d'eau -->
            <div class="text-center">
                <div class="text-2xl mb-1">💧</div>
                <div class="text-xs text-gray-500">Eau</div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-1">
                    <div class="bg-blue-500 h-2 rounded-full transition-all" 
                         :style="`width: ${niveauEau}%`"
                         :class="niveauEau < 20 ? 'bg-red-500' : 'bg-blue-500'"></div>
                </div>
                <div class="text-xs mt-1" x-text="niveauEau + '%'"></div>
            </div>
            
            
            <!-- Niveau de grains -->
            <div class="text-center">
                <div class="text-2xl mb-1">🫘</div>
                <div class="text-xs text-gray-500">Grains</div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-1">
                    <div class="bg-amber-600 h-2 rounded-full transition-all" 
                         :style="`width: ${niveauGrains}%`"
                         :class="niveauGrains < 20 ? 'bg-red-500' : 'bg-amber-600'"></div>
                </div>
                <div class="text-xs mt-1" x-text="niveauGrains + '%'"></div>
            </div>
            
            
            <!-- Niveau de lait -->
            <div class="text-center">
                <div class="text-2xl mb-1">🥛</div>
                <div class="text-xs text-gray-500">Lait</div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-1">
                    <div class="bg-white border border-gray-300 h-2 rounded-full transition-all" 
                         :style="`width: ${niveauLait}%`"
                         :class="niveauLait < 20 ? 'bg-red-100 border-red-400' : 'bg-white border-gray-300'"></div>
                </div>
                <div class="text-xs mt-1" x-text="niveauLait + '%'"></div>
            </div>
        </div>
        
        
        <!-- Message d'erreur -->
        <div x-show="error" x-transition class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <strong>Erreur !</strong>
            <span x-text="error"></span>
        </div>
        
        
        <!-- Boutons de café -->
        <div class="space-y-3">
            <h3 class="text-sm font-semibold text-gray-700">Choisir votre café:</h3>
            
            <!-- Espresso -->
            <button 
                @click="faireEspresso()"
                :disabled="loading || niveauEau < 10 || niveauGrains < 10"
                class="w-full flex items-center justify-between p-4 border-2 border-gray-200 rounded-lg hover:border-amber-500 hover:bg-amber-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
                <div class="flex items-center">
                    <span class="text-2xl mr-3">☕</span>
                    <div class="text-left">
                        <div class="font-medium">Espresso</div>
                        <div class="text-xs text-gray-500">Court et fort</div>
                    </div>
                </div>
                <span class="text-xs text-gray-400">-10% eau, -10% grains</span>
            </button>
            
            
            <!-- Café Long -->
            <button 
                @click="faireCafeLong()"
                :disabled="loading || niveauEau < 20 || niveauGrains < 15"
                class="w-full flex items-center justify-between p-4 border-2 border-gray-200 rounded-lg hover:border-amber-500 hover:bg-amber-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
                <div class="flex items-center">
                    <span class="text-2xl mr-3">🍵</span>
                    <div class="text-left">
                        <div class="font-medium">Café Long</div>
                        <div class="text-xs text-gray-500">Plus doux</div>
                    </div>
                </div>
                <span class="text-xs text-gray-400">-20% eau, -15% grains</span>
            </button>
            
            
            <!-- Cappuccino -->
            <button 
                @click="faireCappuccino()"
                :disabled="loading || niveauEau < 15 || niveauGrains < 10 || niveauLait < 20"
                class="w-full flex items-center justify-between p-4 border-2 border-gray-200 rounded-lg hover:border-amber-500 hover:bg-amber-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
            >
                <div class="flex items-center">
                    <span class="text-2xl mr-3">🥛</span>
                    <div class="text-left">
                        <div class="font-medium">Cappuccino</div>
                        <div class="text-xs text-gray-500">Avec mousse de lait</div>
                    </div>
                </div>
                <span class="text-xs text-gray-400">-15% eau, -10% grains, -20% lait</span>
            </button>
        </div>
        
        
        <!-- Boutons de maintenance -->
        <div class="mt-6 pt-6 border-t border-gray-200">
            <h3 class="text-sm font-semibold text-gray-700 mb-3">Maintenance:</h3>
            
            <div class="grid grid-cols-3 gap-2">
                <button 
                    @click="remplirEau()"
                    :disabled="loading"
                    class="p-3 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg text-sm font-medium disabled:opacity-50 transition-colors"
                >
                    💧 Remplir Eau
                </button>
                
                
                <button 
                    @click="ajouterGrains()"
                    :disabled="loading"
                    class="p-3 bg-amber-100 hover:bg-amber-200 text-amber-700 rounded-lg text-sm font-medium disabled:opacity-50 transition-colors"
                >
                    🫘 Grains
                </button>
                
                
                <button 
                    @click="remplirLait()"
                    :disabled="loading"
                    class="p-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium disabled:opacity-50 transition-colors"
                >
                    🥛 Lait
                </button>
            </div>
            
            
            <!-- Bouton tout remplir -->
            <button 
                @click="toutRemplir()"
                :disabled="loading || (niveauEau >= 100 && niveauGrains >= 100 && niveauLait >= 100)"
                class="w-full mt-3 p-3 bg-green-100 hover:bg-green-200 text-green-700 rounded-lg text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center"
            >
                <span class="mr-2">🔧</span>
                <span>Tout remplir à 100%</span>
                <span x-show="niveauEau >= 100 && niveauGrains >= 100 && niveauLait >= 100" class="ml-2 text-xs">(Déjà plein)</span>
            </button>
        </div>
        
        
        <!-- Indicateur de chargement -->
        <div x-show="loading" x-transition class="mt-4 text-center">
            <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm shadow rounded-md text-white bg-amber-500 transition ease-in-out duration-150 cursor-not-allowed">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Préparation en cours...
            </div>
        </div>
        
        
        <!-- Historique des cafés -->
        <div x-show="historique.length > 0" class="mt-6 pt-6 border-t border-gray-200">
            <h3 class="text-sm font-semibold text-gray-700 mb-2">Historique:</h3>
            <ul class="text-sm text-gray-600 space-y-1">
                <template x-for="(item, index) in historique.slice(-5)" :key="index">
                    <li x-text="item"></li>
                </template>
            </ul>
        </div>
        
    </div>
    
    
    <!-- ✅ Alpine.js À LA FIN DU BODY -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    
    <!-- Inclusion de l'initialisation -->
    {% include 'machine_a_cafe/alpinejs.html' %}
    
</body>
</html>
