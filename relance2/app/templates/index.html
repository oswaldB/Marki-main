<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marki - Hello World</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .status {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        #api-status { margin-top: 1rem; font-family: monospace; }
    </style>
</head>
<body>
    <h1>👋 Hello World!</h1>
    <p>Marki est en cours de reconstruction...</p>
    <div class="status">
        <div>Frontend: ✅ OK</div>
        <div id="api-status">Backend: 🔄 Vérification...</div>
    </div>
    
    <script>
        // Test du backend
        fetch('/api/hello')
            .then(r => r.json())
            .then(data => {
                document.getElementById('api-status').textContent = 
                    `Backend: ✅ ${data.message}`;
            })
            .catch(err => {
                document.getElementById('api-status').textContent = 
                    `Backend: ❌ Erreur (${err.message})`;
            });
    </script>
</body>
</html>
