<!--
  Workflow: demanderPrenom
  Description: Demande le prénom via prompt() et met à jour le state
-->
<div x-data="{ 
  prenom: '',
  
  demanderPrenom: async function() {
    const workflowId = crypto.randomUUID();
    
    console.log(JSON.stringify({
      timestamp: new Date().toISOString(),
      workflowId: workflowId,
      workflow: 'demanderPrenom',
      event: 'WORKFLOW_START'
    }));
    
    const nouveauPrenom = prompt('Quel est votre prénom ?');
    
    if (nouveauPrenom !== null && nouveauPrenom.trim() !== '') {
      this.prenom = nouveauPrenom.trim();
      
      console.log(JSON.stringify({
        timestamp: new Date().toISOString(),
        workflowId: workflowId,
        workflow: 'demanderPrenom',
        event: 'STATE_UPDATE',
        property: 'prenom',
        value: this.prenom
      }));
    } else {
      console.log(JSON.stringify({
        timestamp: new Date().toISOString(),
        workflowId: workflowId,
        workflow: 'demanderPrenom',
        event: 'WORKFLOW_CANCELLED'
      }));
    }
    
    console.log(JSON.stringify({
      timestamp: new Date().toISOString(),
      workflowId: workflowId,
      workflow: 'demanderPrenom',
      event: 'WORKFLOW_SUCCESS'
    }));
  }
}">
  <!-- Template vide - workflow appelé programmatiquement -->
</div>
