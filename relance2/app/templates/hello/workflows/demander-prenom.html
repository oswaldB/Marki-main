{# Workflow: demanderPrenom - Demande le prénom via prompt et met à jour this.prenom #}
<script>
    demanderPrenom: async function() {
        const workflowId = crypto.randomUUID();
        
        log('WORKFLOW_START', { 
            workflowId: workflowId, 
            workflow: 'demanderPrenom' 
        });
        
        const prenomSaisi = prompt('Quel est votre prénom ?');
        
        if (prenomSaisi !== null && prenomSaisi.trim() !== '') {
            this.prenom = prenomSaisi.trim();
            
            log('STATE_UPDATE', { 
                workflowId: workflowId, 
                property: 'prenom', 
                value: this.prenom 
            });
        } else {
            log('WORKFLOW_CANCELLED', { 
                workflowId: workflowId, 
                reason: 'User cancelled or empty input' 
            });
        }
        
        log('WORKFLOW_SUCCESS', { 
            workflowId: workflowId 
        });
    }
</script>
