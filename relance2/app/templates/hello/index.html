<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div x-data="helloPage" x-init="init()" class="text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Hello World</h1>
        
        <button 
            @click="askName()" 
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-200"
        >
            Demander prénom
        </button>
        
        <div x-show="prenom" class="mt-8 p-4 bg-white rounded-lg shadow-md">
            <p class="text-2xl text-gray-700">Hello <span x-text="prenom"></span></p>
        </div>
    </div>

    {% include "hello/alpinejs.html" %}
</body>
</html>
