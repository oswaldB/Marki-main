<script>
// =====================================================
// LOGGER GLOBAL - Génération exhaustive des logs
// =====================================================
const log = {
    debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
    info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
    warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
    error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
};

// =====================================================
// ALPINE.JS DATA - Pattern: Props → Workflows → Init
// =====================================================
document.addEventListener('alpine:init', () => {
    Alpine.data('contactsPage', () => ({
        // =====================================================
        // 1. PROPS RÉACTIVES (STATE) - Définies D'ABORD
        // =====================================================
        
        // UI State
        loading: false,
        hasSearched: false,
        
        // Search & Sort
        searchQuery: '',
        sortBy: 'nom',
        sortDirection: 'asc',
        
        // Data
        contacts: [],
        
        // Stats from API /api/contacts/stats
        stats: {
            total: 0,
            entreprises: 0,
            personnes: 0,
            avecImpayes: 0,
            blacklist: 0,
            sansEmail: 0
        },
        
        // UI State - Modales
        showEmailForceModal: false,
        showBlacklistModal: false,
        
        // Selected
        selectedContact: null,
        contactToBlacklist: null,
        
        // Email force
        emailForceValue: '',
        emailForceSearch: '',
        emailForceSearchResults: [],
        loadingEmailForceSearch: false,

        // =====================================================
        // GETTERS CALCULÉS - Définis avec les props
        // =====================================================
        
        // Computed: Contacts triés (l'API retourne déjà tout structuré)
        get sortedContacts() {
            let sorted = [...this.contacts];
            
            sorted.sort((a, b) => {
                let valA, valB;
                
                switch(this.sortBy) {
                    case 'nom':
                        valA = (a.nomComplet || '').toLowerCase();
                        valB = (b.nomComplet || '').toLowerCase();
                        break;
                    case 'impayes':
                        valA = a.impayesCount || 0;
                        valB = b.impayesCount || 0;
                        break;
                    default:
                        valA = (a.nomComplet || '').toLowerCase();
                        valB = (b.nomComplet || '').toLowerCase();
                }
                
                if (valA < valB) return this.sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return this.sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            return sorted;
        },

        // Computed: Tous les contacts triés
        get allContactsSorted() {
            return this.sortedContacts;
        },

        // Computed: Entreprises pour recherche email forcé (depuis les résultats de recherche dédiés)
        get emailForceEntreprises() {
            const q = this.emailForceSearch?.toLowerCase() || '';
            if (!q) return [];
            
            return this.emailForceSearchResults
                .filter(c => c.typePersonne === 'M' && 
                            c.statut !== 'blacklist' && 
                            !c.isBlacklisted && 
                            (c.nomComplet?.toLowerCase() || '').includes(q))
                .slice(0, 5);
        },

        // Computed: Personnes pour recherche email forcé (depuis les résultats de recherche dédiés)
        get emailForcePersonnes() {
            const q = this.emailForceSearch?.toLowerCase() || '';
            if (!q) return [];
            
            return this.emailForceSearchResults
                .filter(c => c.typePersonne === 'P' && 
                            !c.entrepriseId && 
                            !c.societesLiees &&
                            c.statut !== 'blacklist' && 
                            !c.isBlacklisted &&
                            (c.nomComplet?.toLowerCase() || '').includes(q))
                .slice(0, 5);
        },

        // =====================================================
        // HELPERS - Méthodes utilitaires
        // =====================================================
        
        formatMoney(amount) {
            return new Intl.NumberFormat('fr-FR', { 
                style: 'currency', 
                currency: 'EUR',
                minimumFractionDigits: 2
            }).format(amount || 0);
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('fr-FR');
        },

        // =====================================================
        // 2. WORKFLOWS - Définis APRÈS les props (ils les utilisent)
        // =====================================================
        
        {% include 'contacts/workflows/load-stats.html' %},
        {% include 'contacts/workflows/search-contacts.html' %},
        {% include 'contacts/workflows/open-modals.html' %},
        {% include 'contacts/workflows/search-email-force-contacts.html' %},
        {% include 'contacts/workflows/save-email-force.html' %},
        {% include 'contacts/workflows/confirm-blacklist.html' %},
        {% include 'contacts/workflows/unblacklist.html' %},
        
        // =====================================================
        // 3. INIT - En DERNIER (dépend des props et workflows)
        // =====================================================
        
        {% include 'contacts/workflows/workflow-init.html' %}
    }));
});
</script>
