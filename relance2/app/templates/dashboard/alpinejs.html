<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('dashboardPage', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: true,
            syncing: false,
            error: null,
            lastSyncTime: null,
            
            // Données brutes de la base
            impayes: [],
            relances: [],
            contacts: [],
            recentEvents: [],
            
            // KPIs calculés côté frontend
            kpis: {
                facturesEnAttente: 0,
                impayesActifs: 0,
                montantTotal: 0,
                relancesJour: 0,
                tauxRecouvrement: 0,
                anciennete: {
                    moins7j: 0, moins7jMontant: 0,
                    j8a30: 0, j8a30Montant: 0,
                    j31a60: 0, j31a60Montant: 0,
                    j60a120: 0, j60a120Montant: 0,
                    plus120j: 0, plus120jMontant: 0
                }
            },
            
            // Top débiteurs calculés
            topDebtors: [],
            
            // Helpers
            formatMoney(amount) {
                return new Intl.NumberFormat('fr-FR', { 
                    style: 'currency', 
                    currency: 'EUR',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(amount || 0);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return date.toLocaleDateString('fr-FR', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },
            
            daysSince(dateStr) {
                if (!dateStr) return 0;
                const date = new Date(dateStr);
                const now = new Date();
                return Math.floor((now - date) / (1000 * 60 * 60 * 24));
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'dashboard/workflows/initial-load.html' %},
            {% include 'dashboard/workflows/sync-data.html' %},
            
            // =====================================================
            // 3. INIT
            // =====================================================
            {% include 'dashboard/workflows/workflow-init.html' %}
        }));
    });
</script>
