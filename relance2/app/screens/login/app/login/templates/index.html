<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marki</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Include Alpine.js stores and init -->
    {% include 'alpinejs.html' %}
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    
    <!-- Main Login Container -->
    <div 
        x-data="loginPage()"
        x-init="initLogin()"
        class="w-full max-w-md p-8"
    >
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Marki</h1>
            <p class="text-gray-400">Connexion à votre espace</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
            
            <!-- Error Message -->
            <div 
                x-show="error"
                x-transition
                class="mb-4 p-4 bg-red-900/50 border border-red-500 rounded-lg text-red-200 text-sm"
            >
                <span x-text="error"></span>
            </div>
            
            <!-- Login Form -->
            <form @submit.prevent="handleLogin()" class="space-y-6">
                
                <!-- Email Field -->
                <div>
                    <label 
                        for="email" 
                        class="block text-sm font-medium text-gray-300 mb-2"
                    >
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        x-model="form.email"
                        required
                        placeholder="admin@marki.fr"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>
                
                <!-- Password Field -->
                <div>
                    <label 
                        for="password" 
                        class="block text-sm font-medium text-gray-300 mb-2"
                    >
                        Mot de passe
                    </label>
                    <input
                        type="password"
                        id="password"
                        x-model="form.password"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>
                
                <!-- Submit Button -->
                <button
                    type="submit"
                    :disabled="loading"
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition-colors duration-200 flex items-center justify-center"
                >
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Connexion...
                    </span>
                </button>
                
            </form>
            
        </div>
        
        <!-- Footer -->
        <p class="text-center mt-6 text-gray-500 text-sm">
            © 2025 Marki. Tous droits réservés.
        </p>
    </div>
    
    <!-- Include Workflows -->
    {% include 'workflows/login-initial-load.html' %}
    {% include 'workflows/auth-submit.html' %}
    
</body>
</html>
