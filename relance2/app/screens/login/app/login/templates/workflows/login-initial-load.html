{#
Workflow: login-initial-load
Description: Charger la page de login et vérifier l'état d'authentification existant
#}

<script>
    /**
     * @action Initialiser le DOM de la page login
     * @checkpoint dom-ready, body avec x-data="loginPage()" présent
     */
    
    /**
     * @action Vérifier la présence d'un token dans localStorage
     * @checkpoint token-checked, token présent ou absent déterminé
     */
    
    /**
     * @action Si token présent, valider via GET /api/auth/me (token dans header Authorization: Bearer)
     * @checkpoint session-verified, réponse API reçue
     * 
     * **Backend** : Utilise `AuthLocal.verifyToken(token)` pour valider le JWT
     */
    
    /**
     * @action Si session valide, rediriger vers /dashboard
     * @checkpoint redirect-executed, navigation vers dashboard
     */
    
    /**
     * @action Afficher le formulaire de login prêt à l'emploi
     * @checkpoint form-ready, champs username/password focusables
     */
    
    function loginPage() {
        return {
            // Data Model
            form: {
                email: '',
                password: ''
            },
            loading: false,
            error: null,
            
            async initLogin() {
                // @checkpoint dom-ready - Page initialized
                console.log('[login-initial-load] DOM ready');
                
                // Check for existing token
                const token = Alpine.store('auth').getToken();
                console.log('[login-initial-load] Token checked:', token ? 'present' : 'absent');
                // @checkpoint token-checked
                
                if (token) {
                    try {
                        // Validate token with backend
                        const response = await fetch('/api/auth/me', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        console.log('[login-initial-load] Session verification response:', response.status);
                        // @checkpoint session-verified
                        
                        if (response.ok) {
                            const data = await response.json();
                            
                            // Update store with user data
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                            
                            console.log('[login-initial-load] Session valid, redirecting to /dashboard');
                            // @checkpoint redirect-executed
                            window.location.href = '/dashboard';
                            return;
                        } else {
                            // Token invalid, clear it
                            Alpine.store('auth').clearAuth();
                            console.log('[login-initial-load] Token invalid, cleared');
                        }
                    } catch (err) {
                        console.error('[login-initial-load] Error verifying token:', err);
                        Alpine.store('auth').clearAuth();
                    }
                }
                
                // @checkpoint form-ready - Form ready for input
                console.log('[login-initial-load] Form ready');
                
                // Auto-focus email field
                this.$nextTick(() => {
                    const emailInput = document.getElementById('email');
                    if (emailInput) {
                        emailInput.focus();
                    }
                });
            },
            
            // Email validation helper
            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
        };
    }
</script>
