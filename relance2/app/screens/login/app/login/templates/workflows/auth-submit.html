{#
Workflow: auth-submit
Description: Soumettre les identifiants utilisateur pour authentification
Trigger: Formulaire de connexion (submit)
#}

<script>
    /**
     * Auth Submit API Call
     * POST /api/auth/login
     */
    async function authSubmit(email, password) {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Échec de connexion');
        }
        
        return await response.json();
    }
    
    /**
     * Extend loginPage with handleLogin method
     * This is merged with the loginPage() function in index.html
     */
    document.addEventListener('alpine:init', () => {
        
        // Extend the loginPage data object
        Alpine.data('extendedLoginPage', () => ({
            async handleLogin() {
                // 1. Validate form
                if (!this.form.email || !this.form.password) {
                    this.error = 'Veuillez remplir tous les champs';
                    return;
                }
                
                // Validate email format
                if (!this.isValidEmail(this.form.email)) {
                    this.error = 'Veuillez entrer un email valide';
                    return;
                }
                
                // 2. Set loading state
                this.loading = true;
                this.error = null;
                Alpine.store('ui').setLoading(true);
                Alpine.store('ui').clearError();
                
                try {
                    // 3. Call auth API
                    const data = await authSubmit(this.form.email, this.form.password);
                    
                    // 4. Store auth data
                    Alpine.store('auth').setAuth(data.token, data.user);
                    
                    console.log('[auth-submit] Authentication successful');
                    
                    // 5. Redirect to dashboard
                    window.location.href = '/dashboard';
                    
                } catch (error) {
                    // 6. Handle error
                    this.error = error.message;
                    Alpine.store('ui').setError(error.message);
                    console.error('[auth-submit] Authentication failed:', error.message);
                } finally {
                    // 7. Reset loading state
                    this.loading = false;
                    Alpine.store('ui').setLoading(false);
                }
            },
            
            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
        }));
    });
    
    /**
     * Override loginPage to include handleLogin
     * This replaces the original loginPage function
     */
    const originalLoginPage = window.loginPage;
    
    window.loginPage = function() {
        return {
            // Data Model
            form: {
                email: '',
                password: ''
            },
            loading: false,
            error: null,
            
            async initLogin() {
                const token = Alpine.store('auth').getToken();
                
                if (token) {
                    try {
                        const response = await fetch('/api/auth/me', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                            window.location.href = '/dashboard';
                            return;
                        } else {
                            Alpine.store('auth').clearAuth();
                        }
                    } catch (err) {
                        Alpine.store('auth').clearAuth();
                    }
                }
                
                this.$nextTick(() => {
                    const emailInput = document.getElementById('email');
                    if (emailInput) {
                        emailInput.focus();
                    }
                });
            },
            
            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            },
            
            async handleLogin() {
                // 1. Validate form
                if (!this.form.email || !this.form.password) {
                    this.error = 'Veuillez remplir tous les champs';
                    return;
                }
                
                if (!this.isValidEmail(this.form.email)) {
                    this.error = 'Veuillez entrer un email valide';
                    return;
                }
                
                // 2. Set loading
                this.loading = true;
                this.error = null;
                
                try {
                    // 3. Call auth API
                    const data = await authSubmit(this.form.email, this.form.password);
                    
                    // 4. Store auth data
                    Alpine.store('auth').setAuth(data.token, data.user);
                    
                    // 5. Redirect
                    window.location.href = '/dashboard';
                    
                } catch (error) {
                    this.error = error.message;
                } finally {
                    this.loading = false;
                }
            }
        };
    };
</script>
