{#
Alpine.js Stores and Initialization for Login Cell
Stores: $store.auth, $store.ui
#}

<script>
    // Auth Store - manages authentication state
    document.addEventListener('alpine:init', () => {
        
        // Auth Store
        Alpine.store('auth', {
            token: null,
            user: null,
            isAuthenticated: false,
            
            init() {
                // Try to restore from localStorage on init
                const savedToken = localStorage.getItem('token');
                if (savedToken) {
                    this.token = savedToken;
                }
            },
            
            setAuth(token, user) {
                this.token = token;
                this.user = user;
                this.isAuthenticated = true;
                localStorage.setItem('token', token);
            },
            
            clearAuth() {
                this.token = null;
                this.user = null;
                this.isAuthenticated = false;
                localStorage.removeItem('token');
            },
            
            getToken() {
                return this.token || localStorage.getItem('token');
            }
        });
        
        // UI Store - manages UI state
        Alpine.store('ui', {
            loading: false,
            error: null,
            
            setLoading(value) {
                this.loading = value;
            },
            
            setError(message) {
                this.error = message;
            },
            
            clearError() {
                this.error = null;
            }
        });
        
    });
</script>
