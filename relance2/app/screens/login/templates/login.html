<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div x-data="loginPage()" x-init="init()" class="w-full max-w-md">
        <!-- Loading State -->
        <div x-show="loading" class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">Connexion en cours...</p>
        </div>

        <!-- Error Message -->
        <div x-show="error" x-cloak class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <span x-text="error"></span>
        </div>

        <!-- Login Form -->
        <div x-show="!loading && !checkingSession" x-cloak class="bg-white shadow-lg rounded-lg px-8 pt-6 pb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Connexion</h2>
            
            <form @submit.prevent="handleLogin()">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">
                        Email
                    </label>
                    <input 
                        x-model="form.email"
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                        id="email" 
                        type="email" 
                        placeholder="admin@marki.fr"
                        required
                    >
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                        Mot de passe
                    </label>
                    <input 
                        x-model="form.password"
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                        id="password" 
                        type="password" 
                        placeholder="******************"
                        required
                    >
                </div>
                
                <div class="flex items-center justify-between">
                    <button 
                        :disabled="loading"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full disabled:opacity-50"
                        type="submit"
                    >
                        <span x-show="!loading">Se connecter</span>
                        <span x-show="loading">Connexion...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('auth', {
                token: null,
                user: null,
                isAuthenticated: false
            });
            
            Alpine.store('ui', {
                theme: 'light',
                sidebarOpen: false
            });
        });
        
        function loginPage() {
            return {
                form: {
                    email: '',
                    password: ''
                },
                loading: false,
                checkingSession: true,
                error: null,
                
                async init() {
                    // Workflow: login-initial-load
                    // @action Vérifier la présence d'un token dans localStorage
                    const token = localStorage.getItem('token');
                    
                    if (token) {
                        // @checkpoint token-checked, token présent
                        // @action Si token présent, valider via GET /api/auth/me
                        try {
                            const response = await fetch('/api/auth/me', {
                                method: 'GET',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                }
                            });
                            
                            // @checkpoint session-verified, réponse API reçue
                            if (response.ok) {
                                const data = await response.json();
                                
                                // Mettre à jour le store auth
                                Alpine.store('auth').token = token;
                                Alpine.store('auth').user = data.user;
                                Alpine.store('auth').isAuthenticated = true;
                                
                                // @action Si session valide, rediriger vers /dashboard
                                // @checkpoint redirect-executed, navigation vers dashboard
                                window.location.href = '/dashboard';
                                return;
                            }
                        } catch (err) {
                            console.log('Session invalide');
                            localStorage.removeItem('token');
                        }
                    }
                    
                    // @checkpoint token-checked, token absent
                    // @checkpoint form-ready, champs username/password focusables
                    this.checkingSession = false;
                },
                
                async handleLogin() {
                    // 1. Validate form
                    if (!this.form.email || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }
                    
                    // Validation email format
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(this.form.email)) {
                        this.error = 'Format email invalide';
                        return;
                    }
                    
                    // 2. Set loading
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        // 3. Call auth API
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.form.email,
                                password: this.form.password
                            })
                        });
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error || 'Échec de connexion');
                        }
                        
                        const data = await response.json();
                        
                        // 4. Store auth data
                        Alpine.store('auth').token = data.token;
                        Alpine.store('auth').user = data.user;
                        Alpine.store('auth').isAuthenticated = true;
                        
                        // 5. Persist token
                        localStorage.setItem('token', data.token);
                        
                        // 6. Redirect
                        window.location.href = '/dashboard';
                        
                    } catch (error) {
                        this.error = error.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
</body>
</html>
