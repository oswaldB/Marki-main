<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marki - Connexion</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    
    <!-- Login Container -->
    <div x-data="loginPage()" x-init="init()" class="w-full max-w-md">
        
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Marki</h1>
            <p class="text-gray-400">Connectez-vous à votre compte</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
            
            <!-- Loading State (Initial Check) -->
            <div x-show="checking" x-cloak class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                <p class="text-gray-400 mt-4">Vérification de la session...</p>
            </div>
            
            <!-- Login Form -->
            <form x-show="!checking" x-cloak @submit.prevent="handleLogin()" class="space-y-6">
                
                <!-- Error Message -->
                <div x-show="error" x-transition class="bg-red-900/50 border border-red-500/50 rounded-lg p-4">
                    <p x-text="error" class="text-red-400 text-sm text-center"></p>
                </div>
                
                <!-- Username Field -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                        Nom d'utilisateur
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        x-model="form.username"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="admin"
                        required
                        autocomplete="username"
                    >
                </div>
                
                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                        Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        x-model="form.password"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit" 
                    :disabled="loading"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 disabled:cursor-not-allowed text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                >
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading" class="flex items-center">
                        <span class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
                        Connexion...
                    </span>
                </button>
                
            </form>
            
            <!-- Demo Credentials Hint -->
            <div x-show="!checking" x-cloak class="mt-6 pt-6 border-t border-gray-700">
                <p class="text-xs text-gray-500 text-center">
                    Identifiants de démo : <span class="text-gray-400">admin / admin</span>
                </p>
            </div>
            
        </div>
        
    </div>
    
    <script>
        function loginPage() {
            return {
                checking: true,
                loading: false,
                error: null,
                form: {
                    username: '',
                    password: ''
                },
                
                async init() {
                    // Check if already authenticated
                    const token = localStorage.getItem('token');
                    
                    if (token) {
                        try {
                            // Verify token validity
                            const response = await fetch('/login/api/auth/me', {
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                }
                            });
                            
                            if (response.ok) {
                                const data = await response.json();
                                if (data.success) {
                                    // Already authenticated, redirect to dashboard
                                    window.location.href = '/dashboard';
                                    return;
                                }
                            }
                            
                            // Token invalid, clear it
                            localStorage.removeItem('token');
                            
                        } catch (err) {
                            console.error('Session check error:', err);
                            localStorage.removeItem('token');
                        }
                    }
                    
                    this.checking = false;
                },
                
                async handleLogin() {
                    // Reset error
                    this.error = null;
                    
                    // Validate form
                    if (!this.form.username || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }
                    
                    this.loading = true;
                    
                    try {
                        // Call auth API
                        const response = await fetch('/login/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: this.form.username,
                                password: this.form.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok || !data.success) {
                            throw new Error(data.error || 'Échec de connexion');
                        }
                        
                        // Store auth data
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        // Set global auth store if available
                        if (typeof Alpine !== 'undefined' && Alpine.store('auth')) {
                            Alpine.store('auth').token = data.token;
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                        }
                        
                        // Redirect to dashboard
                        window.location.href = '/dashboard';
                        
                    } catch (err) {
                        this.error = err.message || 'Erreur de connexion';
                        this.loading = false;
                    }
                }
            }
        }
    </script>
    
</body>
</html>
