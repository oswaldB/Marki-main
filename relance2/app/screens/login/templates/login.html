<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    
    <div x-data="loginPage()" x-init="init()" class="w-full max-w-md">
        
        <!-- Card Login -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Marki Relance</h1>
                <p class="text-gray-500 mt-2">Connectez-vous à votre compte</p>
            </div>
            
            <!-- Error Message -->
            <div x-show="error" x-cloak 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 transform -translate-y-2"
                 x-transition:enter-end="opacity-100 transform translate-y-0"
                 class="bg-red-50 border-l-4 border-red-500 p-4 mb-6">
                <p x-text="error" class="text-red-700 text-sm"></p>
            </div>
            
            <!-- Login Form -->
            <form @submit.prevent="handleLogin()" class="space-y-6">
                
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        x-model="form.email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="admin@marki.fr"
                        required
                    >
                </div>
                
                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password"
                        x-model="form.password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="••••••••"
                        required
                    >
                </div>
                
                <!-- Submit Button -->
                <button 
                    type="submit"
                    :disabled="loading"
                    class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
                >
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Connexion...
                    </span>
                </button>
                
            </form>
            
            <!-- Loading Overlay (pour vérification initiale) -->
            <div x-show="checkingSession" x-cloak class="absolute inset-0 bg-white bg-opacity-90 flex items-center justify-center rounded-lg">
                <div class="text-center">
                    <svg class="animate-spin h-8 w-8 text-blue-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-600 text-sm">Vérification de la session...</p>
                </div>
            </div>
            
        </div>
        
        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            &copy; 2024 Marki. Tous droits réservés.
        </p>
        
    </div>

    <!-- Alpine.js Data & Logic -->
    <script>
        function loginPage() {
            return {
                // Data
                form: {
                    email: '',
                    password: ''
                },
                loading: false,
                error: null,
                checkingSession: true,
                
                // Stores
                init() {
                    this.checkExistingSession();
                },
                
                // Workflow: login-initial-load
                async checkExistingSession() {
                    this.checkingSession = true;
                    
                    try {
                        // @checkpoint dom-ready - body avec x-data présent
                        const token = localStorage.getItem('token');
                        
                        // @checkpoint token-checked
                        if (!token) {
                            this.checkingSession = false;
                            return;
                        }
                        
                        // @checkpoint session-verified - Validation du token
                        const response = await fetch('/api/auth/me', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            
                            // Mettre à jour le store auth
                            Alpine.store('auth').token = token;
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                            
                            // @checkpoint redirect-executed
                            window.location.href = '/dashboard';
                        } else {
                            // Token invalide, le supprimer
                            localStorage.removeItem('token');
                            this.checkingSession = false;
                        }
                    } catch (err) {
                        console.error('Erreur vérification session:', err);
                        localStorage.removeItem('token');
                        this.checkingSession = false;
                    }
                    
                    // @checkpoint form-ready
                },
                
                // Workflow: auth-submit
                async handleLogin() {
                    // 1. Validation form
                    if (!this.form.email || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }
                    
                    // Validation email simple
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(this.form.email)) {
                        this.error = 'Veuillez entrer un email valide';
                        return;
                    }
                    
                    // 2. Set loading
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        // 3. Call auth API
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                email: this.form.email,
                                password: this.form.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(data.error || 'Échec de connexion');
                        }
                        
                        // 4. Store auth data
                        Alpine.store('auth').token = data.token;
                        Alpine.store('auth').user = data.user;
                        Alpine.store('auth').isAuthenticated = true;
                        
                        // 5. Persist token
                        localStorage.setItem('token', data.token);
                        
                        // 6. Redirect
                        window.location.href = '/dashboard';
                        
                    } catch (error) {
                        this.error = error.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
        
        // Initialisation des stores Alpine.js
        document.addEventListener('alpine:init', () => {
            Alpine.store('auth', {
                token: null,
                user: null,
                isAuthenticated: false
            });
            
            Alpine.store('ui', {
                theme: 'light',
                sidebarOpen: true
            });
        });
    </script>
    
</body>
</html>
