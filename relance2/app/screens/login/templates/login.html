<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center"
      x-data="loginPage()" 
      x-init="init()">

    <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Connexion</h1>
            <p class="text-gray-600 mt-2">Accédez à votre tableau de bord</p>
        </div>

        <!-- Error Message -->
        <div x-show="error" 
             x-transition
             class="mb-4 p-4 bg-red-50 border border-red-200 rounded-md">
            <p class="text-sm text-red-600" x-text="error"></p>
        </div>

        <!-- Login Form -->
        <form @submit.prevent="handleLogin()" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input type="email" 
                       id="email"
                       x-model="form.email"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                       placeholder="admin@marki.fr"
                       :disabled="loading">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                    Mot de passe
                </label>
                <input type="password" 
                       id="password"
                       x-model="form.password"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                       placeholder="••••••••"
                       :disabled="loading">
            </div>

            <button type="submit" 
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition"
                    :disabled="loading">
                <span x-show="!loading">Se connecter</span>
                <span x-show="loading" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Connexion...
                </span>
            </button>
        </form>

        <!-- Info -->
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">
                Utilisateur de test: admin@marki.fr / admin
            </p>
        </div>
    </div>

    <script>
        function loginPage() {
            return {
                form: {
                    email: '',
                    password: ''
                },
                loading: false,
                error: null,

                /**
                 * @action Initialiser le DOM de la page login
                 * @checkpoint dom-ready, body avec x-data="loginPage()" présent
                 */
                init() {
                    // @checkpoint form-ready, champs username/password focusables
                    this.$refs.email?.focus();
                    
                    // Vérifier si déjà authentifié
                    this.checkExistingSession();
                },

                /**
                 * @action Vérifier la présence d'un token dans localStorage
                 * @checkpoint token-checked, token présent ou absent déterminé
                 * @action Si token présent, valider via GET /api/auth/me
                 * @checkpoint session-verified, réponse API reçue
                 */
                async checkExistingSession() {
                    const token = localStorage.getItem('token');
                    
                    if (!token) {
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (response.ok) {
                            // @checkpoint redirect-executed, navigation vers dashboard
                            window.location.href = '/dashboard';
                        } else {
                            // Token invalide, le supprimer
                            localStorage.removeItem('token');
                            localStorage.removeItem('user');
                            Alpine.store('auth')?.logout();
                        }
                    } catch (err) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                    }
                },

                /**
                 * @action Soumettre les identifiants utilisateur pour authentification
                 * @checkpoint api-called, requête POST envoyée
                 */
                async handleLogin() {
                    // 1. Validate form
                    if (!this.form.email || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }
                    
                    // 2. Set loading
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        // 3. Call auth API
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                email: this.form.email,
                                password: this.form.password
                            })
                        });

                        const data = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(data.error || 'Échec de connexion');
                        }
                        
                        // 4. Store auth data
                        if (Alpine.store('auth')) {
                            Alpine.store('auth').token = data.token;
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                        }
                        
                        // 5. Persist token
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        // 6. Redirect
                        window.location.href = '/dashboard';
                        
                    } catch (error) {
                        this.error = error.message;
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
