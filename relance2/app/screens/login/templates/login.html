<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div x-data="loginPage()" x-init="init()" class="w-full max-w-md p-6">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">Marki</h1>
            <p class="text-gray-400 mt-2">Connectez-vous à votre compte</p>
        </div>

        <!-- Login Form -->
        <div class="bg-gray-800 rounded-lg p-8 shadow-xl">
            <form @submit.prevent="handleLogin" class="space-y-6">
                
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        x-model="form.email"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-white placeholder-gray-500"
                        placeholder="admin@marki.fr"
                        :disabled="loading"
                        required
                    >
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                        Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password"
                        x-model="form.password"
                        class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-white placeholder-gray-500"
                        placeholder="••••••••"
                        :disabled="loading"
                        required
                    >
                </div>

                <!-- Error Message -->
                <div x-show="error" x-transition x-cloak class="bg-red-900/50 border border-red-500 text-red-300 px-4 py-3 rounded-lg">
                    <p x-text="error"></p>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    :disabled="loading || !form.email || !form.password"
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                >
                    <span x-show="loading" class="animate-spin">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span x-text="loading ? 'Connexion...' : 'Se connecter'"></span>
                </button>
            </form>

            <!-- Links -->
            <div class="mt-6 text-center space-y-2">
                <a href="#" class="text-sm text-blue-400 hover:text-blue-300">
                    Mot de passe oublié ?
                </a>
            </div>
        </div>

        <!-- Loading Overlay (for initial check) -->
        <div x-show="checkingSession" x-cloak class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
            <div class="text-center">
                <svg class="animate-spin h-10 w-10 text-blue-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-400">Vérification de la session...</p>
            </div>
        </div>
    </div>

    <!-- Include workflow scripts -->
    {% include 'workflows/login-initial-load.html' %}
    {% include 'workflows/auth-submit.html' %}

    <script>
        /**
         * Page Function: loginPage()
         * Main Alpine.js data for login page
         */
        function loginPage() {
            return {
                // Data
                form: {
                    email: '',
                    password: ''
                },
                loading: false,
                error: null,
                checkingSession: true,

                /**
                 * @action Initialiser la page login
                 * @checkpoint dom-ready
                 */
                async init() {
                    // Initialize stores if not exists
                    this.initStores();
                    
                    // Check existing session
                    await this.checkExistingSession();
                    
                    this.checkingSession = false;
                },

                /**
                 * Initialize Alpine.js stores
                 */
                initStores() {
                    // Auth store
                    if (!Alpine.store('auth')) {
                        Alpine.store('auth', {
                            token: localStorage.getItem('token') || null,
                            user: null,
                            isAuthenticated: false
                        });
                    }

                    // UI store
                    if (!Alpine.store('ui')) {
                        Alpine.store('ui', {
                            theme: 'dark',
                            sidebarOpen: false
                        });
                    }
                },

                /**
                 * @action Vérifier la session existante
                 * @checkpoint token-checked
                 */
                async checkExistingSession() {
                    const token = localStorage.getItem('token');
                    
                    if (!token) {
                        return;
                    }

                    try {
                        const response = await fetch('/api/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (response.ok) {
                            const data = await response.json();
                            
                            // Update store
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                            
                            // Redirect to dashboard
                            window.location.href = '/dashboard';
                        } else {
                            // Token invalid, remove it
                            localStorage.removeItem('token');
                            Alpine.store('auth').token = null;
                        }
                    } catch (error) {
                        console.error('Session check failed:', error);
                        localStorage.removeItem('token');
                        Alpine.store('auth').token = null;
                    }
                },

                /**
                 * @action Gérer la soumission du formulaire
                 * @checkpoint form-ready
                 */
                async handleLogin() {
                    // 1. Validate form
                    if (!this.form.email || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }

                    // 2. Set loading state
                    this.loading = true;
                    this.error = null;

                    try {
                        // 3. Call auth API
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                email: this.form.email,
                                password: this.form.password
                            })
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            throw new Error(data.error || 'Échec de connexion');
                        }

                        // 4. Store auth data
                        Alpine.store('auth').token = data.token;
                        Alpine.store('auth').user = data.user;
                        Alpine.store('auth').isAuthenticated = true;

                        // 5. Persist token
                        localStorage.setItem('token', data.token);

                        // 6. Redirect
                        window.location.href = '/dashboard';

                    } catch (error) {
                        this.error = error.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
