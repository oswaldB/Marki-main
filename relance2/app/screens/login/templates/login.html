{% extends "base.html" %}

{% block title %}Login - Marki Relance{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
     x-data="loginPage()"
     x-init="initPage()">
    
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg">
        <!-- Header -->
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Connexion
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Accédez à votre espace Marki
            </p>
        </div>
        
        <!-- Error Message -->
        <div x-show="error" 
             x-transition
             class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg relative"
             role="alert">
            <span class="block sm:inline" x-text="error"></span>
        </div>
        
        <!-- Login Form -->
        <form class="mt-8 space-y-6" @submit.prevent="handleLogin">
            <div class="rounded-md shadow-sm -space-y-px">
                <!-- Email Field -->
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Email
                    </label>
                    <input id="email" 
                           name="email" 
                           type="email" 
                           required
                           x-model="form.email"
                           :disabled="loading"
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                           placeholder="admin@marki.fr">
                </div>
                
                <!-- Password Field -->
                <div class="mb-4">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Mot de passe
                    </label>
                    <input id="password" 
                           name="password" 
                           type="password" 
                           required
                           x-model="form.password"
                           :disabled="loading"
                           class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                           placeholder="••••••••">
                </div>
            </div>
            
            <!-- Submit Button -->
            <div>
                <button type="submit"
                        :disabled="loading || !form.email || !form.password"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                    
                    <!-- Loading Spinner -->
                    <span x-show="loading" class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    
                    <span x-text="loading ? 'Connexion...' : 'Se connecter'"></span>
                </button>
            </div>
        </form>
        
        <!-- Info -->
        <div class="mt-4 text-center text-xs text-gray-400">
            <p>Par défaut: admin@marki.fr / admin</p>
        </div>
    </div>
</div>

<!-- Include Workflow Logic -->
<script src="{{ url_for('static', filename='js/workflows/login.js') }}"></script>
{% endblock %}
