{% comment %}
Workflow: auth-submit
Type: frontend
Description: Soumission du formulaire d'authentification
{% endcomment %}

<script>
/**
 * @workflow auth-submit
 * @screen login
 * @description Gérer la soumission des identifiants et l'authentification
 */

// Fonction utilitaire importable
async function authSubmit(email, password) {
    /**
     * @action Soumettre les identifiants à l'API d'authentification
     * @checkpoint request-sent, POST /api/auth/login envoyé
     */
    const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    
    /**
     * @checkpoint response-received, réponse API reçue
     */
    
    if (!response.ok) {
        const error = await response.json();
        /**
         * @checkpoint auth-failed, erreur d'authentification
         */
        throw new Error(error.error || 'Échec de connexion');
    }
    
    /**
     * @checkpoint auth-success, authentification réussie
     */
    return await response.json();
}

// Composant Alpine.js
document.addEventListener('alpine:init', () => {
    Alpine.data('authSubmit', () => ({
        loading: false,
        error: null,
        
        async handleSubmit(email, password) {
            // Validation
            if (!email || !password) {
                this.error = 'Veuillez remplir tous les champs';
                return;
            }
            
            // Set loading state
            this.loading = true;
            this.error = null;
            
            try {
                const data = await authSubmit(email, password);
                
                // Store auth data
                Alpine.store('auth').token = data.token;
                Alpine.store('auth').user = data.user;
                Alpine.store('auth').isAuthenticated = true;
                
                // Persist token
                localStorage.setItem('token', data.token);
                
                /**
                 * @checkpoint redirect-dashboard, redirection vers dashboard
                 */
                window.location.href = '/dashboard';
                
            } catch (error) {
                this.error = error.message;
            } finally {
                this.loading = false;
            }
        }
    }));
});

// Exporter pour utilisation externe
window.authSubmit = authSubmit;
</script>
