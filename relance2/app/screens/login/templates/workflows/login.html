{% extends "alpinejs.html" %}

{% block title %}Connexion - Marki{% endblock %}

{% block content %}
<div x-data="loginPage()" x-init="handleInitialLoad()" class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Connexion à Marki
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Entrez vos identifiants pour accéder à votre espace
            </p>
        </div>
        
        <!-- Formulaire -->
        <form @submit.prevent="handleLogin" class="mt-8 space-y-6">
            <!-- Message d'erreur -->
            <div x-show="error" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 transform -translate-y-2"
                 x-transition:enter-end="opacity-100 transform translate-y-0"
                 class="bg-red-50 border border-red-400 text-red-700 px-4 py-3 rounded relative" 
                 role="alert">
                <span x-text="error" class="block sm:inline"></span>
            </div>
            
            <!-- Champs -->
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email" class="sr-only">Adresse email</label>
                    <input id="email" 
                           name="email" 
                           type="email" 
                           required 
                           x-model="form.email"
                           @input="error = null"
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                           placeholder="Adresse email"
                           :disabled="loading">
                </div>
                <div>
                    <label for="password" class="sr-only">Mot de passe</label>
                    <input id="password" 
                           name="password" 
                           type="password" 
                           required 
                           x-model="form.password"
                           @input="error = null"
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                           placeholder="Mot de passe"
                           :disabled="loading">
                </div>
            </div>
            
            <!-- Bouton de connexion -->
            <div>
                <button type="submit" 
                        :disabled="loading"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Connexion en cours...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function loginPage() {
        return {
            // Données du formulaire
            form: {
                email: '',
                password: ''
            },
            
            // États UI
            loading: false,
            error: null,
            
            /**
             * @action Initialiser le DOM de la page login
             * @checkpoint dom-ready, body avec x-data="loginPage()" présent
             */
            init() {
                console.log('[login-initial-load] DOM ready');
            },
            
            /**
             * @action Vérifier la présence d'un token dans localStorage
             * @checkpoint token-checked, token présent ou absent déterminé
             * @action Si token présent, valider via GET /api/auth/me
             * @checkpoint session-verified, réponse API reçue
             * @action Si session valide, rediriger vers /dashboard
             * @checkpoint redirect-executed, navigation vers dashboard
             * @action Afficher le formulaire de login prêt à l'emploi
             * @checkpoint form-ready, champs username/password focusables
             */
            async handleInitialLoad() {
                const token = localStorage.getItem('token');
                console.log('[login-initial-load] Token checked:', token ? 'present' : 'absent');
                
                if (token) {
                    try {
                        const response = await fetch('/api/auth/me', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            console.log('[login-initial-load] Session verified');
                            
                            // Met à jour le store
                            Alpine.store('auth').setAuth(token, data.user);
                            
                            // Redirection
                            console.log('[login-initial-load] Redirect to /dashboard');
                            window.location.href = '/dashboard';
                            return;
                        } else {
                            console.log('[login-initial-load] Token invalid, clearing');
                            localStorage.removeItem('token');
                            Alpine.store('auth').clearAuth();
                        }
                    } catch (err) {
                        console.error('[login-initial-load] Error verifying token:', err);
                        localStorage.removeItem('token');
                        Alpine.store('auth').clearAuth();
                    }
                }
                
                console.log('[login-initial-load] Form ready');
            },
            
            /**
             * @action Valider le format de l'email
             * @checkpoint email-validated, format email vérifié
             * @action Appeler l'API d'authentification SQLite
             * @checkpoint api-called, réponse reçue
             * @action Stocker le token et les données utilisateur
             * @checkpoint auth-stored, données persistées dans store et localStorage
             * @action Rediriger vers /dashboard en cas de succès
             * @checkpoint redirect-success, navigation effectuée
             * @action Afficher message d'erreur en cas d'échec
             * @checkpoint error-displayed, message utilisateur visible
             */
            async handleLogin() {
                // 1. Validate form
                if (!this.form.email || !this.form.password) {
                    this.error = 'Veuillez remplir tous les champs';
                    return;
                }
                
                // Validation email simple
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(this.form.email)) {
                    this.error = 'Veuillez entrer un email valide';
                    return;
                }
                
                // 2. Set loading
                this.loading = true;
                this.error = null;
                
                try {
                    // 3. Call auth API
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: this.form.email,
                            password: this.form.password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Échec de connexion');
                    }
                    
                    // 4. Store auth data
                    Alpine.store('auth').setAuth(data.token, data.user);
                    
                    // 5. Persist token (déjà fait dans setAuth)
                    console.log('[auth-submit] Token stored');
                    
                    // 6. Redirect
                    console.log('[auth-submit] Redirect to /dashboard');
                    window.location.href = '/dashboard';
                    
                } catch (error) {
                    this.error = error.message;
                    console.error('[auth-submit] Login error:', error.message);
                } finally {
                    this.loading = false;
                }
            }
        }
    }
</script>
{% endblock %}
