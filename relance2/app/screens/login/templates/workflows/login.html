<!-- Workflow: login-initial-load -->
<!-- Écran: login -->
<div x-data="loginPage()" x-init="initPage()" class="w-full max-w-md px-6">
    <div class="bg-gray-800 rounded-lg shadow-xl p-8 border border-gray-700">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Marki</h1>
            <p class="text-gray-400">Connexion à votre espace</p>
        </div>
        
        <!-- Loading State (vérification token) -->
        <div x-show="checkingSession" class="text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <p class="text-gray-400 mt-4">Vérification de la session...</p>
        </div>
        
        <!-- Formulaire -->
        <form x-show="!checkingSession" @submit.prevent="handleLogin" class="space-y-6">
            <!-- Error Message -->
            <div x-show="error" x-transition class="bg-red-900/50 border border-red-500 rounded-md p-4 flex items-start">
                <svg class="w-5 h-5 text-red-400 mt-0.5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p x-text="error" class="text-red-200 text-sm"></p>
            </div>
            
            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input 
                    type="email" 
                    id="email"
                    x-model="form.email"
                    :disabled="loading"
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed"
                    placeholder="admin@marki.fr"
                    required
                >
            </div>
            
            <!-- Password Field -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Mot de passe</label>
                <input 
                    type="password" 
                    id="password"
                    x-model="form.password"
                    :disabled="loading"
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-md text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-50 disabled:cursor-not-allowed"
                    placeholder="••••••••"
                    required
                >
            </div>
            
            <!-- Submit Button -->
            <button 
                type="submit"
                :disabled="loading || !form.email || !form.password"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
            >
                <span x-show="loading" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Connexion en cours...
                </span>
                <span x-show="!loading">Se connecter</span>
            </button>
        </form>
        
        <!-- Footer -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
                <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">Mot de passe oublié ?</a>
            </p>
        </div>
    </div>
</div>

<script>
    function loginPage() {
        return {
            // Data
            form: {
                email: '',
                password: ''
            },
            
            // UI States
            loading: false,
            error: null,
            checkingSession: true,
            
            /**
             * @checkpoint dom-ready - body avec x-data="loginPage()" présent
             */
            async initPage() {
                /**
                 * @checkpoint token-checked - token présent ou absent déterminé
                 */
                const token = localStorage.getItem('token');
                
                if (token) {
                    /**
                     * @checkpoint session-verified - réponse API reçue
                     */
                    const isValid = await this.verifySession(token);
                    
                    if (isValid) {
                        /**
                         * @checkpoint redirect-executed - navigation vers dashboard
                         */
                        window.location.href = '/dashboard';
                        return;
                    }
                }
                
                /**
                 * @checkpoint form-ready - champs username/password focusables
                 */
                this.checkingSession = false;
            },
            
            /**
             * Vérifie la validité du token via l'API
             */
            async verifySession(token) {
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        Alpine.store('auth').user = data.user;
                        Alpine.store('auth').isAuthenticated = true;
                        return true;
                    }
                } catch (e) {
                    console.error('Erreur vérification session:', e);
                }
                
                // Token invalide, on le supprime
                localStorage.removeItem('token');
                Alpine.store('auth').token = null;
                return false;
            },
            
            /**
             * Gère la soumission du formulaire de login
             */
            async handleLogin() {
                // 1. Validate form
                if (!this.form.email || !this.form.password) {
                    this.error = 'Veuillez remplir tous les champs';
                    return;
                }
                
                // 2. Set loading
                this.loading = true;
                this.error = null;
                
                try {
                    // 3. Call auth API
                    const data = await this.authSubmit(this.form.email, this.form.password);
                    
                    // 4. Store auth data
                    Alpine.store('auth').token = data.token;
                    Alpine.store('auth').user = data.user;
                    Alpine.store('auth').isAuthenticated = true;
                    
                    // 5. Persist token
                    localStorage.setItem('token', data.token);
                    
                    // 6. Redirect
                    window.location.href = '/dashboard';
                    
                } catch (error) {
                    this.error = error.message;
                } finally {
                    this.loading = false;
                }
            },
            
            /**
             * Appel API d'authentification
             * @checkpoint api-called - POST /api/auth/login appelé
             */
            async authSubmit(email, password) {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Échec de connexion');
                }
                
                return await response.json();
            }
        }
    }
</script>
