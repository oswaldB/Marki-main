{% comment %}
Workflow Frontend: auth-submit
Description: Composant de soumission d'authentification réutilisable
Usage: {% include 'workflows/login/auth-submit.html' %}
{% endcomment %}

<script>
/**
 * Fonction utilitaire pour soumettre les identifiants d'authentification
 * @param {string} email - Email de l'utilisateur
 * @param {string} password - Mot de passe
 * @returns {Promise<Object>} - Données de l'utilisateur et token
 */
async function authSubmit(email, password) {
    const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    
    if (!response.ok) {
        const error = await response.json();
        throw new Error(error.error || 'Échec de connexion');
    }
    
    return await response.json();
}

/**
 * Vérifie la validité d'un token existant
 * @param {string} token - Token JWT stocké
 * @returns {Promise<Object|null>} - Données utilisateur si valide, null sinon
 */
async function verifyToken(token) {
    try {
        const response = await fetch('/api/auth/me', {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) return null;
        return await response.json();
    } catch (err) {
        return null;
    }
}
</script>
