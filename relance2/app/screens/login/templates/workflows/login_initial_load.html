{% comment %}
Workflow: login-initial-load
Type: frontend
Screen: login
Description: Charger la page de login et vérifier l'état d'authentification existant
{% endcomment %}

<script>
/**
 * Workflow: login-initial-load
 * 
 * Étapes:
 * 1. @checkpoint dom-ready - body avec x-data="loginPage()" présent
 * 2. @checkpoint token-checked - token présent ou absent déterminé  
 * 3. @checkpoint session-verified - réponse API reçue (si token présent)
 * 4. @checkpoint redirect-executed - navigation vers dashboard (si session valide)
 * 5. @checkpoint form-ready - champs username/password focusables
 */

function workflowLoginInitialLoad() {
    return {
        /**
         * @action Initialiser le DOM de la page login
         * @checkpoint dom-ready, body avec x-data="loginPage()" présent
         */
        init() {
            console.log('[login-initial-load] DOM ready');
            Alpine.store('auth').init();
            this.checkExistingSession();
        },

        /**
         * @action Vérifier la présence d'un token dans localStorage
         * @checkpoint token-checked, token présent ou absent déterminé
         */
        async checkExistingSession() {
            const token = localStorage.getItem('token');
            console.log('[login-initial-load] Token checked:', token ? 'present' : 'absent');
            
            if (token) {
                await this.verifyToken(token);
            } else {
                this.tokenChecked = true;
                this.showForm();
            }
        },

        /**
         * @action Si token présent, valider via GET /api/auth/me
         * @checkpoint session-verified, réponse API reçue
         */
        async verifyToken(token) {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('[login-initial-load] Session verified');
                    Alpine.store('auth').setAuth(token, data.user);
                    
                    /**
                     * @action Si session valide, rediriger vers /dashboard
                     * @checkpoint redirect-executed, navigation vers dashboard
                     */
                    window.location.href = '/dashboard';
                } else {
                    throw new Error('Invalid token');
                }
            } catch (err) {
                console.error('[login-initial-load] Verification failed');
                localStorage.removeItem('token');
                this.showForm();
            }
        },

        /**
         * @action Afficher le formulaire de login prêt à l'emploi
         * @checkpoint form-ready, champs username/password focusables
         */
        showForm() {
            this.loading = false;
            this.tokenChecked = true;
            console.log('[login-initial-load] Form ready');
        }
    };
}
</script>
