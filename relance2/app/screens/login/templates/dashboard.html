<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Marki</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100" x-data="dashboardPage()" x-init="init()">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">Marki Relance</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span x-text="$store.auth.user?.username || 'Utilisateur'" class="text-gray-600"></span>
                    <button @click="logout()" class="text-red-600 hover:text-red-800">
                        Déconnexion
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Dashboard</h2>
            <p class="text-gray-600">Bienvenue sur votre tableau de bord !</p>
            
            <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-blue-800">Clients</h3>
                    <p class="text-2xl font-bold text-blue-600 mt-2">0</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-green-800">Relances</h3>
                    <p class="text-2xl font-bold text-green-600 mt-2">0</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <h3 class="font-semibold text-purple-800">Paiements</h3>
                    <p class="text-2xl font-bold text-purple-600 mt-2">0</p>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        function dashboardPage() {
            return {
                init() {
                    // Vérifier l'authentification au chargement
                    const token = localStorage.getItem('token');
                    if (!token) {
                        window.location.href = '/login';
                        return;
                    }
                    
                    // Initialiser le store auth si pas déjà fait
                    if (!Alpine.store('auth').token) {
                        Alpine.store('auth').token = token;
                        // Charger les infos utilisateur
                        this.loadUser();
                    }
                },
                
                async loadUser() {
                    try {
                        const response = await fetch('/api/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            Alpine.store('auth').user = data.user;
                            Alpine.store('auth').isAuthenticated = true;
                        } else {
                            this.logout();
                        }
                    } catch (err) {
                        console.error('Erreur chargement utilisateur:', err);
                    }
                },
                
                logout() {
                    localStorage.removeItem('token');
                    Alpine.store('auth').token = null;
                    Alpine.store('auth').user = null;
                    Alpine.store('auth').isAuthenticated = false;
                    window.location.href = '/login';
                }
            }
        }
        
        document.addEventListener('alpine:init', () => {
            Alpine.store('auth', {
                token: null,
                user: null,
                isAuthenticated: false
            });
        });
    </script>
    
</body>
</html>
