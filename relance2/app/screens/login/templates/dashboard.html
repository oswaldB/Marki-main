{% extends "base.html" %}

{% block title %}Dashboard - Marki Relance{% endblock %}

{% block content %}
<div x-data="dashboardPage()" x-init="initPage()" class="min-h-screen bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold text-gray-900">Marki Relance</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600" x-text="'Bonjour, ' + (user?.username || '...')"></span>
                    <button @click="logout" 
                            class="text-sm text-red-600 hover:text-red-800 font-medium">
                        Déconnexion
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="border-4 border-dashed border-gray-200 rounded-lg h-96 flex items-center justify-center">
                <p class="text-gray-500 text-lg">Dashboard - Contenu à venir</p>
            </div>
        </div>
    </main>
</div>

<script>
function dashboardPage() {
    return {
        user: null,
        token: null,
        
        initPage() {
            // Vérifier auth
            this.token = localStorage.getItem('token');
            const userJson = localStorage.getItem('user');
            
            if (!this.token) {
                window.location.href = '/login';
                return;
            }
            
            if (userJson) {
                this.user = JSON.parse(userJson);
            }
            
            // Vérifier validité token avec le serveur
            this.verifyToken();
        },
        
        async verifyToken() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${this.token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Token invalide');
                }
                
                const data = await response.json();
                this.user = data.user;
                localStorage.setItem('user', JSON.stringify(data.user));
                
            } catch (error) {
                this.logout();
            }
        },
        
        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
    }
}
</script>
{% endblock %}
