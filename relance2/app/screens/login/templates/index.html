<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marki Relance</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <!-- Page: Login -->
    <div x-data="loginPage()" x-init="init()" x-cloak class="w-full max-w-md px-4">

        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Marki Relance</h1>
            <p class="text-gray-600">Connectez-vous à votre compte</p>
        </div>

        <!-- Card: Formulaire de login -->
        <div class="bg-white rounded-lg shadow-md p-8">
            
            <!-- Loading Overlay -->
            <div x-show="loading" class="flex justify-center items-center py-12">
                <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="ml-3 text-gray-600">Connexion en cours...</span>
            </div>

            <!-- Formulaire -->
            <form x-show="!loading" @submit.prevent="handleLogin()" class="space-y-6">
                
                <!-- Champ Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Email
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        x-model="form.email"
                        @input="error = null"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="admin@marki.fr"
                        required
                        autofocus
                    >
                </div>

                <!-- Champ Mot de passe -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Mot de passe
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        x-model="form.password"
                        @input="error = null"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="••••••••"
                        required
                    >
                </div>

                <!-- Message d'erreur -->
                <div x-show="error" x-transition class="bg-red-50 border border-red-200 rounded-md p-3">
                    <p class="text-sm text-red-600" x-text="error"></p>
                </div>

                <!-- Bouton de connexion -->
                <button 
                    type="submit" 
                    :disabled="loading || !form.email || !form.password"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading">Connexion...</span>
                </button>

                <!-- Info de test -->
                <div class="text-center text-xs text-gray-400 mt-4">
                    <p>Test: admin@marki.fr / admin</p>
                </div>
            </form>
        </div>

    </div>

    <!-- Stores Alpine.js -->
    <script>
        document.addEventListener('alpine:init', () => {
            
            // Store: auth
            Alpine.store('auth', {
                token: null,
                user: null,
                isAuthenticated: false,
                
                init() {
                    // Restaure depuis localStorage au chargement
                    const savedToken = localStorage.getItem('token');
                    if (savedToken) {
                        this.token = savedToken;
                    }
                },
                
                setAuth(token, user) {
                    this.token = token;
                    this.user = user;
                    this.isAuthenticated = true;
                    localStorage.setItem('token', token);
                },
                
                clearAuth() {
                    this.token = null;
                    this.user = null;
                    this.isAuthenticated = false;
                    localStorage.removeItem('token');
                }
            });

            // Store: ui
            Alpine.store('ui', {
                toast: null,
                
                showToast(message, type = 'info') {
                    this.toast = { message, type };
                    setTimeout(() => {
                        this.toast = null;
                    }, 3000);
                }
            });
        });
    </script>

    <!-- Page Function: loginPage -->
    <script>
        function loginPage() {
            return {
                // Données du formulaire
                form: {
                    email: '',
                    password: ''
                },
                
                // États UI
                loading: false,
                error: null,
                tokenChecked: false,

                /**
                 * @action Initialiser le DOM de la page login
                 * @checkpoint dom-ready, body avec x-data="loginPage()" présent
                 */
                async init() {
                    console.log('[login-initial-load] DOM ready');
                    
                    // Initialise le store auth
                    Alpine.store('auth').init();
                    
                    // Vérifie si token existe
                    await this.checkExistingSession();
                },

                /**
                 * @action Vérifier la présence d'un token dans localStorage
                 * @checkpoint token-checked, token présent ou absent déterminé
                 */
                async checkExistingSession() {
                    const token = localStorage.getItem('token');
                    console.log('[login-initial-load] Token checked:', token ? 'present' : 'absent');
                    
                    if (token) {
                        this.loading = true;
                        await this.verifyToken(token);
                    } else {
                        this.tokenChecked = true;
                    }
                },

                /**
                 * @action Si token présent, valider via GET /api/auth/me
                 * @checkpoint session-verified, réponse API reçue
                 */
                async verifyToken(token) {
                    try {
                        const response = await fetch('/api/auth/me', {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            console.log('[login-initial-load] Session verified:', data.user);
                            
                            // Met à jour le store
                            Alpine.store('auth').setAuth(token, data.user);
                            
                            /**
                             * @action Si session valide, rediriger vers /dashboard
                             * @checkpoint redirect-executed, navigation vers dashboard
                             */
                            window.location.href = '/dashboard';
                            return;
                        } else {
                            // Token invalide, le supprime
                            localStorage.removeItem('token');
                            Alpine.store('auth').clearAuth();
                        }
                    } catch (err) {
                        console.error('[login-initial-load] Token verification failed:', err);
                        localStorage.removeItem('token');
                        Alpine.store('auth').clearAuth();
                    } finally {
                        this.loading = false;
                        this.tokenChecked = true;
                    }
                    
                    /**
                     * @action Afficher le formulaire de login prêt à l'emploi
                     * @checkpoint form-ready, champs username/password focusables
                     */
                    console.log('[login-initial-load] Form ready');
                },

                /**
                 * Workflow: auth-submit
                 * @action Soumettre les identifiants utilisateur pour authentification
                 */
                async handleLogin() {
                    // 1. Validate form
                    if (!this.form.email || !this.form.password) {
                        this.error = 'Veuillez remplir tous les champs';
                        return;
                    }
                    
                    // 2. Set loading
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        // 3. Call auth API
                        const data = await this.authSubmit(this.form.email, this.form.password);
                        
                        // 4. Store auth data
                        Alpine.store('auth').setAuth(data.token, data.user);
                        
                        // 5. Persist token (déjà fait dans setAuth)
                        console.log('[auth-submit] Auth data stored');
                        
                        // 6. Redirect
                        window.location.href = '/dashboard';
                        
                    } catch (error) {
                        this.error = error.message;
                        console.error('[auth-submit] Login failed:', error);
                    } finally {
                        this.loading = false;
                    }
                },

                /**
                 * Appel API: POST /api/auth/login
                 */
                async authSubmit(email, password) {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ email, password })
                    });
                    
                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Échec de connexion');
                    }
                    
                    return await response.json();
                }
            };
        }
    </script>

</body>
</html>
