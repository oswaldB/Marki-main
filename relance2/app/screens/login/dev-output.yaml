  - chemin: templates/index.html
    contenu: |
      {% extends "alpinejs.html" %}

      {% block title %}Login - Marki{% endblock %}

      {% block content %}
      <div x-data="loginPage()" x-init="init()" class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
          <div class="max-w-md w-full space-y-8">
              <div>
                  <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                      Connexion à Marki
                  </h2>
                  <p class="mt-2 text-center text-sm text-gray-600">
                      Entrez vos identifiants pour accéder au tableau de bord
                  </p>
              </div>
              
              <form class="mt-8 space-y-6" @submit.prevent="handleLogin">
                  <div class="rounded-md shadow-sm -space-y-px">
                      <div>
                          <label for="email" class="sr-only">Adresse email</label>
                          <input id="email" name="email" type="email" required 
                              class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                              placeholder="Adresse email"
                              x-model="form.email"
                              :disabled="loading">
                      </div>
                      <div>
                          <label for="password" class="sr-only">Mot de passe</label>
                          <input id="password" name="password" type="password" required 
                              class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                              placeholder="Mot de passe"
                              x-model="form.password"
                              :disabled="loading">
                      </div>
                  </div>

                  <div x-show="error" x-transition class="rounded-md bg-red-50 p-4">
                      <div class="flex">
                          <div class="flex-shrink-0">
                              <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                              </svg>
                          </div>
                          <div class="ml-3">
                              <p class="text-sm text-red-700" x-text="error"></p>
                          </div>
                      </div>
                  </div>

                  <div>
                      <button type="submit" 
                          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                          :disabled="loading"
                          :class="{ 'opacity-75 cursor-not-allowed': loading }">
                          <span x-show="!loading">Se connecter</span>
                          <span x-show="loading" class="flex items-center">
                              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                              </svg>
                              Connexion...
                          </span>
                      </button>
                  </div>
              </form>
          </div>
      </div>
      {% endblock %}

      {% block scripts %}
      <script>
          // Auth Store
          document.addEventListener('alpine:init', () => {
              Alpine.store('auth', {
                  token: null,
                  user: null,
                  isAuthenticated: false,
                  
                  init() {
                      const token = localStorage.getItem('token');
                      if (token) {
                          this.token = token;
                          this.isAuthenticated = true;
                      }
                  }
              });

              Alpine.store('ui', {
                  loading: false,
                  error: null
              });
          });

          // Login Page Component
          function loginPage() {
              return {
                  form: {
                      email: '',
                      password: ''
                  },
                  loading: false,
                  error: null,

                  async init() {
                      // @checkpoint: dom-ready, body avec x-data="loginPage()" présent
                      
                      // @checkpoint: token-checked, token présent ou absent déterminé
                      const token = localStorage.getItem('token');
                      
                      if (token) {
                          // @checkpoint: session-verified, réponse API reçue
                          try {
                              const response = await fetch('/api/auth/me', {
                                  headers: {
                                      'Authorization': `Bearer ${token}`
                                  }
                              });
                              
                              if (response.ok) {
                                  const data = await response.json();
                                  Alpine.store('auth').user = data.user;
                                  Alpine.store('auth').isAuthenticated = true;
                                  
                                  // @checkpoint: redirect-executed, navigation vers dashboard
                                  window.location.href = '/dashboard';
                                  return;
                              } else {
                                  localStorage.removeItem('token');
                              }
                          } catch (err) {
                              localStorage.removeItem('token');
                          }
                      }
                      
                      // @checkpoint: form-ready, champs username/password focusables
                  },

                  async handleLogin() {
                      // 1. Validate form
                      if (!this.form.email || !this.form.password) {
                          this.error = 'Veuillez remplir tous les champs';
                          return;
                      }
                      
                      // Validate email format
                      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                      if (!emailRegex.test(this.form.email)) {
                          this.error = 'Veuillez entrer une adresse email valide';
                          return;
                      }
                      
                      // 2. Set loading
                      this.loading = true;
                      this.error = null;
                      
                      try {
                          // 3. Call auth API
                          const data = await authSubmit(this.form.email, this.form.password);
                          
                          // 4. Store auth data
                          Alpine.store('auth').token = data.token;
                          Alpine.store('auth').user = data.user;
                          Alpine.store('auth').isAuthenticated = true;
                          
                          // 5. Persist token
                          localStorage.setItem('token', data.token);
                          
                          // 6. Redirect
                          window.location.href = '/dashboard';
                          
                      } catch (error) {
                          this.error = error.message;
                      } finally {
                          this.loading = false;
                      }
                  }
              };
          }

          // Auth Submit Function
          async function authSubmit(email, password) {
              const response = await fetch('/api/auth/login', {
                  method: 'POST',
                  headers: { 
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ email, password })
              });
              
              if (!response.ok) {
                  const error = await response.json();
                  throw new Error(error.error || 'Échec de connexion');
              }
              
              return await response.json();
          }
      </script>
      {% endblock %}

  - chemin: templates/dashboard.html
    contenu: |
      {% extends "alpinejs.html" %}

      {% block title %}Dashboard - Marki{% endblock %}

      {% block content %}
      <div x-data="{}" x-init="checkAuth()" class="min-h-screen bg-gray-100">
          <nav class="bg-white shadow">
              <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div class="flex justify-between h-16">
                      <div class="flex">
                          <div class="flex-shrink-0 flex items-center">
                              <h1 class="text-xl font-bold text-indigo-600">Marki</h1>
                          </div>
                      </div>
                      <div class="flex items-center">
                          <button @click="logout()" class="text-gray-500 hover:text-gray-700 text-sm font-medium">
                              Déconnexion
                          </button>
                      </div>
                  </div>
              </div>
          </nav>
          
          <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
              <div class="px-4 py-6 sm:px-0">
                  <div class="border-4 border-dashed border-gray-200 rounded-lg h-96 flex items-center justify-center">
                      <p class="text-gray-500 text-lg">Bienvenue sur le tableau de bord</p>
                  </div>
              </div>
          </main>
      </div>
      {% endblock %}

      {% block scripts %}
      <script>
          function checkAuth() {
              const token = localStorage.getItem('token');
              if (!token) {
                  window.location.href = '/login';
                  return;
              }
              
              // Verify token validity
              fetch('/api/auth/me', {
                  headers: {
                      'Authorization': `Bearer ${token}`
                  }
              }).then(response => {
                  if (!response.ok) {
                      localStorage.removeItem('token');
                      window.location.href = '/login';
                  }
              }).catch(() => {
                  localStorage.removeItem('token');
                  window.location.href = '/login';
              });
          }

          function logout() {
              localStorage.removeItem('token');
              window.location.href = '/login';
          }
      </script>
      {% endblock %}

