    contenu: |
      """
      Model: Authentication & User
      """
      from datetime import datetime, timedelta
      import jwt
      import os

      JWT_SECRET = os.environ.get('JWT_SECRET', 'dev-secret-key-change-in-production')

      class User:
          """User model representing authenticated user"""
          def __init__(self, id, username, email, role, password_hash=None):
              self.id = id
              self.username = username
              self.email = email
              self.role = role
              self._password_hash = password_hash
          
          def to_dict(self):
              """Return user data without sensitive info"""
              return {
                  'id': self.id,
                  'username': self.username,
                  'email': self.email,
                  'role': self.role
              }

      class AuthLocal:
          """
          Local authentication handler
          JWT token generation and verification
          """
          
          @staticmethod
          def generate_token(user_id, expires_hours=24):
              """
              Generate JWT token for user
              
              @param {str} user_id - User identifier
              @param {int} expires_hours - Token expiration time
              @returns {str} JWT token
              """
              payload = {
                  'user_id': user_id,
                  'exp': datetime.utcnow() + timedelta(hours=expires_hours),
                  'iat': datetime.utcnow()
              }
              return jwt.encode(payload, JWT_SECRET, algorithm='HS256')
          
          @staticmethod
          def verify_token(token):
              """
              Verify JWT token validity
              
              @param {str} token - JWT token to verify
              @returns {dict|None} Token payload or None if invalid
              """
              try:
                  payload = jwt.decode(token, JWT_SECRET, algorithms=['HS256'])
                  return payload
              except jwt.ExpiredSignatureError:
                  return None
              except jwt.InvalidTokenError:
                  return None
          
          @staticmethod
          def hash_password(password):
              """
              Hash password for storage
              Uses Werkzeug security in production
              """
              from werkzeug.security import generate_password_hash
              return generate_password_hash(password)
          
          @staticmethod
          def verify_password(stored_hash, password):
              """
              Verify password against stored hash
              """
              from werkzeug.security import check_password_hash
              return check_password_hash(stored_hash, password)

  - chemin: login/templates/login.html
    contenu: |
      <!DOCTYPE html>
      <html lang="fr">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Login - Marki</title>
          
          <!-- Tailwind CSS -->
          <script src="https://cdn.tailwindcss.com"></script>
          
          <!-- Alpine.js -->
          <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
          
          <style>
              [x-cloak] { display: none !important; }
          </style>
      </head>
      <body class="bg-gray-50 min-h-screen flex items-center justify-center">
          
          <div x-data="loginPage()" x-init="initPage()" class="w-full max-w-md px-4">
              
              <!-- Logo/Header -->
              <div class="text-center mb-8">
                  <h1 class="text-3xl font-bold text-gray-900 mb-2">Marki</h1>
                  <p class="text-gray-600">Connexion à votre espace</p>
              </div>
              
              <!-- Login Card -->
              <div class="bg-white rounded-lg shadow-md p-8">
                  
                  <!-- Error Message -->
                  <div x-show="error" 
                       x-transition
                       class="mb-4 p-4 bg-red-50 border border-red-200 rounded-md">
                      <p class="text-red-600 text-sm" x-text="error"></p>
                  </div>
                  
                  <!-- Loading State (Initial verification) -->
                  <div x-show="loading && !formReady" 
                       x-cloak
                       class="text-center py-8">
                      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                      <p class="mt-2 text-gray-600 text-sm">Vérification de la session...</p>
                  </div>
                  
                  <!-- Login Form -->
                  <form x-show="formReady" 
                          x-transition
                          @submit.prevent="handleLogin()"
                          class="space-y-6">
                      
                      <!-- Email Field -->
                      <div>
                          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                              Email
                          </label>
                          <input 
                              type="email" 
                              id="email"
                              x-model="form.email"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              placeholder="admin@marki.fr"
                              required
                              :disabled="loading">
                      </div>
                      
                      <!-- Password Field -->
                      <div>
                          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                              Mot de passe
                          </label>
                          <input 
                              type="password" 
                              id="password"
                              x-model="form.password"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              placeholder="••••••••"
                              required
                              :disabled="loading">
                      </div>
                      
                      <!-- Submit Button -->
                      <button 
                          type="submit"
                          :disabled="loading"
                          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
                          
                          <span x-show="!loading">Se connecter</span>
                          <span x-show="loading" class="flex items-center">
                              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                              </svg>
                              Connexion...
                          </span>
                      </button>
                  </form>
                  
                  <!-- Demo credentials hint -->
                  <div x-show="formReady" class="mt-6 text-center text-xs text-gray-500">
                      <p>Demo: admin@marki.fr / admin123</p>
                  </div>
              </div>
          </div>
          
          <!-- Workflow: Initial Load -->
          {% include 'workflows/initial-load.html' %}
          
          <!-- Workflow: Auth Submit -->
          {% include 'workflows/auth-submit.html' %}
          
          <script>
              // Global stores
              document.addEventListener('alpine:init', () => {
                  Alpine.store('auth', {
                      token: null,
                      user: null,
                      isAuthenticated: false
                  });
                  
                  Alpine.store('ui', {
                      theme: 'light',
                      sidebarOpen: false
                  });
              });
          </script>
          
      </body>
      </html>

  - chemin: login/templates/workflows/initial-load.html
    contenu: |
      {% raw %}
      <!--
      Workflow: login-initial-load
      Description: Charger la page de login et vérifier l'état d'authentification existant
      -->
      <script>
          // Workflow Initial Load - Included in login.html
          // This script extends the loginPage function with init logic
          
          // Store original loginPage if exists, or create new
          window.loginPageOriginal = window.loginPage;
          
          function loginPage() {
              return {
                  // Data Model
                  form: {
                      email: '',
                      password: ''
                  },
                  loading: false,
                  error: null,
                  formReady: false,
                  
                  /**
                   * @action Initialiser le DOM de la page login
                   * @checkpoint dom-ready, body avec x-data="loginPage()" présent
                   */
                  initPage() {
                      console.log('[WF] initial-load: DOM ready');
                      
                      /**
                       * @action Vérifier la présence d'un token dans localStorage
                       * @checkpoint token-checked, token présent ou absent déterminé
                       */
                      const token = localStorage.getItem('token');
                      console.log('[WF] initial-load: Token checked, present:', !!token);
                      
                      if (token) {
                          this.loading = true;
                          
                          /**
                           * @action Si token présent, valider via GET /api/auth/me
                           * @checkpoint session-verified, réponse API reçue
                           */
                          fetch('/api/auth/me', {
                              method: 'GET',
                              headers: {
                                  'Authorization': `Bearer ${token}`
                              }
                          })
                          .then(response => {
                              if (response.ok) {
                                  return response.json();
                              }
                              throw new Error('Session invalide');
                          })
                          .then(data => {
                              /**
                               * @action Si session valide, rediriger vers /dashboard
                               * @checkpoint redirect-executed, navigation vers dashboard
                               */
                              console.log('[WF] initial-load: Session verified, redirecting');
                              Alpine.store('auth').token = token;
                              Alpine.store('auth').user = data;
                              Alpine.store('auth').isAuthenticated = true;
                              
                              window.location.href = '/dashboard';
                          })
                          .catch(err => {
                              console.log('[WF] initial-load: Session verification failed', err);
                              localStorage.removeItem('token');
                              this.loading = false;
                              /**
                               * @action Afficher le formulaire de login prêt à l'emploi
                               * @checkpoint form-ready, champs username/password focusables
                               */
                              this.formReady = true;
                          });
                      } else {
                          /**
                           * @action Afficher le formulaire de login prêt à l'emploi
                           * @checkpoint form-ready, champs username/password focusables
                           */
                          this.formReady = true;
                      }
                  },
                  
                  // Placeholder - implemented in auth-submit.html
                  handleLogin() {}
              };
          }
      </script>
      {% endraw %}

  - chemin: login/templates/workflows/auth-submit.html
    contenu: |
      {% raw %}
      <!--
      Workflow: login-auth-submit
      Description: Soumettre les identifiants utilisateur pour authentification
      -->
      <script>
          // Workflow Auth Submit - Overrides handleLogin in loginPage
          
          // Extend loginPage with auth submit functionality
          const originalLoginPage = loginPage;
          
          loginPage = function() {
              const self = originalLoginPage();
              
              /**
               * Override handleLogin with auth submit workflow
               */
              self.handleLogin = async function() {
                  const email = this.form.email;
                  const password = this.form.password;
                  
                  /**
                   * @action Validate form
                   * Vérifie que email et password sont présents
                   */
                  if (!email || !password) {
                      this.error = 'Veuillez remplir tous les champs';
                      return;
                  }
                  
                  /**
                   * @action Set loading state
                   * Modifications: loading → true, error ← null
                   */
                  this.loading = true;
                  this.error = null;
                  
                  try {
                      /**
                       * @action Call auth API
                       * POST /api/auth/login avec JSON body
                       */
                      const response = await fetch('/api/auth/login', {
                          method: 'POST',
                          headers: {
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ email, password })
                      });
                      
                      if (!response.ok) {
                          const errorData = await response.json();
                          throw new Error(errorData.error || 'Échec de connexion');
                      }
                      
                      /**
                       * @action Store auth data
                       * Récupère token et user depuis réponse
                       */
                      const data = await response.json();
                      
                      /**
                       * @action Persist token
                       * Sauvegarde dans localStorage et Alpine store
                       */
                      localStorage.setItem('token', data.token);
                      Alpine.store('auth').token = data.token;
                      Alpine.store('auth').user = data.user;
                      Alpine.store('auth').isAuthenticated = true;
                      
                      /**
                       * @action Redirect to dashboard
                       * Navigation vers /dashboard en cas de succès
                       */
                      window.location.href = '/dashboard';
                      
                  } catch (error) {
                      /**
                       * @action Display error
                       * Affiche message d'erreur en cas d'échec
                       * Modifications: error ← message
                       */
                      this.error = error.message;
                  } finally {
                      /**
                       * @action Reset loading state
                       * Modifications: loading → false
                       */
                      this.loading = false;
                  }
              };
              
              return self;
          };
      </script>
      {% endraw %}

