  - chemin: templates/alpinejs.html
    contenu: |
      <!-- Alpine.js Stores Configuration -->
      <script>
          document.addEventListener('alpine:init', () => {
              // Store d'authentification
              Alpine.store('auth', {
                  token: localStorage.getItem('token') || null,
                  user: null,
                  isAuthenticated: false,
                  
                  init() {
                      if (this.token) {
                          this.isAuthenticated = true;
                      }
                  },
                  
                  setAuth(token, user) {
                      this.token = token;
                      this.user = user;
                      this.isAuthenticated = true;
                      localStorage.setItem('token', token);
                  },
                  
                  clearAuth() {
                      this.token = null;
                      this.user = null;
                      this.isAuthenticated = false;
                      localStorage.removeItem('token');
                  }
              });
              
              // Store UI global
              Alpine.store('ui', {
                  loading: false,
                  error: null,
                  success: null,
                  
                  setLoading(value) {
                      this.loading = value;
                  },
                  
                  setError(message) {
                      this.error = message;
                      this.success = null;
                  },
                  
                  setSuccess(message) {
                      this.success = message;
                      this.error = null;
                  },
                  
                  clearMessages() {
                      this.error = null;
                      this.success = null;
                  }
              });
          });
      </script>

  - chemin: templates/login.html
    contenu: |
      <!DOCTYPE html>
      <html lang="fr">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Login - Marki</title>
          
          <!-- Tailwind CSS CDN -->
          <script src="https://cdn.tailwindcss.com"></script>
          
          <!-- Alpine.js -->
          <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
          
          <!-- Alpine.js Stores -->
          {% include 'alpinejs.html' %}
          
          <style>
              [x-cloak] { display: none !important; }
          </style>
      </head>
      <body class="bg-gray-50 min-h-screen flex items-center justify-center"
            x-data="loginPage()" 
            x-init="initPage()">
          
          <div class="max-w-md w-full mx-4">
              <!-- Card -->
              <div class="bg-white rounded-lg shadow-md p-8">
                  <!-- Header -->
                  <div class="text-center mb-8">
                      <h1 class="text-2xl font-bold text-gray-900">Connexion</h1>
                      <p class="text-gray-600 mt-2">Accédez à votre espace Marki</p>
                  </div>
                  
                  <!-- Error Message -->
                  <div x-show="error" 
                       x-transition
                       class="mb-4 p-4 bg-red-50 border border-red-200 rounded-md"
                       x-cloak>
                      <p class="text-red-700 text-sm" x-text="error"></p>
                  </div>
                  
                  <!-- Loading State -->
                  <div x-show="loading" class="text-center py-8" x-cloak>
                      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                      <p class="text-gray-600 mt-2">Connexion en cours...</p>
                  </div>
                  
                  <!-- Login Form -->
                  <form x-show="!loading" 
                        @submit.prevent="handleLogin()"
                        class="space-y-6"
                        x-cloak>
                      
                      <!-- Email Field -->
                      <div>
                          <label for="email" class="block text-sm font-medium text-gray-700">
                              Email
                          </label>
                          <input type="email" 
                                 id="email"
                                 x-model="form.email"
                                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                                 placeholder="admin@marki.fr"
                                 required>
                      </div>
                      
                      <!-- Password Field -->
                      <div>
                          <label for="password" class="block text-sm font-medium text-gray-700">
                              Mot de passe
                          </label>
                          <input type="password" 
                                 id="password"
                                 x-model="form.password"
                                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                                 placeholder="••••••••"
                                 required>
                      </div>
                      
                      <!-- Submit Button -->
                      <button type="submit"
                              :disabled="loading"
                              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
                          Se connecter
                      </button>
                  </form>
                  
                  <!-- Footer -->
                  <div class="mt-6 text-center">
                      <p class="text-sm text-gray-600">
                          Mot de passe oublié ? 
                          <a href="#" class="font-medium text-blue-600 hover:text-blue-500">
                              Contactez l'administrateur
                          </a>
                      </p>
                  </div>
              </div>
          </div>
          
          <!-- Workflow Frontend -->
          <script>
              async function authSubmit(email, password) {
                  const response = await fetch('/api/auth/login', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ email, password })
                  });
                  
                  if (!response.ok) {
                      const error = await response.json();
                      throw new Error(error.error || 'Échec de connexion');
                  }
                  
                  return await response.json();
              }
              
              async function verifyToken(token) {
                  const response = await fetch('/api/auth/me', {
                      method: 'GET',
                      headers: { 
                          'Authorization': `Bearer ${token}`,
                          'Content-Type': 'application/json'
                      }
                  });
                  
                  if (!response.ok) {
                      return null;
                  }
                  
                  return await response.json();
              }
              
              function loginPage() {
                  return {
                      // Data Model
                      form: {
                          email: '',
                          password: ''
                      },
                      loading: false,
                      error: null,
                      
                      /**
                       * @checkpoint dom-ready - body avec x-data="loginPage()" présent
                       */
                      async initPage() {
                          /**
                           * @checkpoint token-checked - token présent ou absent déterminé
                           */
                          const token = localStorage.getItem('token');
                          
                          if (token) {
                              /**
                               * @checkpoint session-verified - réponse API reçue
                               */
                              const data = await verifyToken(token);
                              
                              if (data) {
                                  // Session valide, mettre à jour le store
                                  Alpine.store('auth').setAuth(data.token, data.user);
                                  
                                  /**
                                   * @checkpoint redirect-executed - navigation vers dashboard
                                   */
                                  window.location.href = '/dashboard';
                                  return;
                              } else {
                                  // Token invalide, le supprimer
                                  Alpine.store('auth').clearAuth();
                              }
                          }
                          
                          /**
                           * @checkpoint form-ready - champs email/password focusables
                           */
                          this.$nextTick(() => {
                              this.$refs.emailInput?.focus();
                          });
                      },
                      
                      /**
                       * @action Valider et soumettre le formulaire
                       */
                      async handleLogin() {
                          // 1. Validate form
                          if (!this.form.email || !this.form.password) {
                              this.error = 'Veuillez remplir tous les champs';
                              return;
                          }
                          
                          // Validation email
                          if (!this.form.email.includes('@')) {
                              this.error = 'Veuillez entrer un email valide';
                              return;
                          }
                          
                          // 2. Set loading
                          this.loading = true;
                          this.error = null;
                          
                          try {
                              // 3. Call auth API
                              const data = await authSubmit(this.form.email, this.form.password);
                              
                              // 4. Store auth data
                              Alpine.store('auth').setAuth(data.token, data.user);
                              
                              // 5. Redirect
                              window.location.href = '/dashboard';
                              
                          } catch (error) {
                              this.error = error.message;
                          } finally {
                              this.loading = false;
                          }
                      }
                  }
              }
          </script>
      </body>
      </html>

