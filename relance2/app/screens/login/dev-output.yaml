      <!DOCTYPE html>
      <html lang="fr">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Login - Marki Relance</title>
          <script src="https://cdn.tailwindcss.com"></script>
          <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
          <style>
              [x-cloak] { display: none !important; }
          </style>
      </head>
      <body class="bg-gray-100 min-h-screen flex items-center justify-center">
          {% include 'workflows/login-initial-load.html' %}
          
          <div x-data="loginPage()" x-init="init()" x-cloak class="w-full max-w-md">
              <div class="bg-white rounded-lg shadow-md p-8">
                  <div class="text-center mb-8">
                      <h1 class="text-2xl font-bold text-gray-800">Connexion</h1>
                      <p class="text-gray-600 mt-2">Accédez à votre espace</p>
                  </div>
                  
                  <!-- Loading state -->
                  <div x-show="loading" class="text-center py-8">
                      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                      <p class="text-gray-600 mt-4">Connexion en cours...</p>
                  </div>
                  
                  <!-- Error message -->
                  <div x-show="error" x-transition class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                      <span x-text="error"></span>
                  </div>
                  
                  <!-- Login form -->
                  <form x-show="!loading" @submit.prevent="handleLogin()" class="space-y-6">
                      <div>
                          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                          <input 
                              type="email" 
                              id="email"
                              x-model="form.email"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                              placeholder="admin@marki.fr"
                              required
                          >
                      </div>
                      
                      <div>
                          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                          <input 
                              type="password" 
                              id="password"
                              x-model="form.password"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                              placeholder="Votre mot de passe"
                              required
                          >
                      </div>
                      
                      <button 
                          type="submit"
                          :disabled="loading || !form.email || !form.password"
                          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center"
                      >
                          <span x-show="!loading">Se connecter</span>
                          <span x-show="loading">Connexion...</span>
                      </button>
                  </form>
                  
                  <!-- Initial loading check -->
                  <div x-show="checkingSession" class="text-center py-8">
                      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
                      <p class="text-gray-600 mt-2 text-sm">Vérification de la session...</p>
                  </div>
              </div>
          </div>
          
          {% include 'workflows/auth-submit.html' %}
      </body>
      </html>

