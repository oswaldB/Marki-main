  - chemin: templates/workflows/login-initial-load.html
    contenu: |
      <!-- 
      Workflow: login-initial-load
      Description: Chargement initial Login - vérifie session existante et redirige si nécessaire
      Screen: login
      -->
      <script>
          document.addEventListener('alpine:init', () => {
              Alpine.store('auth', {
                  token: null,
                  user: null,
                  isAuthenticated: false,
                  
                  init() {
                      const savedToken = localStorage.getItem('token');
                      if (savedToken) {
                          this.token = savedToken;
                      }
                  }
              });
              
              Alpine.store('ui', {
                  loading: false,
                  error: null
              });
          });
          
          /**
           * @action Initialiser le DOM de la page login
           * @checkpoint dom-ready, body avec x-data="loginPage()" présent
           */
          function loginPage() {
              return {
                  form: {
                      email: '',
                      password: ''
                  },
                  loading: false,
                  error: null,
                  checkingSession: true,
                  
                  /**
                   * @action Vérifier la présence d'un token dans localStorage
                   * @checkpoint token-checked, token présent ou absent déterminé
                   */
                  async init() {
                      const token = localStorage.getItem('token');
                      
                      if (token) {
                          Alpine.store('auth').token = token;
                          
                          /**
                           * @action Si token présent, valider via GET /api/auth/me
                           * @checkpoint session-verified, réponse API reçue
                           */
                          try {
                              const response = await fetch('/api/auth/me', {
                                  method: 'GET',
                                  headers: {
                                      'Authorization': `Bearer ${token}`,
                                      'Content-Type': 'application/json'
                                  }
                              });
                              
                              if (response.ok) {
                                  const data = await response.json();
                                  Alpine.store('auth').user = data.user;
                                  Alpine.store('auth').isAuthenticated = true;
                                  
                                  /**
                                   * @action Si session valide, rediriger vers /dashboard
                                   * @checkpoint redirect-executed, navigation vers dashboard
                                   */
                                  window.location.href = '/dashboard';
                                  return;
                              } else {
                                  // Token invalid, clear it
                                  localStorage.removeItem('token');
                                  Alpine.store('auth').token = null;
                              }
                          } catch (error) {
                              console.error('Session verification failed:', error);
                              localStorage.removeItem('token');
                              Alpine.store('auth').token = null;
                          }
                      }
                      
                      /**
                       * @action Afficher le formulaire de login prêt à l'emploi
                       * @checkpoint form-ready, champs username/password focusables
                       */
                      this.checkingSession = false;
                      
                      // Auto-focus email field
                      this.$nextTick(() => {
                          const emailInput = document.getElementById('email');
                          if (emailInput) emailInput.focus();
                      });
                  },
                  
                  /**
                   * Soumission du formulaire de connexion
                   * Workflow: auth-submit
                   */
                  async handleLogin() {
                      /**
                       * @action Valider le format de l'email
                       */
                      const emailRegex = /^[^@]+@[^@]+\.[^@]+$/;
                      if (!emailRegex.test(this.form.email)) {
                          this.error = 'Veuillez entrer un email valide';
                          return;
                      }
                      
                      /**
                       * @action Validate form
                       */
                      if (!this.form.email || !this.form.password) {
                          this.error = 'Veuillez remplir tous les champs';
                          return;
                      }
                      
                      /**
                       * @action Set loading
                       * Modification: loading → true
                       */
                      this.loading = true;
                      this.error = null;
                      Alpine.store('ui').loading = true;
                      Alpine.store('ui').error = null;
                      
                      try {
                          /**
                           * @action Call auth API
                           * POST /api/auth/login
                           */
                          const response = await fetch('/api/auth/login', {
                              method: 'POST',
                              headers: {
                                  'Content-Type': 'application/json'
                              },
                              body: JSON.stringify({
                                  email: this.form.email,
                                  password: this.form.password
                              })
                          });
                          
                          if (!response.ok) {
                              const errorData = await response.json();
                              throw new Error(errorData.error || 'Échec de connexion');
                          }
                          
                          /**
                           * @action Store auth data
                           * @checkpoint auth-success
                           */
                          const data = await response.json();
                          Alpine.store('auth').token = data.token;
                          Alpine.store('auth').user = data.user;
                          Alpine.store('auth').isAuthenticated = true;
                          
                          /**
                           * @action Persist token
                           */
                          localStorage.setItem('token', data.token);
                          
                          /**
                           * @action Redirect
                           * Navigation: /dashboard
                           * Condition: Authentification réussie
                           */
                          window.location.href = '/dashboard';
                          
                      } catch (error) {
                          /**
                           * Modification: error ← message si échec
                           */
                          this.error = error.message;
                          Alpine.store('ui').error = error.message;
                      } finally {
                          /**
                           * Modification: loading → false
                           */
                          this.loading = false;
                          Alpine.store('ui').loading = false;
                      }
                  }
              };
          }
      </script>

  - chemin: templates/workflows/auth-submit.html
    contenu: |
      <!-- 
      Workflow: auth-submit
      Description: Soumission authentification - valide et appelle API d'authentification
      Screen: login
      Depends on: login-initial-load
      -->
      <script>
          /**
           * @action Initialiser le workflow auth-submit
           * @checkpoint auth-submit-ready, fonction exportée disponible
           */
          
          /**
           * Authentification API client
           * POST /api/auth/login
           * 
           * @param {string} email - User email
           * @param {string} password - User password
           * @returns {Promise<Object>} Auth data with token and user
           * @throws {Error} If authentication fails
           */
          async function authSubmit(email, password) {
              const response = await fetch('/api/auth/login', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ email, password })
              });
              
              if (!response.ok) {
                  const error = await response.json();
                  throw new Error(error.error || 'Échec de connexion');
              }
              
              return await response.json();
          }
          
          /**
           * Alternative: authSubmit as a standalone function for import
           * This can be used by other components
           */
          window.authSubmit = authSubmit;
      </script>

