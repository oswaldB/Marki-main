{% extends "alpinejs.html" %}

{% block title %}Connexion - Marki{% endblock %}

{% block content %}
<div 
    x-data="loginPage()"
    x-init="init()"
    class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
>
    <div class="max-w-md w-full space-y-8">
        <!-- Logo et titre -->
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">
                Connexion
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Accédez à votre espace Marki
            </p>
        </div>
        
        <!-- Formulaire -->
        <form 
            class="mt-8 space-y-6 bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md"
            @submit.prevent="handleLogin()"
        >
            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    Adresse email
                </label>
                <div class="mt-1">
                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        x-model="form.email"
                        :disabled="loading"
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                        placeholder="admin@marki.fr"
                    >
                </div>
            </div>
            
            <!-- Mot de passe -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                    Mot de passe
                </label>
                <div class="mt-1">
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        x-model="form.password"
                        :disabled="loading"
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm dark:bg-gray-700 dark:text-white"
                        placeholder="••••••••"
                    >
                </div>
            </div>
            
            <!-- Message d'erreur -->
            <div 
                x-show="error"
                x-transition
                class="rounded-md bg-red-50 dark:bg-red-900/30 p-4"
            >
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700 dark:text-red-400" x-text="error"></p>
                    </div>
                </div>
            </div>
            
            <!-- Bouton de connexion -->
            <div>
                <button
                    type="submit"
                    :disabled="loading || !form.email || !form.password"
                    :class="{ 'opacity-50 cursor-not-allowed': loading || !form.email || !form.password }"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors duration-200"
                >
                    <span x-show="!loading">Se connecter</span>
                    <span x-show="loading" class="flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Connexion en cours...
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
/**
 * Workflow Frontend: login-initial-load + auth-submit
 * Page Function: loginPage()
 */
function loginPage() {
    return {
        // Données du formulaire
        form: {
            email: '',
            password: ''
        },
        
        // États UI
        loading: false,
        error: null,
        
        /**
         * @action Initialiser le DOM de la page login
         * @checkpoint dom-ready, body avec x-data="loginPage()" présent
         */
        async init() {
            // @action Vérifier la présence d'un token dans localStorage
            // @checkpoint token-checked, token présent ou absent déterminé
            const hasToken = !!localStorage.getItem('token');
            
            if (hasToken) {
                this.loading = true;
                
                try {
                    // @action Si token présent, valider via GET /api/auth/me
                    // @checkpoint session-verified, réponse API reçue
                    const isValid = await Alpine.store('auth').verifyToken();
                    
                    if (isValid) {
                        // @action Si session valide, rediriger vers /dashboard
                        // @checkpoint redirect-executed, navigation vers dashboard
                        window.location.href = '/dashboard';
                        return;
                    }
                } catch (err) {
                    // Token invalide, continuer pour afficher le formulaire
                    Alpine.store('auth').clearAuth();
                } finally {
                    this.loading = false;
                }
            }
            
            // @action Afficher le formulaire de login prêt à l'emploi
            // @checkpoint form-ready, champs username/password focusables
            this.$nextTick(() => {
                document.getElementById('email')?.focus();
            });
        },
        
        /**
         * @action Valider le format de l'email
         */
        validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        },
        
        /**
         * Workflow: auth-submit
         * @action Soumettre les identifiants utilisateur pour authentification
         */
        async handleLogin() {
            // 1. Validate form
            if (!this.form.email || !this.form.password) {
                this.error = 'Veuillez remplir tous les champs';
                return;
            }
            
            if (!this.validateEmail(this.form.email)) {
                this.error = 'Veuillez entrer une adresse email valide';
                return;
            }
            
            // 2. Set loading
            this.loading = true;
            this.error = null;
            
            try {
                // 3. Call auth API
                // API Call: POST /api/auth/login
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: this.form.email,
                        password: this.form.password
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Échec de connexion');
                }
                
                // 4. Store auth data
                Alpine.store('auth').setAuth(data.token, data.user);
                
                // 5. Redirect vers dashboard
                // Navigation: Cible /dashboard, Condition: Authentification réussie
                window.location.href = '/dashboard';
                
            } catch (error) {
                this.error = error.message;
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
