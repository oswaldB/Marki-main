{% extends "alpinejs.html" %}

{% block title %}Workflow Login{% endblock %}

{% block content %}
<!-- 
    Template workflow pour login
    Ce template peut être utilisé pour intégrer le workflow dans d'autres pages
-->
<div x-data="loginWorkflow()" x-init="init()">
    <!-- Le contenu est injecté dynamiquement -->
    <div x-html="renderContent()"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
/**
 * Workflow Login standalone
 * Peut être utilisé comme composant réutilisable
 */
function loginWorkflow() {
    return {
        state: 'idle', // idle, loading, error, success
        
        init() {
            // Initialisation du workflow
            this.checkExistingSession();
        },
        
        async checkExistingSession() {
            const token = localStorage.getItem('token');
            if (token) {
                this.state = 'loading';
                try {
                    const valid = await Alpine.store('auth').verifyToken();
                    if (valid) {
                        window.location.href = '/dashboard';
                    }
                } catch (e) {
                    Alpine.store('auth').clearAuth();
                }
                this.state = 'idle';
            }
        },
        
        renderContent() {
            // Template généré dynamiquement
            return '';
        }
    }
}
</script>
{% endblock %}
