<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div x-data="helloPage" x-init="init()" class="text-center">
        <!-- Titre principal -->
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Hello World</h1>
        
        <!-- Bouton pour demander le prénom -->
        <button 
            @click="demanderPrenom()" 
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-200"
            :disabled="loading">
            Demander prénom
        </button>
        
        <!-- Message de bienvenue (affiché après saisie) -->
        <div x-show="prenom" x-transition class="mt-8 p-6 bg-white rounded-lg shadow-lg">
            <p class="text-2xl text-green-600 font-semibold">
                Hello <span x-text="prenom"></span> !
            </p>
        </div>
    </div>

    <script>
        const log = {
            debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
            info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
            warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
            error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
        };

        document.addEventListener('alpine:init', () => {
            Alpine.data('helloPage', () => ({
                // Props réactives
                prenom: null,
                loading: false,

                // Workflow: demander le prénom
                demanderPrenom: async function() {
                    const workflowId = crypto.randomUUID();
                    log.info('WORKFLOW_START', { workflowId, workflow: 'demanderPrenom' });

                    const prenomSaisi = prompt('Quel est votre prénom ?');
                    
                    if (prenomSaisi) {
                        this.prenom = prenomSaisi;
                        log.info('STATE_UPDATE', { prenom: this.prenom });
                        log.info('WORKFLOW_SUCCESS', { workflowId });
                    } else {
                        log.info('WORKFLOW_CANCELLED', { workflowId });
                    }
                },

                // Init
                init: function() {
                    log.info('PAGE_INIT', { page: 'helloPage', timestamp: Date.now() });
                }
            }));
        });
    </script>
</body>
</html>
