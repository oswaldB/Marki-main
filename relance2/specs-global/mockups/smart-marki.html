<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Marki | Insights et recommandations</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="./components/sidebar-nav-dual.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="smartMarkiPage()" x-init="init()" class="bg-slate-50">

<!-- Sidebar -->
<sidebar-nav-dual page="smart-marki"></sidebar-nav-dual>

<!-- Main Content -->
<div class="md:ml-[284px] min-h-screen">
  
  <!-- Header avec touche Sky -->
  <header class="bg-gradient-to-r from-sky-50 to-sky-100 border-b border-sky-200">
    <div class="h-16 px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-400 to-sky-500 flex items-center justify-center shadow-sm">
          <img src="./marki-logo.png" alt="Marki" class="w-6 h-6 object-contain">
        </div>
        <div>
          <h1 class="text-lg font-semibold text-slate-800">Smart Marki</h1>
          <p class="text-sm text-slate-500">Insights et recommandations personnalisés</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <select x-model="filterCategory" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 focus:outline-none focus:border-sky-300 focus:ring-2 focus:ring-sky-100">
          <option value="">Toutes les catégories</option>
          <option value="optimization">Optimisation</option>
          <option value="alert">Alertes</option>
          <option value="progress">Progression</option>
          <option value="prediction">Prédictions</option>
          <option value="suggestion">Suggestions</option>
        </select>
        
        <button 
          @click="markAllAsRead()"
          class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-sky-700 bg-white border border-sky-200 rounded-lg hover:bg-sky-50 transition-all"
        >
          <i class="fas fa-check-double"></i>
          <span>Tout lu</span>
        </button>
      </div>
    </div>
    
    <!-- Stats sous-header -->
    <div class="px-6 pb-4 flex items-center gap-6">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center">
          <i class="fas fa-chart-line text-sky-600 text-sm"></i>
        </div>
        <div>
          <span class="text-2xl font-bold text-slate-800">78%</span>
          <span class="text-sm text-slate-500 ml-1">efficacité</span>
        </div>
      </div>
      
      <div class="h-8 w-px bg-sky-200"></div>
      
      <div class="flex items-center gap-4 text-sm">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-sky-400 rounded-full"></span>
          <span class="text-slate-600"><span class="font-semibold text-slate-800" x-text="stats.applied"></span> appliqués</span>
        </div>
        
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-sky-300 rounded-full"></span>
          <span class="text-slate-600"><span class="font-semibold text-slate-800" x-text="stats.newThisMonth"></span> ce mois</span>
        </div>
        
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-sky-500 rounded-full"></span>
          <span class="text-slate-600"><span class="font-semibold text-slate-800" x-text="stats.pending"></span> en attente</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="p-6 max-w-5xl">
    
    <!-- Section: Optimisations -->
    <div x-show="filteredInsights.optimization.length > 0" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center">
          <i class="fas fa-chart-line text-sky-600"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-700">Optimisations</h3>
        <span class="px-2 py-0.5 bg-sky-100 text-sky-700 text-xs rounded-full" x-text="filteredInsights.optimization.length"></span>
      </div>
      
      <div class="space-y-3">
        <template x-for="insight in filteredInsights.optimization" :key="insight.id">
          <div class="bg-white rounded-xl border border-slate-200 hover:border-sky-300 hover:shadow-md transition-all cursor-pointer group"
               :class="{ 'opacity-70': insight.read }"
               @click="openInsightDetail(insight)">
            <div class="p-4 flex items-center gap-4">
              <!-- Icon -->
              <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center flex-shrink-0 group-hover:bg-sky-100 transition-colors">
                <i :class="insight.icon" class="text-sky-600 text-lg"></i>
              </div>
              
              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <div class="flex items-center gap-2">
                      <p class="font-medium text-slate-800" x-text="insight.title"></p>
                      <span x-show="!insight.read" class="w-2 h-2 bg-sky-400 rounded-full"></span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 line-clamp-2" x-text="insight.description"></p>
                  </div>
                  
                  <!-- Meta -->
                  <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="px-2.5 py-1 bg-sky-50 text-sky-700 text-xs font-medium rounded-full" x-text="insight.impact"></span>
                    <span class="text-xs text-slate-400" x-text="insight.date"></span>
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                      <i class="fas fa-chevron-right text-slate-400 group-hover:text-sky-500"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    
    <!-- Section: Alertes -->
    <div x-show="filteredInsights.alert.length > 0" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center">
          <i class="fas fa-exclamation-triangle text-sky-600"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-700">Alertes</h3>
        <span class="px-2 py-0.5 bg-sky-100 text-sky-700 text-xs rounded-full" x-text="filteredInsights.alert.length"></span>
      </div>
      
      <div class="space-y-3">
        <template x-for="insight in filteredInsights.alert" :key="insight.id">
          <div class="bg-white rounded-xl border border-slate-200 hover:border-sky-300 hover:shadow-md transition-all cursor-pointer group"
               :class="{ 'opacity-70': insight.read, ' bg-sky-50/30': !insight.read }"
               @click="openInsightDetail(insight)">
            <div class="p-4 flex items-center gap-4">
              <!-- Icon -->
              <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center flex-shrink-0 group-hover:bg-sky-100 transition-colors">
                <i :class="insight.icon" class="text-sky-600 text-lg"></i>
              </div>
              
              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <div class="flex items-center gap-2">
                      <p class="font-medium text-slate-800" x-text="insight.title"></p>
                      <span x-show="!insight.read" class="w-2 h-2 bg-sky-500 rounded-full"></span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 line-clamp-2" x-text="insight.description"></p>
                  </div>
                  
                  <!-- Meta -->
                  <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="px-2.5 py-1 bg-sky-50 text-sky-700 text-xs font-medium rounded-full" x-text="insight.impact"></span>
                    <span class="text-xs text-slate-400" x-text="insight.date"></span>
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                      <i class="fas fa-chevron-right text-slate-400 group-hover:text-sky-500"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    
    <!-- Section: Progression -->
    <div x-show="filteredInsights.progress.length > 0" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center">
          <i class="fas fa-trophy text-sky-600"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-700">Progression</h3>
        <span class="px-2 py-0.5 bg-sky-100 text-sky-700 text-xs rounded-full" x-text="filteredInsights.progress.length"></span>
      </div>
      
      <div class="space-y-3">
        <template x-for="insight in filteredInsights.progress" :key="insight.id">
          <div class="bg-white rounded-xl border border-slate-200 hover:border-sky-300 hover:shadow-md transition-all cursor-pointer group"
               :class="{ 'opacity-70': insight.read }"
               @click="openInsightDetail(insight)">
            <div class="p-4 flex items-center gap-4">
              <!-- Icon -->
              <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center flex-shrink-0 group-hover:bg-sky-100 transition-colors">
                <i :class="insight.icon" class="text-sky-600 text-lg"></i>
              </div>
              
              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <div class="flex items-center gap-2">
                      <p class="font-medium text-slate-800" x-text="insight.title"></p>
                      <span x-show="!insight.read" class="w-2 h-2 bg-sky-400 rounded-full"></span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 line-clamp-2" x-text="insight.description"></p>
                  </div>
                  
                  <!-- Meta -->
                  <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="px-2.5 py-1 bg-sky-50 text-sky-700 text-xs font-medium rounded-full" x-text="insight.impact"></span>
                    <span class="text-xs text-slate-400" x-text="insight.date"></span>
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                      <i class="fas fa-chevron-right text-slate-400 group-hover:text-sky-500"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    
    <!-- Section: Prédictions -->
    <div x-show="filteredInsights.prediction.length > 0" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center">
          <i class="fas fa-brain text-sky-600"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-700">Prédictions</h3>
        <span class="px-2 py-0.5 bg-sky-100 text-sky-700 text-xs rounded-full" x-text="filteredInsights.prediction.length"></span>
      </div>
      
      <div class="space-y-3">
        <template x-for="insight in filteredInsights.prediction" :key="insight.id">
          <div class="bg-white rounded-xl border border-slate-200 hover:border-sky-300 hover:shadow-md transition-all cursor-pointer group"
               :class="{ 'opacity-70': insight.read }"
               @click="openInsightDetail(insight)">
            <div class="p-4 flex items-center gap-4">
              <!-- Icon -->
              <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center flex-shrink-0 group-hover:bg-sky-100 transition-colors">
                <i :class="insight.icon" class="text-sky-600 text-lg"></i>
              </div>
              
              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <div class="flex items-center gap-2">
                      <p class="font-medium text-slate-800" x-text="insight.title"></p>
                      <span x-show="!insight.read" class="w-2 h-2 bg-sky-400 rounded-full"></span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 line-clamp-2" x-text="insight.description"></p>
                  </div>
                  
                  <!-- Meta -->
                  <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="px-2.5 py-1 bg-sky-50 text-sky-700 text-xs font-medium rounded-full" x-text="insight.impact"></span>
                    <span class="text-xs text-slate-400" x-text="insight.date"></span>
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center group-hover:bg-sky-50 transition-colors">
                      <i class="fas fa-chevron-right text-slate-400 group-hover:text-sky-500"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    
    <!-- Section: Suggestions -->
    <div x-show="filteredInsights.suggestion.length > 0" class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
          <i class="fas fa-comment-dots text-slate-600"></i>
        </div>
        <h3 class="text-base font-semibold text-slate-700">Suggestions</h3>
        <span class="px-2 py-0.5 bg-slate-100 text-slate-700 text-xs rounded-full" x-text="filteredInsights.suggestion.length"></span>
      </div>
      
      <div class="space-y-3">
        <template x-for="insight in filteredInsights.suggestion" :key="insight.id">
          <div class="bg-white rounded-xl border border-slate-200 hover:border-slate-400 hover:shadow-md transition-all cursor-pointer group"
               :class="{ 'opacity-70': insight.read }"
               @click="openInsightDetail(insight)">
            <div class="p-4 flex items-center gap-4">
              <!-- Icon -->
              <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center flex-shrink-0 group-hover:bg-slate-200 transition-colors">
                <i :class="insight.icon" class="text-slate-600 text-lg"></i>
              </div>
              
              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1">
                    <div class="flex items-center gap-2">
                      <p class="font-medium text-slate-800" x-text="insight.title"></p>
                      <span x-show="!insight.read" class="w-2 h-2 bg-slate-400 rounded-full"></span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 line-clamp-2" x-text="insight.description"></p>
                  </div>
                  
                  <!-- Meta -->
                  <div class="flex items-center gap-3 flex-shrink-0">
                    <span class="px-2.5 py-1 bg-slate-100 text-slate-700 text-xs font-medium rounded-full" x-text="insight.impact"></span>
                    <span class="text-xs text-slate-400" x-text="insight.date"></span>
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center group-hover:bg-slate-100 transition-colors">
                      <i class="fas fa-chevron-right text-slate-400 group-hover:text-slate-600"></i>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    
    <!-- Empty State -->
    <div x-show="isEmpty" class="bg-white rounded-xl border border-slate-200 p-12 text-center">
      <div class="w-16 h-16 mx-auto mb-4 bg-slate-100 rounded-xl flex items-center justify-center">
        <i class="fas fa-lightbulb text-slate-400 text-2xl"></i>
      </div>
      <h3 class="text-lg font-medium text-slate-800 mb-2">Aucun insight disponible</h3>
      <p class="text-slate-500">Les recommandations apparaîtront ici lorsque suffisamment de données seront collectées.</p>
    </div>
    
  </main>
</div>

<!-- Insight Detail Modal -->
<div x-show="selectedInsight" x-cloak class="fixed inset-0 z-50" x-transition>
  <div class="absolute inset-0 bg-black/50" @click="selectedInsight = null"></div>
  <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
    <template x-if="selectedInsight">
      <div>
        <!-- Modal Header -->
        <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between"
             :class="{
               'bg-sky-50': selectedInsight.category === 'optimization',
               'bg-sky-50': selectedInsight.category === 'alert',
               'bg-sky-50': selectedInsight.category === 'progress',
               'bg-sky-50': selectedInsight.category === 'prediction',
               'bg-slate-50': selectedInsight.category === 'suggestion'
             }">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center"
                 :class="{
                   'bg-sky-100 text-sky-600': selectedInsight.category === 'optimization',
                   'bg-sky-100 text-sky-600': selectedInsight.category === 'alert',
                   'bg-sky-100 text-sky-600': selectedInsight.category === 'progress',
                   'bg-sky-100 text-sky-600': selectedInsight.category === 'prediction',
                   'bg-slate-200 text-slate-600': selectedInsight.category === 'suggestion'
                 }">
              <i :class="selectedInsight.icon" class="text-xl"></i>
            </div>
            <div>
              <h3 class="font-semibold text-slate-800 text-lg" x-text="selectedInsight.title"></h3>
              <p class="text-sm text-slate-500" x-text="selectedInsight.date"></p>
            </div>
          </div>
          
          <button @click="selectedInsight = null" class="text-slate-400 hover:text-slate-600 transition-colors">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        
        <!-- Modal Body -->
        <div class="p-6 overflow-y-auto">
          <p class="text-slate-700 leading-relaxed text-base" x-text="selectedInsight.fullDescription"></p>
          
          <!-- Action Items -->
          <div x-show="selectedInsight.actions && selectedInsight.actions.length > 0" class="mt-6">
            <h4 class="font-medium text-slate-800 mb-3 flex items-center gap-2">
              <i class="fas fa-tasks text-slate-400"></i>
              Actions recommandées
            </h4>
            <ul class="space-y-2">
              <template x-for="action in selectedInsight.actions" :key="action">
                <li class="flex items-start gap-3 bg-slate-50 rounded-lg p-3 border border-slate-100">
                  <i class="fas fa-check-circle text-sky-500 mt-0.5"></i>
                  <span class="text-slate-700" x-text="action"></span>
                </li>
              </template>
            </ul>
          </div>
          
          <!-- Expected Impact -->
          <div x-show="selectedInsight.expectedImpact" class="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-200">
            <h4 class="font-medium text-slate-800 mb-1 flex items-center gap-2">
              <i class="fas fa-chart-line text-slate-400"></i>
              Impact attendu
            </h4>
            <p class="text-slate-600" x-text="selectedInsight.expectedImpact"></p>
          </div>
        </div>
        
        <!-- Modal Footer -->
        <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex items-center justify-between">
          <button @click="selectedInsight = null" class="text-slate-500 hover:text-slate-700 transition-colors">
            Fermer
          </button>
          
          <div class="flex items-center gap-3">
            <button 
              @click="dismissInsight(selectedInsight)"
              class="px-4 py-2 text-slate-500 hover:text-slate-700 transition-colors"
            >
              Ignorer
            </button>
            
            <button 
              @click="applyInsight(selectedInsight)"
              class="px-5 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg font-medium transition-colors"
              :class="{ 'bg-sky-500 hover:bg-sky-600': selectedInsight.category === 'optimization' }"
            >
              <i class="fas fa-check mr-1"></i>
              Appliquer
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function smartMarkiPage() {
  return {
    filterCategory: '',
    selectedInsight: null,
    
    stats: {
      applied: 24,
      newThisMonth: 8,
      pending: 5
    },
    
    insights: [
      // Optimizations
      {
        id: 1,
        category: 'optimization',
        icon: 'fas fa-lightbulb',
        title: 'Optimisez vos relances R2',
        description: 'Vos relances R2 ont un taux de réponse de 45%. Envisagez d\'ajouter une étape SMS entre R1 et R2.',
        fullDescription: 'L\'analyse de vos relances montre que le niveau R2 (relance formelle) obtient un taux de réponse de 45%. C\'est un excellent résultat, mais nous pensons qu\'il peut être encore amélioré. En ajoutant une étape SMS entre la relance R1 (amiable) et la relance R2 (formelle), vous pourriez augmenter ce taux à 58% selon nos prédictions.',
        date: 'Il y a 2 heures',
        impact: '+13% réponses',
        read: false,
        actions: [
          'Configurer un SMS automatique entre R1 et R2',
          'Personnaliser le message avec le montant exact',
          'Tester pendant 2 semaines sur 20% des cas'
        ],
        expectedImpact: 'Augmentation estimée du taux de réponse de 45% à 58%'
      },
      {
        id: 2,
        category: 'optimization',
        icon: 'fas fa-clock',
        title: 'Horaires d\'envoi optimaux',
        description: 'Vos emails envoyés entre 9h et 11h ont un taux d\'ouverture 23% supérieur à la moyenne.',
        fullDescription: 'Notre analyse des données d\'ouverture de vos emails de relance révèle un pattern clair : les messages envoyés entre 9h et 11h du matin, en semaine, obtiennent un taux d\'ouverture de 68%, contre 45% en moyenne pour les autres horaires.',
        date: 'Il y a 5 heures',
        impact: '+23% ouverture',
        read: false,
        actions: [
          'Programmer les relances entre 9h et 11h',
          'Éviter les envois le vendredi après-midi',
          'Prioriser le mardi et mercredi'
        ],
        expectedImpact: 'Taux d\'ouverture passant de 45% à 68%'
      },
      {
        id: 3,
        category: 'optimization',
        icon: 'fas fa-user-friends',
        title: 'Segmentation des payeurs',
        description: 'Créez des séquences différentes pour les clients réguliers vs occasionnels.',
        fullDescription: 'Vos clients réguliers (plus de 5 factures/an) répondent 40% mieux aux relances que les clients occasionnels. Une séquence de relance plus douce pourrait améliorer la fidélisation de ces clients stratégiques.',
        date: 'Il y a 1 jour',
        impact: '+40% fidélité',
        read: true,
        actions: [
          'Identifier les clients réguliers',
          'Créer une séquence douce R1-R2-R3',
          'Exclure les réguliers des relances automatiques agressives'
        ],
        expectedImpact: 'Meilleure rétention des clients réguliers'

    get filteredInsights() {
      const filtered = this.filterCategory 
        ? this.insights.filter(i => i.category === this.filterCategory)
        : this.insights;
      
      return {
        optimization: filtered.filter(i => i.category === 'optimization'),
        alert: filtered.filter(i => i.category === 'alert'),
        progress: filtered.filter(i => i.category === 'progress'),
        prediction: filtered.filter(i => i.category === 'prediction'),
        suggestion: filtered.filter(i => i.category === 'suggestion')
      };
    },
    
    get isEmpty() {
      const f = this.filteredInsights;
      return f.optimization.length === 0 && 
             f.alert.length === 0 && 
             f.progress.length === 0 && 
             f.prediction.length === 0 && 
             f.suggestion.length === 0;
    },
    
    init() {
      // Update stats based on actual data
      this.stats.pending = this.insights.filter(i => !i.read).length;
    },
    
    openInsightDetail(insight) {
      this.selectedInsight = insight;
      if (!insight.read) {
        insight.read = true;
        this.stats.pending = Math.max(0, this.stats.pending - 1);
      }
    },
    
    markAllAsRead() {
      this.insights.forEach(i => i.read = true);
      this.stats.pending = 0;
    },
    
    applyInsight(insight) {
      insight.read = true;
      this.selectedInsight = null;
      // In a real app, this would trigger the actual action
      alert('Insight appliqué : ' + insight.title);
    },
    
    dismissInsight(insight) {
      insight.read = true;
      this.selectedInsight = null;
    }
  };
