<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impayés à réparer | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="./components/sidebar-nav-dual.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="impayesReparerPage()" x-init="init()">

<sidebar-nav-dual page="impayes"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Impayés à réparer</h1>
      <span class="text-slate-400">/</span>
      <span class="text-sm text-slate-500">Factures nécessitant une intervention</span>
    </div>
    
    <a href="./impayes.html" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-all">
      <i class="fas fa-arrow-left"></i>
      <span>Retour à la liste</span>
    </a>
  </header>

  <main class="p-6">
    
    <!-- Info banner -->
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
      <div class="flex items-start gap-3">
        <i class="fas fa-exclamation-triangle text-amber-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-amber-800">Factures à réparer</p>
          <p class="text-sm text-amber-600">Ces factures présentent des problèmes qui empêchent leur traitement automatique (payeur manquant, etc.).</p>
        </div>
      </div>
    </div>
    
    <!-- Loading -->
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
        <div class="divide-y divide-slate-100">
          <template x-for="i in 5" :key="i">
            <div class="px-6 py-4 animate-pulse flex items-center gap-4">
              <div class="w-24 h-4 bg-slate-200 rounded"></div>
              <div class="w-20 h-4 bg-slate-200 rounded"></div>
              <div class="flex-1">
                <div class="h-4 bg-slate-200 rounded w-1/4 mb-2"></div>
              </div>
              <div class="w-24 h-4 bg-slate-200 rounded"></div>
            </div>
          </template>
        </div>
      </div>
    </template>
    
    <!-- Empty -->
    <template x-if="!loading && impayesAReparer.length === 0">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm py-16">
        <div class="text-center">
          <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check text-green-500 text-2xl"></i>
          </div>
          <h3 class="text-lg font-medium text-slate-900 mb-1">Aucune facture à réparer</h3>
          <p class="text-sm text-slate-500">Toutes les factures ont un payeur associé.</p>
        </div>
      </div>
    </template>
    
    <!-- Table -->
    <template x-if="!loading && impayesAReparer.length > 0">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
          <p class="text-sm text-slate-600">
            <span x-text="impayesAReparer.length"></span> facture(s) à réparer
          </p>
        </div>
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-600 font-medium">
            <tr>
              <th class="px-6 py-3">N° Facture</th>
              <th class="px-6 py-3">N° Dossier</th>
              <th class="px-6 py-3">Nature du problème</th>
              <th class="px-6 py-3 text-right">Montant TTC</th>
              <th class="px-6 py-3">Date d'échéance</th>
              <th class="px-6 py-3">Date d'import</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-for="impaye in impayesAReparer" :key="impaye.id">
              <tr class="hover:bg-slate-50/50">
                <td class="px-6 py-4 font-medium text-slate-900" x-text="impaye.nfacture"></td>
                <td class="px-6 py-4 font-mono text-slate-700" x-text="impaye.numero_dossier || '-'"></td>
                <td class="px-6 py-4">
                  <span class="inline-flex items-center px-2.5 py-1 text-xs font-medium rounded-full bg-amber-100 text-amber-800">
                    <i class="fas fa-user-slash mr-1.5"></i>
                    <span x-text="impaye.probleme"
                  </span>
                </td>
                <td class="px-6 py-4 text-right font-medium" x-text="formatMoney(impaye.montant_total)"></td>
                <td class="px-6 py-4 text-slate-600" x-text="formatDate(impaye.date_echeance)"></td>
                <td class="px-6 py-4 text-slate-600" x-text="formatDate(impaye.date_import)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
    
  </main>
</div>

<script>
function impayesReparerPage() {
  return {
    loading: false,
    impayesAReparer: [],
    
    init() {
      this.loadData();
    },
    
    async loadData() {
      this.loading = true;
      
      try {
        // Simuler l'appel API GET /api/impayes?a_reparer=true
        await new Promise(r => setTimeout(r, 500));
        
        this.impayesAReparer = [
          { 
            id: 'imp_001', 
            nfacture: 'FAC-2024-099', 
            numero_dossier: 'D-2024-123', 
            montant_total: 4500,
            date_echeance: '2024-02-15',
            date_import: '2024-01-10',
            probleme: 'Payeur manquant'
          },
          { 
            id: 'imp_002', 
            nfacture: 'FAC-2024-100', 
            numero_dossier: 'D-2024-124', 
            montant_total: 3200,
            date_echeance: '2024-02-20',
            date_import: '2024-01-12',
            probleme: 'Payeur manquant'
          },
          { 
            id: 'imp_003', 
            nfacture: 'FAC-2024-101', 
            numero_dossier: null, 
            montant_total: 7800,
            date_echeance: '2024-02-25',
            date_import: '2024-01-15',
            probleme: 'Dossier et payeur manquants'
          },
        ];
        
      } catch (error) {
        console.error('Erreur chargement:', error);
      } finally {
        this.loading = false;
      }
    },
    
    formatMoney(amount) {
      return new Intl.NumberFormat('fr-FR', { 
        style: 'currency', 
        currency: 'EUR',
        minimumFractionDigits: 2
      }).format(amount);
    },
    
    formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return new Intl.DateTimeFormat('fr-FR', { 
        day: '2-digit', 
        month: '2-digit', 
        year: 'numeric' 
      }).format(date);
    }
  }
}
</script>

</body>
</html>
