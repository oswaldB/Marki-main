<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .workflow-response {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            color: #1565c0;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            background: #4caf50;
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 Hello World !</h1>
        <p>Application Flask opérationnelle</p>
        
        <div class="workflow-response">
            <strong>Réponse du workflow :</strong>
            <p>{{ workflow.message }}</p>
            <span class="status">{{ workflow.status }}</span>
        </div>
    </div>
</body>
</html>
