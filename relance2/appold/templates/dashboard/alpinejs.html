<script>
  const log = {
    debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
    info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
    warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
    error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
  };

  document.addEventListener('alpine:init', () => {
    Alpine.data('dashboard', () => ({
      // =====================================================
      // 1. PROPS RÉACTIVES (STATE)
      // =====================================================
      
      // UI State
      loading: false,
      error: null,
      syncing: false,
      syncProgress: 0,
      viewMode: 'list',
      
      // Data
      impayes: [],
      relances: [],
      events: [],
      newInvoices: [],
      lastSyncTime: null,
      
      // KPIs
      kpis: {
        facturesEnAttente: 0,
        impayesActifs: 0,
        montantTotal: 0,
        relancesJour: 0,
        tauxRecouvrement: 0,
        anciennete: {
          moins7j: 0, moins7jMontant: 0,
          j8a30: 0, j8a30Montant: 0,
          j31a60: 0, j31a60Montant: 0,
          j60a120: 0, j60a120Montant: 0,
          plus120j: 0, plus120jMontant: 0
        }
      },
      
      // Chart
      chartData: {
        labels: ['Avant', 'Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sept', 'Oct', 'Nov', 'Déc'],
        montantsPayes: [],
        restesAPayer: [],
        facturesImpayees: []
      },
      chart: null,
      
      // Top débiteurs
      topDebtors: [],
      
      // =====================================================
      // 2. INIT (EN PREMIER)
      // =====================================================
      {% include 'dashboard/workflows/initial-load.html' %},
      
      // =====================================================
      // 3. WORKFLOWS
      // =====================================================
      {% include 'dashboard/workflows/sync-data.html' %},
      {% include 'dashboard/workflows/clear-events.html' %},
      {% include 'dashboard/workflows/switch-view-card.html' %},
      {% include 'dashboard/workflows/switch-view-list.html' %},
      
      // =====================================================
      // 4. HELPERS
      // =====================================================
      initChart() {
        const ctx = document.getElementById('evolutionChart');
        if (!ctx || this.chart) return;
        
        this.chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: this.chartData.labels,
            datasets: [
              {
                label: 'Reste à payer',
                data: this.chartData.restesAPayer,
                backgroundColor: '#7dd3fc',
                borderRadius: 4,
                yAxisID: 'y',
                order: 2,
              },
              {
                label: 'Montant payé',
                data: this.chartData.montantsPayes,
                backgroundColor: '#0ea5e9',
                borderRadius: 4,
                yAxisID: 'y',
                order: 2,
              },
              {
                type: 'line',
                label: 'Nb factures impayées',
                data: this.chartData.facturesImpayees,
                borderColor: '#0369a1',
                backgroundColor: '#0369a1',
                pointBackgroundColor: '#0369a1',
                pointRadius: 4,
                borderWidth: 2,
                tension: 0.3,
                yAxisID: 'y1',
                order: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: true,
                position: 'bottom',
                labels: { usePointStyle: true, padding: 15 }
              },
              tooltip: {
                callbacks: {
                  label(ctx) {
                    if (ctx.dataset.yAxisID === 'y1') {
                      return ` ${ctx.parsed.y} facture${ctx.parsed.y > 1 ? 's' : ''} impayée${ctx.parsed.y > 1 ? 's' : ''}`;
                    }
                    const val = ctx.parsed.y;
                    if (val >= 1000) return ` ${ctx.dataset.label} : ${(val / 1000).toFixed(1)} k€`;
                    return ` ${ctx.dataset.label} : ${val.toLocaleString('fr-FR')} €`;
                  }
                }
              }
            },
            scales: {
              y: {
                stacked: true,
                position: 'left',
                ticks: {
                  callback: (val) => val >= 1000 ? (val / 1000).toFixed(0) + ' k€' : val + ' €'
                },
                grid: { color: '#f3f4f6' }
              },
              y1: {
                position: 'right',
                beginAtZero: true,
                ticks: { stepSize: 1, callback: (val) => val + ' fa.' },
                grid: { drawOnChartArea: false }
              },
              x: {
                stacked: true,
                grid: { display: false }
              }
            }
          }
        });
      },
      
      calculateKPIs() {
        const now = new Date();
        
        this.kpis.facturesEnAttente = this.impayes.filter(i => i.reste_a_payer > 0).length;
        this.kpis.impayesActifs = this.impayes.filter(i => i.statut === 'impaye' && i.reste_a_payer > 0).length;
        this.kpis.montantTotal = this.impayes.reduce((sum, i) => sum + (i.reste_a_payer || 0), 0);
        this.kpis.relancesJour = this.relances.length;
        
        const montantPaye = this.impayes.reduce((sum, i) => sum + ((i.montant_total || 0) - (i.reste_a_payer || 0)), 0);
        const montantTotalFacture = this.impayes.reduce((sum, i) => sum + (i.montant_total || 0), 0);
        this.kpis.tauxRecouvrement = montantTotalFacture > 0 
          ? Math.round((montantPaye / montantTotalFacture) * 100) 
          : 0;
        
        const getDays = (dateStr) => {
          if (!dateStr) return 0;
          return Math.floor((now - new Date(dateStr)) / (1000 * 60 * 60 * 24));
        };
        
        // Reset anciennete
        this.kpis.anciennete = {
          moins7j: 0, moins7jMontant: 0,
          j8a30: 0, j8a30Montant: 0,
          j31a60: 0, j31a60Montant: 0,
          j60a120: 0, j60a120Montant: 0,
          plus120j: 0, plus120jMontant: 0
        };
        
        this.impayes.forEach(i => {
          const days = getDays(i.date_echeance);
          const montant = i.reste_a_payer || 0;
          
          if (days < 7) {
            this.kpis.anciennete.moins7j++;
            this.kpis.anciennete.moins7jMontant += montant;
          } else if (days <= 30) {
            this.kpis.anciennete.j8a30++;
            this.kpis.anciennete.j8a30Montant += montant;
          } else if (days <= 60) {
            this.kpis.anciennete.j31a60++;
            this.kpis.anciennete.j31a60Montant += montant;
          } else if (days <= 120) {
            this.kpis.anciennete.j60a120++;
            this.kpis.anciennete.j60a120Montant += montant;
          } else {
            this.kpis.anciennete.plus120j++;
            this.kpis.anciennete.plus120jMontant += montant;
          }
        });
      },
      
      calculateChartData() {
        const now = new Date();
        const currentYear = now.getFullYear();
        
        this.chartData.montantsPayes = new Array(13).fill(0);
        this.chartData.restesAPayer = new Array(13).fill(0);
        this.chartData.facturesImpayees = new Array(13).fill(0);
        
        this.impayes.forEach(i => {
          const date = new Date(i.date_echeance || i.created_at);
          const year = date.getFullYear();
          const month = date.getMonth();
          
          const montantTotal = i.montant_total || 0;
          const reste = i.reste_a_payer || 0;
          const paye = montantTotal - reste;
          
          if (year < currentYear) {
            this.chartData.montantsPayes[0] += paye;
            this.chartData.restesAPayer[0] += reste;
            this.chartData.facturesImpayees[0]++;
          } else {
            const idx = month + 1;
            this.chartData.montantsPayes[idx] += paye;
            this.chartData.restesAPayer[idx] += reste;
            this.chartData.facturesImpayees[idx]++;
          }
        });
      },
      
      calculateTopDebtors() {
        const debtorsMap = {};
        
        this.impayes.forEach(i => {
          const id = i.payer_id;
          if (!id) return;
          
          if (!debtorsMap[id]) {
            const name = i.payer_nom || 'Inconnu';
            debtorsMap[id] = {
              id, name,
              initials: name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2),
              montant: 0, jours: 0, impayesCount: 0, relance: 'R1'
            };
          }
          
          debtorsMap[id].montant += (i.reste_a_payer || 0);
          debtorsMap[id].impayesCount++;
          
          const days = Math.floor((new Date() - new Date(i.date_echeance)) / (1000 * 60 * 60 * 24));
          if (days > debtorsMap[id].jours) debtorsMap[id].jours = days;
          if (days > 90) debtorsMap[id].relance = 'R3';
          else if (days > 30) debtorsMap[id].relance = 'R2';
        });
        
        this.topDebtors = Object.values(debtorsMap)
          .sort((a, b) => b.montant - a.montant)
          .slice(0, 5);
      },
      
      formatEvents(events) {
        return events.map(e => ({
          ...e,
          time: this.formatTime(e.created_at)
        }));
      },
      
      formatTime(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      },
      
      formatMoney(amount) {
        return new Intl.NumberFormat('fr-FR', {
          style: 'currency', currency: 'EUR'
        }).format(amount || 0);
      },
      
      getInitials(name) {
        return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
      }
    }));
  });
</script>
