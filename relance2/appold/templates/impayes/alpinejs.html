<script>
  // Logger utilitaire
  const log = {
    debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
    info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
    warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
    error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
  };

  document.addEventListener('alpine:init', () => {
    // Store global pour partager l'état avec la top bar
    Alpine.store('impayes', {
      syncing: false,
      syncProgress: 0,
      
      syncData() {
        // Déléguer au composant principal s'il existe
        const el = document.querySelector('[x-data="impayes"]');
        if (el && el._x_dataStack) {
          const component = Alpine.$data(el);
          if (component.syncData) {
            component.syncData();
          }
        }
      }
    });
    
    Alpine.data('impayes', () => ({
      // =====================================================
      // STATE
      // =====================================================
      
      // UI State
      loading: false,
      error: null,
      syncing: false,
      syncProgress: 0,
      
      // Data
      factures: [],
      currentPage: 1,
      itemsPerPage: 25,
      totalPages: 1,
      total: 0,
      
      // Séquences dynamiques
      sequences: [],
      
      // Filtres
      searchQuery: '',
      filterStatut: '',
      filterSequence: '',
      
      // Tri
      sortColumn: 'date_echeance',
      sortDirection: 'desc',
      
      // Panel détail
      showDetailPanel: false,
      selectedFacture: null,
      noteContent: '',
      savingNote: false,
      editingNoteIndex: null,
      editNoteContent: '',
      
      // Modals
      showSuspendModal: false,
      showUnsuspendModal: false,
      suspending: false,
      unsuspending: false,
      
      // Formulaires
      suspendForm: { 
        motif: '', 
        detail: '' 
      },
      
      // Stats
      stats: { 
        total: 0, 
        aReparer: 0 
      },
      
      // =====================================================
      // WORKFLOWS (includes)
      // =====================================================
      {% include 'impayes/workflows/initial-load.html' %},
      {% include 'impayes/workflows/sync-data.html' %},
      {% include 'impayes/workflows/pagination-next.html' %},
      {% include 'impayes/workflows/pagination-prev.html' %},
      {% include 'impayes/workflows/sort-by-numero.html' %},
      {% include 'impayes/workflows/sort-by-dossier.html' %},
      {% include 'impayes/workflows/sort-by-payeur.html' %},
      {% include 'impayes/workflows/sort-by-montant.html' %},
      {% include 'impayes/workflows/sort-by-reste.html' %},
      {% include 'impayes/workflows/sort-by-date-echeance.html' %},
      {% include 'impayes/workflows/open-detail.html' %},
      {% include 'impayes/workflows/save-note.html' %},
      {% include 'impayes/workflows/edit-note.html' %},
      {% include 'impayes/workflows/delete-note.html' %},
      {% include 'impayes/workflows/update-sequence.html' %},
      {% include 'impayes/workflows/suspend-facture.html' %},
      {% include 'impayes/workflows/unsuspend-facture.html' %},
      
      // =====================================================
      // COMPUTED / GETTERS
      // =====================================================
      
      get paginatedFactures() {
        // Les données viennent déjà paginées du backend
        return this.factures;
      },
      
      get visiblePages() {
        const pages = [];
        const maxVisible = 5;
        let start = Math.max(1, this.currentPage - 2);
        let end = Math.min(this.totalPages, start + maxVisible - 1);
        
        if (end - start + 1 < maxVisible) {
          start = Math.max(1, end - maxVisible + 1);
        }
        
        for (let i = start; i <= end; i++) {
          pages.push(i);
        }
        return pages;
      },
      
      // =====================================================
      // HELPERS
      // =====================================================
      
      formatMoney(amount) {
        if (amount === null || amount === undefined) return '-';
        return new Intl.NumberFormat('fr-FR', {
          style: 'currency', currency: 'EUR'
        }).format(amount);
      },
      
      formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('fr-FR');
      },
      
      getJoursRetard(dateEcheance) {
        if (!dateEcheance) return '-';
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const echeance = new Date(dateEcheance);
        echeance.setHours(0, 0, 0, 0);
        const diffTime = today - echeance;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return `Dans ${Math.abs(diffDays)} jours`;
        if (diffDays === 0) return 'Aujourd\'hui';
        return `${diffDays} jours`;
      },
      
      getJoursRetardClass(dateEcheance) {
        if (!dateEcheance) return 'text-slate-400';
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const echeance = new Date(dateEcheance);
        echeance.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((today - echeance) / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) return 'text-emerald-600 font-medium'; // À venir
        if (diffDays === 0) return 'text-amber-600 font-medium'; // Aujourd'hui
        if (diffDays <= 30) return 'text-slate-700 font-medium'; // 1-30 jours
        if (diffDays <= 60) return 'text-amber-600 font-medium'; // 31-60 jours
        return 'text-red-600 font-bold'; // 60+ jours
      },
      
      getInitials(name) {
        if (!name) return '?';
        return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
      },
      
      getStatutLabel(statut) {
        const labels = {
          'non-payee': 'Non payée',
          'en-relance': 'En relance',
          'suspendue': 'Suspendue',
          'a-reparer': 'À réparer'
        };
        return labels[statut] || statut;
      },
      
      getStatutClass(statut) {
        const classes = {
          'non-payee': 'bg-slate-100 text-slate-700',
          'en-relance': 'bg-sky-100 text-sky-700',
          'suspendue': 'bg-amber-100 text-amber-700',
          'a-reparer': 'bg-red-100 text-red-700'
        };
        return classes[statut] || 'bg-slate-100 text-slate-700';
      },
      
      goToPage(page) {
        this.currentPage = page;
        this.loadData();
      },
      
      prevPage() {
        if (this.currentPage > 1) {
          this.currentPage--;
          this.loadData();
        }
      },
      
      nextPage() {
        if (this.currentPage < this.totalPages) {
          this.currentPage++;
          this.loadData();
        }
      },
      
      closeDetail() {
        this.showDetailPanel = false;
        this.selectedFacture = null;
        this.noteContent = '';
      },
      
      openSuspendModal(facture) {
        this.selectedFacture = facture;
        this.suspendForm = { motif: '', detail: '' };
        this.showSuspendModal = true;
      },
      
      openUnsuspendModal(facture) {
        this.selectedFacture = facture;
        this.showUnsuspendModal = true;
      },
      
      // Routeur pour les tris
      sortBy(column) {
        const sortMethods = {
          'nfacture': () => this.sortByNumero(),
          'numero_dossier': () => this.sortByDossier(),
          'payeur_nom': () => this.sortByPayeur(),
          'montant_ttc': () => this.sortByMontant(),
          'reste_a_payer': () => this.sortByReste(),
          'date_echeance': () => this.sortByDateEcheance()
        };
        
        if (sortMethods[column]) {
          sortMethods[column]();
        }
      }
    }));
  });
</script>
