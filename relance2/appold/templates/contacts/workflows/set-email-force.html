<!-- Modale Email Forcé -->
<div x-show="showEmailForceModal" x-cloak class="fixed inset-0 z-[300] overflow-y-auto" x-transition.opacity>
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="absolute inset-0 bg-slate-900/60" @click="showEmailForceModal = false; emailForceValue = '';"></div>
    
    <div class="relative bg-white rounded-xl shadow-2xl max-w-md w-full" x-transition.scale>
      <!-- Header -->
      <div class="px-6 py-4 border-b border-slate-200">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold text-slate-900">Définir un email forcé</h3>
          <button @click="showEmailForceModal = false; emailForceValue = '';" class="text-slate-400 hover:text-slate-600">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      
      <div class="p-6">
        <!-- Selected Contact -->
        <div x-show="selectedContact" class="mb-6 p-4 bg-slate-50 rounded-lg">
          <p class="text-sm text-slate-500 mb-3">Contact sélectionné</p>
          <p class="font-medium text-slate-900 mb-4" x-text="selectedContact?.nomComplet"></p>
          
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-slate-500">Email:</span>
              <span class="text-slate-700" x-text="selectedContact?.email || 'Non renseigné'"></span>
            </div>
            <div x-show="selectedContact?.emailForce" class="flex justify-between border-t border-slate-200 pt-2 mt-2">
              <span class="text-slate-500">Email forcé:</span>
              <span class="text-sky-600 font-medium" x-text="selectedContact?.emailForce"></span>
            </div>
          </div>        </div>
        
        <!-- Email Input -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-2">Email forcé</label>
          <input type="email" x-model="emailForceValue" placeholder="ex: finance@entreprise.fr"
                 class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
        </div>
        
        <!-- Search Contacts -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-500 mb-2">Ou sélectionnez un autre contact</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input type="text" x-model="emailForceSearch" 
                     @keydown.enter="searchEmailForceContacts()"
                     placeholder="Rechercher un contact..."
                     class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
            </div>
            <button @click="searchEmailForceContacts()" 
                    :disabled="!emailForceSearch || emailForceSearch.trim().length < 2 || loadingEmailForceSearch"
                    class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white rounded-lg text-sm font-medium transition-all">
              <i class="fas fa-search" x-show="!loadingEmailForceSearch"></i>
              <i class="fas fa-spinner fa-spin" x-show="loadingEmailForceSearch"></i>
              <span class="ml-1">Rechercher</span>
            </button>
          </div>
          <p class="text-xs text-slate-400 mt-1">Saisissez au moins 2 caractères</p>
        </div>
        
        <!-- Search Results -->
        <div x-show="emailForceSearchResults.length > 0" class="mb-4 max-h-48 overflow-y-auto space-y-2">
          <!-- Entreprises -->
          <template x-for="entreprise in emailForceEntreprises" :key="entreprise.id">
            <button @click="selectedContact = entreprise; emailForceValue = entreprise.emailForce || entreprise.email || ''"
                    class="w-full text-left p-3 rounded-lg border transition-all flex items-center gap-3"
                    :class="selectedContact?.id === entreprise.id ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-sky-300 hover:bg-slate-50'">
              <div class="w-8 h-8 rounded bg-sky-500 flex items-center justify-center text-white text-xs">
                <i class="fas fa-building"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-medium text-slate-900 text-sm truncate" x-text="entreprise.nomComplet"></p>
                <p class="text-xs text-slate-500 truncate" x-text="entreprise.email || 'Email non renseigné'"></p>
              </div>
              <div x-show="entreprise.emailForce" class="shrink-0">
                <span class="px-1.5 py-0.5 bg-sky-100 text-sky-700 text-xs rounded">Forcé</span>
              </div>
            </button>
          </template>
          
          <!-- Personnes -->
          <template x-for="personne in emailForcePersonnes" :key="personne.id">
            <button @click="selectedContact = personne; emailForceValue = personne.emailForce || personne.email || ''"
                    class="w-full text-left p-3 rounded-lg border transition-all flex items-center gap-3"
                    :class="selectedContact?.id === personne.id ? 'border-sky-500 bg-sky-50' : 'border-slate-200 hover:border-sky-300 hover:bg-slate-50'">
              <div class="w-8 h-8 rounded-full bg-slate-300 flex items-center justify-center text-white text-xs font-semibold" x-text="personne.initials">
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-medium text-slate-900 text-sm truncate" x-text="personne.nomComplet"></p>
                <p class="text-xs text-slate-500 truncate" x-text="personne.fonction || 'Personne physique'"></p>
              </div>
              <div x-show="personne.emailForce" class="shrink-0">
                <span class="px-1.5 py-0.5 bg-sky-100 text-sky-700 text-xs rounded">Forcé</span>
              </div>
            </button>
          </template>
          
          <!-- Empty -->
          <div x-show="emailForceSearch && emailForceSearch.trim().length >= 2 && emailForceSearchResults.length === 0 && !loadingEmailForceSearch" class="text-center py-4 text-sm text-slate-400">
            <i class="fas fa-search mb-1"></i>
            <p>Aucun contact trouvé</p>
          </div>
          
          <!-- Initial state -->
          <div x-show="!emailForceSearch || emailForceSearch.trim().length < 2" class="text-center py-4 text-sm text-slate-400">
            <i class="fas fa-keyboard mb-1"></i>
            <p>Saisissez un nom et cliquez sur Rechercher</p>
          </div>
        </div>
        
        <p class="text-xs text-slate-500 mb-6">
          <i class="fas fa-info-circle mr-1"></i>Cet email sera utilisé pour les relances
        </p>
        
        <!-- Actions -->
        <div class="flex justify-end gap-2">
          <button @click="showEmailForceModal = false; emailForceValue = '';" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">
            Annuler
          </button>
          <button @click="saveEmailForce()" :disabled="!emailForceValue"
                  class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-all">
            Enregistrer
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
