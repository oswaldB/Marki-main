<!-- Modale Email Forcé -->
<div x-show="showEmailForceModal" x-cloak class="fixed inset-0 z-[300] overflow-y-auto" x-transition.opacity>
  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="absolute inset-0 bg-slate-900/60" @click="showEmailForceModal = false; emailForceValue = '';"></div>
    
    <div class="relative bg-white rounded-xl shadow-2xl max-w-md w-full" x-transition.scale>
      <!-- Header -->
      <div class="px-6 py-4 border-b border-slate-200">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
            <i class="fas fa-envelope text-amber-500"></i>
            Définir un email forcé
          </h3>
          <button @click="showEmailForceModal = false; emailForceValue = '';" class="text-slate-400 hover:text-slate-600">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      
      <div class="p-6">
        <!-- Selected Contact -->
        <div x-show="selectedContact" class="mb-6 p-4 bg-amber-50 rounded-lg border border-amber-100">
          <p class="text-sm text-amber-800 font-medium mb-1" x-text="selectedContact?.nomComplet"></p>
          <p class="text-sm text-amber-600" x-text="selectedContact?.entreprise || 'Personne physique'"></p>
        </div>
        
        <!-- Email Input -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-2">Email forcé</label>
          <input type="email" x-model="emailForceValue" placeholder="ex: finance@entreprise.fr"
                 class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500">
          <p class="text-xs text-slate-500 mt-1">
            <i class="fas fa-info-circle mr-1"></i>Cet email sera utilisé pour les relances
          </p>
        </div>
        
        <!-- Search Contacts for Email Force -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-500 mb-2">Ou copier l'email d'un autre contact</label>
          <div class="flex gap-2">
            <div class="relative flex-1">
              <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input type="text" x-model="emailForceSearch" 
                     @keydown.enter="searchEmailForceContacts()"
                     placeholder="Rechercher un contact..."
                     class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500">
            </div>
            <button @click="searchEmailForceContacts()" 
                    :disabled="!emailForceSearch || emailForceSearch.trim().length < 2 || loadingEmailForceSearch"
                    class="px-4 py-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 text-white rounded-lg text-sm font-medium transition-all">
              <i class="fas fa-search" x-show="!loadingEmailForceSearch"></i>
              <i class="fas fa-spinner fa-spin" x-show="loadingEmailForceSearch"></i>
            </button>
          </div>
        </div>
        
        <!-- Search Results -->
        <div x-show="emailForceSearchResults.length > 0" class="mb-4 max-h-48 overflow-y-auto space-y-2 border border-slate-200 rounded-lg p-2">
          <template x-for="contact in emailForceSearchResults" :key="contact.id">
            <button @click="emailForceValue = contact.email || contact.emailForce || ''"
                    class="w-full text-left p-2 rounded hover:bg-amber-50 transition-colors flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 text-xs font-semibold" x-text="contact.initials">
              </div>
              <div class="flex-1 min-w-0 text-left">
                <p class="font-medium text-slate-900 text-sm truncate" x-text="contact.nomComplet"></p>
                <p class="text-xs text-slate-500 truncate" x-text="contact.email || contact.emailForce || 'Pas d\'email'"></p>
              </div>
            </button>
          </template>
        </div>
        
        <!-- Actions -->
        <div class="flex justify-end gap-2">
          <button @click="showEmailForceModal = false; emailForceValue = '';" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">
            Annuler
          </button>
          <button @click="saveEmailForce()" :disabled="!emailForceValue || savingEmailForce"
                  class="px-4 py-2 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium transition-all flex items-center gap-2">
            <i x-show="savingEmailForce" class="fas fa-spinner fa-spin"></i>
            <span x-text="savingEmailForce ? 'Enregistrement...' : 'Enregistrer'"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
