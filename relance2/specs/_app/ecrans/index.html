<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marki - Index des Mockups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mockup-card {
            transition: all 0.2s ease;
        }
        .mockup-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">📱 Index des Mockups</h1>
            <p class="mt-2 text-gray-600">Liste de tous les mockups HTML des écrans Marki</p>
        </div>

        <!-- Search -->
        <div class="mb-6">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Rechercher un mockup..." 
                class="w-full max-w-md px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            >
        </div>

        <!-- Stats -->
        <div class="mb-6 flex gap-4 text-sm text-gray-600">
            <span class="bg-white px-3 py-1 rounded-full border">
                <span id="totalCount" class="font-semibold text-gray-900">0</span> mockups
            </span>
        </div>

        <!-- Grid -->
        <div id="mockupsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- Mockups will be inserted here -->
        </div>
    </div>

    <script>
        // Liste des mockups découverts automatiquement
        const mockups = [
            // Global
            { name: "Menu Responsive Drawer", path: "global/frontend/mockups/menu-responsive-drawer.html", category: "Global", icon: "🧭" },
            { name: "Open ChatGPT", path: "global/frontend/mockups/open-chatgpt.html", category: "Global", icon: "🤖" },
            { name: "Open IA Modal", path: "global/frontend/mockups/open-ia-modal.html", category: "Global", icon: "💬" },
            
            // Auth
            { name: "Login", path: "login/frontend/mockups/login.html", category: "Authentification", icon: "🔐" },
            
            // Dashboard
            { name: "Dashboard", path: "dashboard/frontend/mockups/dashboard.html", category: "Dashboard", icon: "📊" },
            { name: "Smart Marki", path: "smart-marki/frontend/mockups/smart-marki.html", category: "Dashboard", icon: "🧠" },
            
            // Impayés
            { name: "Impayés", path: "impayes/frontend/mockups/impayes.html", category: "Impayés", icon: "💶" },
            { name: "Impayés Détail", path: "impayes-detail/frontend/mockups/impayes-detail.html", category: "Impayés", icon: "📄" },
            { name: "Impayés Payeur", path: "impayes-payeur/frontend/mockups/impayes-payeur.html", category: "Impayés", icon: "👤" },
            { name: "Impayés Suspendus", path: "impayes-suspendus/frontend/mockups/impayes-suspendus.html", category: "Impayés", icon: "⏸️" },
            { name: "Impayés Réparer", path: "impayes-reparer/frontend/mockups/impayes-reparer.html", category: "Impayés", icon: "🔧" },
            
            // Relances
            { name: "Relances", path: "relances/frontend/mockups/relances.html", category: "Relances", icon: "📢" },
            { name: "Relances Calendrier", path: "relances-calendrier/frontend/mockups/relances-calendrier.html", category: "Relances", icon: "📅" },
            { name: "Relances Validation", path: "relances-validation/frontend/mockups/relances-validation.html", category: "Relances", icon: "✅" },
            
            // Contacts
            { name: "Hello", path: "hello/frontend/mockups/hello.html", category: "Contacts", icon: "👋" },
            { name: "Contacts Blacklist", path: "contacts-blacklist/frontend/mockups/contacts-blacklist.html", category: "Contacts", icon: "🚫" },
            { name: "Contacts Sans Email", path: "contacts-sans-email/frontend/mockups/contacts-sans-email.html", category: "Contacts", icon: "📭" },
            
            // Séquences
            { name: "Séquences", path: "sequences/frontend/mockups/sequences.html", category: "Séquences", icon: "🔄" },
            { name: "Séquences Relance Détail", path: "sequences-relance-detail/frontend/mockups/sequences-relance-detail.html", category: "Séquences", icon: "📋" },
            { name: "Séquences Suivi Détail", path: "sequences-suivi-detail/frontend/mockups/sequences-suivi-detail.html", category: "Séquences", icon: "📈" },
            
            // Événements
            { name: "Événements", path: "evenements/frontend/mockups/evenements.html", category: "Événements", icon: "🔔" },
            
            // Paramètres
            { name: "Settings SMTP", path: "settings-smtp/frontend/mockups/settings-smtp.html", category: "Paramètres", icon: "⚙️" },
            { name: "Settings SMTP Détail", path: "settings-smtp-detail/frontend/mockups/settings-smtp-detail.html", category: "Paramètres", icon: "🔧" },
            { name: "Settings Utilisateurs", path: "settings-utilisateurs/frontend/mockups/settings-utilisateurs.html", category: "Paramètres", icon: "👥" },
            
            // Portail
            { name: "Portail Client", path: "portail-client/frontend/mockups/portail-client.html", category: "Portail", icon: "🌐" },
            { name: "Portail Client Dead Token", path: "portail-client/frontend/mockups/portail-client-dead-token.html", category: "Portail", icon: "⚠️" },
            { name: "Portail Mission", path: "portail-mission/frontend/mockups/portail-mission.html", category: "Portail", icon: "🎯" },
        ];

        // Sort by category then name
        mockups.sort((a, b) => {
            if (a.category !== b.category) {
                return a.category.localeCompare(b.category);
            }
            return a.name.localeCompare(b.name);
        });

        function renderMockups(filter = '') {
            const grid = document.getElementById('mockupsGrid');
            const filtered = mockups.filter(m => 
                m.name.toLowerCase().includes(filter.toLowerCase()) ||
                m.category.toLowerCase().includes(filter.toLowerCase())
            );

            document.getElementById('totalCount').textContent = filtered.length;

            grid.innerHTML = filtered.map(mockup => `
                <a href="${mockup.path}" target="_blank" class="mockup-card block bg-white rounded-lg border border-gray-200 p-4 hover:border-blue-300">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl">${mockup.icon}</span>
                            <div>
                                <h3 class="font-semibold text-gray-900 text-sm">${mockup.name}</h3>
                                <span class="text-xs text-gray-500">${mockup.category}</span>
                            </div>
                        </div>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </div>
                    <div class="mt-3 text-xs text-gray-400 truncate">${mockup.path}</div>
                </a>
            `).join('');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderMockups(e.target.value);
        });

        // Initial render
        renderMockups();
    </script>
</body>
</html>
