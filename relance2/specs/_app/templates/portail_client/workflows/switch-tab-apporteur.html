<!-- Mega-function: Switch to apporteur tab -->

switchTabApporteur: async function() {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'switchTabApporteur' });
    
    this.activeTab = 'apporteur';
    
    log.debug('TAB_CHANGED', { activeTab: this.activeTab });
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
