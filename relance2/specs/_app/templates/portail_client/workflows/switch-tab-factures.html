<!-- Mega-function: Switch to factures tab -->

switchTabFactures: async function() {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'switchTabFactures' });
    
    this.activeTab = 'factures';
    
    log.debug('TAB_CHANGED', { activeTab: this.activeTab });
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
