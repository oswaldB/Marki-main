<!-- templates/portail_client/index.html -->
<!-- Page Portail Client - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Client | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div x-data="portailClient" x-init="init()">
  
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-semibold text-slate-800">Portail Client</h1>
      </div>
      
      <button @click="logout()" class="text-slate-600 hover:text-slate-800">
        <i class="fas fa-sign-out-alt mr-2"></i>Déconnexion
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <template x-if="!loading && client">
      <div class="space-y-6">
        
        <!-- Client Info -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <h2 class="text-lg font-semibold text-slate-800 mb-2" x-text="client.nom"></h2>
          <p class="text-slate-600" x-text="client.email"></p>
        </div>
        
        <!-- Tabs -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="border-b border-slate-200">
            <div class="flex">
              <button @click="switchTabFactures()" 
                      :class="activeTab === 'factures' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-600'"
                      class="px-6 py-3 text-sm font-medium">
                Factures
              </button>
              <button @click="switchTabApporteur()" 
                      :class="activeTab === 'apporteur' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-600'"
                      class="px-6 py-3 text-sm font-medium">
                Apporteur
              </button>
            </div>
          </div>
          
          <div class="p-6">
            <!-- Factures Tab -->
            <div x-show="activeTab === 'factures'">
              <div class="space-y-4">
                <template x-for="facture in factures" :key="facture.id">
                  <div class="flex items-center justify-between p-4 border border-slate-200 rounded-lg">
                    <div>
                      <p class="font-medium text-slate-900" x-text="facture.nfacture"></p>
                      <p class="text-sm text-slate-500" x-text="formatDate(facture.date)"></p>
                    </div>
                    <div class="flex items-center gap-4">
                      <p class="font-medium" x-text="formatMoney(facture.montant)"></p>
                      <div class="flex gap-2">
                        <button @click="downloadFacture(facture.id)" class="text-sky-600 hover:text-sky-800">
                          <i class="fas fa-download"></i>
                        </button>
                        <button @click="reglerFacture(facture.id)" x-show="facture.statut === 'impaye'" class="text-green-600 hover:text-green-800">
                          <i class="fas fa-credit-card"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
            
            <!-- Apporteur Tab -->
            <div x-show="activeTab === 'apporteur'" x-cloak>
              <div class="text-center py-8">
                <p class="text-slate-500">Informations sur l'apporteur</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600" x-text="error"></p>
    </div>
    
  </main>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% include 'portail_client/alpinejs.html' %}

</body>
</html>
