<!-- Mega-function: Filtrer non lus -->

filterUnread: async function() {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'filterUnread' });
    
    this.filter = 'unread';
    log.debug('FILTER_CHANGED', { filter: this.filter });
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
