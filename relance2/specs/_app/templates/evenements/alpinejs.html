<!-- templates/evenements/alpinejs.html -->
<!-- Initialisation Alpine.js - NOUVEAU PATTERN: Props → Workflows → Init -->
<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('evenements', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Data
            events: [],
            filter: 'all',
            
            // Getters calculés
            get filteredEvents() {
                if (this.filter === 'unread') {
                    return this.events.filter(e => !e.lu);
                }
                return this.events;
            },
            
            // Helpers
            formatDate(dateStr) {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('fr-FR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'evenements/workflows/initial-load.html' %},
            {% include 'evenements/workflows/filter-all.html' %},
            {% include 'evenements/workflows/filter-unread.html' %},
            {% include 'evenements/workflows/mark-all-read.html' %},
            {% include 'evenements/workflows/open-event.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'evenements/workflows/workflow-init.html' %}
        }));
    });
</script>
