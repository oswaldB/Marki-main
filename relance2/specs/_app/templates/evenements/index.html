<!-- templates/evenements/index.html -->
<!-- Page Événements - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Événements | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="evenements"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="evenements" x-init="init()">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <h1 class="text-base font-semibold text-slate-700">Événements</h1>
    
    <div class="flex gap-2">
      <button @click="filterAll()" :class="filter === 'all' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'" class="px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-200">Tous</button>
      <button @click="filterUnread()" :class="filter === 'unread' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600'" class="px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-200">Non lus</button>
    </div>
  </header>

  <main class="p-6">
    
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <template x-if="!loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex justify-between">
          <p class="text-sm text-slate-600"><span x-text="filteredEvents.length"></span> événement(s)</p>
          <button @click="markAllRead()" class="text-sm text-sky-600 hover:text-sky-800">Tout marquer comme lu</button>
        </div>
        
        <div class="divide-y divide-slate-100">
          <template x-for="event in filteredEvents" :key="event.id">
            <div @click="openEvent(event.id)" class="px-6 py-4 hover:bg-slate-50 cursor-pointer" :class="!event.lu ? 'bg-sky-50/30' : ''">
              <div class="flex items-start gap-3">
                <div class="w-2 h-2 rounded-full mt-2" :class="!event.lu ? 'bg-sky-500' : 'bg-slate-300'"></div>
                <div class="flex-1">
                  <p class="text-sm font-medium text-slate-900" x-text="event.titre"></p>
                  <p class="text-xs text-slate-500" x-text="formatDate(event.date)"></p>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600" x-text="error"></p>
    </div>
    
  </main>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>
{% include 'evenements/alpinejs.html' %}

</body>
</html>
