<!-- templates/impayes_detail/alpinejs.html -->
<!-- Initialisation Alpine.js - NOUVEAU PATTERN: Props → Workflows → Init -->
<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('impayesDetail', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Data
            impaye: null,
            impayeId: null,
            
            // Helpers
            formatMoney(amount) {
                return new Intl.NumberFormat('fr-FR', { 
                    style: 'currency', 
                    currency: 'EUR' 
                }).format(amount);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('fr-FR');
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'impayes_detail/workflows/initial-load.html' %},
            {% include 'impayes_detail/workflows/open-pdf.html' %},
            {% include 'impayes_detail/workflows/suspend-facture.html' %},
            {% include 'impayes_detail/workflows/unsuspend-facture.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'impayes_detail/workflows/workflow-init.html' %}
        }));
    });
</script>
