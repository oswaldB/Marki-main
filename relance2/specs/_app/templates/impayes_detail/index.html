<!-- templates/impayes_detail/index.html -->
<!-- Page Impayes Détail - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail Impayé | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="impayes"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="impayesDetail" x-init="init()">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Détail Impayé</h1>
    </div>
    <a href="/impayes" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium">
      <i class="fas fa-arrow-left"></i>
      <span>Retour</span>
    </a>
  </header>

  <main class="p-6">
    
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <template x-if="!loading && impaye">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
        <h2 class="text-xl font-semibold text-slate-800 mb-4" x-text="impaye.nfacture"></h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div>
            <span class="text-sm text-slate-500">Montant:</span>
            <p class="text-lg font-medium" x-text="formatMoney(impaye.montant_total)"></p>
          </div>
          <div>
            <span class="text-sm text-slate-500">Échéance:</span>
            <p x-text="formatDate(impaye.date_echeance)"></p>
          </div>
        </div>
        
        <div class="flex gap-3">
          <button @click="openPdf(impaye.id)" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200">
            <i class="fas fa-file-pdf mr-2"></i>Voir PDF
          </button>
          <button @click="suspendFacture(impaye.id)" x-show="impaye.statut !== 'suspendu'" class="px-4 py-2 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200">
            <i class="fas fa-pause mr-2"></i>Suspendre
          </button>
        </div>
      </div>
    </template>

    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600" x-text="error"></p>
    </div>
    
  </main>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>
{% include 'impayes_detail/alpinejs.html' %}

</body>
</html>
