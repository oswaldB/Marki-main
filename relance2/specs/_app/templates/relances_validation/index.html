<!-- templates/relances_validation/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Relances | Marki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { font-family: 'Inter', system-ui, sans-serif; }
        [x-cloak] { display: none !important; }
        .email-preview { font-family: 'Georgia', serif; }
    </style>
</head>
<body x-data="relancesValidation" x-init="init()">

    <div class="md:ml-[284px] min-h-screen bg-slate-50">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <h1 class="text-base font-semibold text-slate-700">Validation</h1>
                <span class="text-slate-400">/</span>
                <span class="text-sm text-slate-500">Relances à valider</span>
            </div>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex" style="height: calc(100vh - 140px);">
                
                <!-- Left Column: List -->
                <div class="w-1/3 border-r border-slate-200 flex flex-col">
                    
                    <!-- Filters -->
                    <div class="p-4 border-b border-slate-100 bg-slate-50">
                        <div class="relative">
                            <i class="fas fa-search text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                            <input type="text" x-model="searchQuery" placeholder="Rechercher..."
                                class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
                        </div>
                        
                        <div class="flex items-center gap-2 mt-3 flex-wrap">
                            <button @click="filterAll()" :class="filterType === 'all' ? 'bg-sky-500 text-white' : 'bg-white text-slate-600'"
                                class="px-3 py-1 rounded-full text-xs font-medium transition-all">
                                Toutes <span x-text="relances.length"></span>
                            </button>
                            <button @click="filterEmail()" :class="filterType === 'email' ? 'bg-sky-500 text-white' : 'bg-white text-slate-600'"
                                class="px-3 py-1 rounded-full text-xs font-medium transition-all">Email</button>
                            <button @click="filterToday()" :class="filterToday ? 'bg-sky-500 text-white' : 'bg-white text-slate-600'"
                                class="px-3 py-1 rounded-full text-xs font-medium transition-all">Aujourd'hui</button>
                        </div>
                    </div>
                    
                    <!-- Relances List -->
                    <div class="flex-1 overflow-y-auto">
                        <template x-for="relance in filteredRelances" :key="relance.id">
                            <div @click="selectRelance(relance)"
                                class="px-4 py-3 border-b border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors"
                                :class="{ 'bg-sky-50 border-l-4 border-l-sky-500': selectedRelance?.id === relance.id }">
                                <div class="flex items-start justify-between gap-2">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="w-2 h-2 rounded-full bg-sky-500"></span>
                                            <p class="font-medium text-slate-900 truncate" x-text="relance.payeur"></p>
                                        </div>
                                        <p class="text-sm text-slate-600 truncate" x-text="relance.objet"></p>
                                        <p class="text-xs text-slate-400 mt-1" x-text="relance.dateProgrammee"></p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                
                <!-- Right Column: Detail -->
                <div class="flex-1 flex flex-col">
                    <template x-if="!selectedRelance">
                        <div class="flex-1 flex items-center justify-center text-slate-400">
                            <div class="text-center">
                                <i class="fas fa-hand-pointer text-4xl mb-3"></i>
                                <p>Sélectionnez une relance</p>
                            </div>
                        </div>
                    </template>
                    
                    <template x-if="selectedRelance">
                        <div class="flex flex-col h-full">
                            
                            <!-- Header -->
                            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <h2 class="text-lg font-semibold text-slate-900" x-text="selectedRelance.objet"></h2>
                                    </div>
                                    
                                    <div class="flex items-center gap-2">
                                        <button @click="validerRelance()" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
                                            <i class="fas fa-check mr-1"></i>Valider
                                        </button>
                                        
                                        <button @click="supprimerRelance()" class="p-2 text-slate-600 hover:text-red-600">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                        
                                        <button @click="blacklisterRelance()" class="p-2 text-slate-600 hover:text-orange-600">
                                            <i class="fas fa-ban"></i>
                                        </button>
                                        
                                        <button @click="suspendreRelance()" class="p-2 text-slate-600 hover:text-amber-600">
                                            <i class="fas fa-pause"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Content -->
                            <div class="flex-1 overflow-y-auto p-6">
                                <div class="mb-6 space-y-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-slate-500 mb-1">Destinataire</label>
                                            <input type="text" x-model="editForm.destinataire" class="w-full px-3 py-2 border rounded-lg text-sm">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-xs font-medium text-slate-500 mb-1">Date d'envoi</label>
                                            <input type="date" x-model="editForm.date" class="w-full px-3 py-2 border rounded-lg text-sm">
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 mb-1">Objet</label>
                                        <input type="text" x-model="editForm.objet" class="w-full px-3 py-2 border rounded-lg text-sm">
                                    </div>
                                    
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 mb-1">Corps</label>
                                        <textarea x-model="editForm.corps" rows="8" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Footer Actions -->
                            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex items-center justify-end gap-2">
                                <button @click="saveChanges()" class="px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg text-sm font-medium">
                                    Enregistrer
                                </button>
                                
                                <button @click="validerRelance()" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
                                    Valider
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Suspension -->
    <div x-show="showSuspendModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-500/75" @click="showSuspendModal = false"></div>
        
        <div class="relative bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-lg font-semibold text-slate-900 mb-4">Suspendre la relance</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Motif de suspension *</label>
                    <select x-model="suspendForm.motif" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <option value="">Choisir...</option>
                        <option value="litige">Litige en cours</option>
                        <option value="arrangement">Arrangement</option>
                        <option value="procedure">Procédure judiciaire</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
            </div>
            
            <div class="flex items-center justify-end gap-2 mt-6">
                <button @click="showSuspendModal = false" class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg text-sm">Annuler</button>
                
                <button @click="confirmSuspend()" :disabled="!suspendForm.motif"
                    class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white rounded-lg text-sm">
                    Confirmer
                </button>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% include 'relances_validation/alpinejs.html' %}

</body>
</html>
