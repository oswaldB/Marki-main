<!-- Initialisation Alpine.js - NOUVEAU PATTERN: Props → Workflows → Init -->
<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('settingsSmtpDetail', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            saving: false,
            testing: false,
            error: null,
            
            // Data
            profil: {
                nom: '',
                email: '',
                serveur: '',
                port: 587,
                password: ''
            },
            isNew: false,
            profilId: null,
            showPassword: false,
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'settings_smtp_detail/workflows/initial-load.html' %},
            {% include 'settings_smtp_detail/workflows/save-changes.html' %},
            {% include 'settings_smtp_detail/workflows/tester-connexion.html' %},
            {% include 'settings_smtp_detail/workflows/toggle-password.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'settings_smtp_detail/workflows/workflow-init.html' %}
        }));
    });
</script>
