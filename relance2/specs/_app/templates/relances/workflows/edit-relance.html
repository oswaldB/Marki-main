<!-- Mega-function: Éditer relance -->

editRelance: async function(id) {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'editRelance', relanceId: id });
    
    window.location.href = `/relances-detail?id=${id}&edit=1`;
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
