<!-- Mega-function: Voir relance -->

viewRelance: async function(id) {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'viewRelance', relanceId: id });
    
    window.location.href = `/relances-detail?id=${id}`;
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
