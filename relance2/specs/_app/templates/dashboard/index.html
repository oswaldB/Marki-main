<!-- templates/dashboard/index.html -->
<!-- Page Dashboard - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="dashboard"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="dashboard" x-init="init()">
  
  <!-- Header -->
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div>
      <h1 class="text-base font-semibold text-slate-700">Tableau de bord</h1>
    </div>
    <div class="flex items-center gap-3">
      <button @click="clearEvents()" class="text-slate-600 hover:text-slate-800 px-3 py-2 rounded-lg hover:bg-slate-100">
        <i class="fas fa-bell-slash"></i>
        Vider notifications
      </button>
    </div>
  </header>

  <main class="p-6">
    
    <!-- Loading -->
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <!-- Content -->
    <template x-if="!loading">
      <div class="space-y-6">
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          
          <!-- Card Impayés -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-slate-500">Impayés</p>
                <p class="text-2xl font-bold text-slate-900" x-text="stats.impayes || 0"></p>
              </div>
              <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-file-invoice-dollar text-amber-600 text-xl"></i>
              </div>
            </div>
          </div>
          
          <!-- Card Relances -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-slate-500">Relances en cours</p>
                <p class="text-2xl font-bold text-slate-900" x-text="stats.relances || 0"></p>
              </div>
              <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-envelope text-blue-600 text-xl"></i>
              </div>
            </div>
          </div>
          
          <!-- Card Montant Total -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-slate-500">Montant total</p>
                <p class="text-2xl font-bold text-slate-900" x-text="formatMoney(stats.montant_total || 0)"></p>
              </div>
              <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-euro-sign text-green-600 text-xl"></i>
              </div>
            </div>
          </div>
          
        </div>
        
        <!-- View Toggle -->
        <div class="flex justify-end gap-2">
          <button @click="switchViewCard()" 
                  :class="viewMode === 'card' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'"
                  class="px-3 py-2 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-th-large"></i>
          </button>
          <button @click="switchViewList()" 
                  :class="viewMode === 'list' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'"
                  class="px-3 py-2 rounded-lg text-sm font-medium transition-colors">
            <i class="fas fa-list"></i>
          </button>
        </div>
        
        <!-- Events Section -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <h2 class="text-lg font-semibold text-slate-800 mb-4">Événements récents</h2>
          
          <template x-if="events.length === 0">
            <p class="text-slate-500 text-sm">Aucun événement récent</p>
          </template>
          
          <div class="space-y-2">
            <template x-for="event in events" :key="event.id">
              <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg">
                <i :class="event.icon || 'fas fa-info-circle'" class="text-slate-400"></i>
                <div class="flex-1">
                  <p class="text-sm text-slate-700" x-text="event.message"></p>
                  <p class="text-xs text-slate-500" x-text="formatDate(event.date)"></p>
                </div>
              </div>
            </template>
          </div>
        </div>
        
        <!-- Sync Button -->
        <div class="flex justify-center">
          <button @click="syncData()" :disabled="loading"
                  class="flex items-center gap-2 px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-sky-300 text-white rounded-lg transition-colors">
            <i class="fas fa-sync" :class="loading ? 'fa-spin' : ''"></i>
            <span>Synchroniser les données</span>
          </button>
        </div>
        
      </div>
    </template>

    <!-- Error -->
    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <div class="flex items-start gap-3">
        <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-red-800">Erreur</p>
          <p class="text-sm text-red-600" x-text="error"></p>
        </div>
      </div>
    </div>
    
  </main>
</div>

<!-- ✅ Alpine.js À LA FIN DU BODY -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>

<!-- Initialisation Alpine.js avec workflows -->
{% include 'dashboard/alpinejs.html' %}

</body>
</html>
