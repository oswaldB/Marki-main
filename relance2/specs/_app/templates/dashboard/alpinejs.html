<!-- templates/dashboard/alpinejs.html -->
<!-- Initialisation Alpine.js - Props → Init → Workflows -->
<script>
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('dashboard', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Données brutes (pour calculs côté frontend)
            impayes: [],
            relances: [],
            contacts: [],
            events: [],
            
            // Vue
            viewMode: 'card',
            
            // KPIs calculés
            stats: {
                total_impayes: 0,
                montant_total: 0,
                relances_en_cours: 0,
                a_envoyer: 0,
                contacts_actifs: 0
            },
            
            // Getters calculés
            get itemCount() {
                return this.events.length;
            },
            
            // Helpers
            formatMoney(amount) {
                return new Intl.NumberFormat('fr-FR', { 
                    style: 'currency', 
                    currency: 'EUR',
                    minimumFractionDigits: 2
                }).format(amount || 0);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return new Intl.DateTimeFormat('fr-FR', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                }).format(date);
            },
            
            // =====================================================
            // 2. INIT (EN PREMIER - charge les données)
            // =====================================================
            {% include 'dashboard/workflows/workflow-init.html' %},
            
            // =====================================================
            // 3. WORKFLOWS (méthodes asynchrones)
            // =====================================================
            {% include 'dashboard/workflows/initial-load.html' %},
            {% include 'dashboard/workflows/load-impayes.html' %},
            {% include 'dashboard/workflows/load-relances.html' %},
            {% include 'dashboard/workflows/load-contacts.html' %},
            {% include 'dashboard/workflows/load-events.html' %},
            {% include 'dashboard/workflows/sync-data.html' %},
            {% include 'dashboard/workflows/clear-events.html' %},
            {% include 'dashboard/workflows/switch-view-card.html' %},
            {% include 'dashboard/workflows/switch-view-list.html' %},
            {% include 'dashboard/workflows/refresh-stats.html' %},
            
            // Helpers de calcul
            calculateStats() {
                this.stats.total_impayes = this.impayes.length;
                this.stats.montant_total = this.impayes.reduce((sum, i) => sum + (i.montant || 0), 0);
                this.stats.relances_en_cours = this.relances.filter(r => r.statut === 'en_cours').length;
                this.stats.a_envoyer = this.relances.filter(r => r.statut === 'a_envoyer').length;
                this.stats.contacts_actifs = this.contacts.length;
                
                log.debug('STATS_CALCULATED', { stats: this.stats });
            }
        }));
    });
</script>
