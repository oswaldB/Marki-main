<!-- Fonction init() uniquement - Les props sont dans alpinejs.html -->

// Initialisation du composant
init: function() {
    log.info('PAGE_INIT', { page: 'impayes_payeur' });
    
    const urlParams = new URLSearchParams(window.location.search);
    this.payeurId = urlParams.get('payeur_id');
    
    if (!this.payeurId) {
        this.error = 'ID payeur manquant';
        return;
    }
    
    this.initialLoad();
}
