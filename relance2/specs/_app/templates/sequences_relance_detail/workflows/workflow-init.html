init: function() {
    log.info('PAGE_INIT', { page: 'sequences_relance_detail' });
    
    const urlParams = new URLSearchParams(window.location.search);
    this.sequenceId = urlParams.get('id');
    
    if (!this.sequenceId) {
        this.error = 'ID de séquence manquant';
        return;
    }
    
    this.initialLoad();
}
