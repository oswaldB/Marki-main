<!-- templates/sequences/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séquences | Marki</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { font-family: 'Inter', system-ui, sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="sequences" x-init="init()" class="bg-slate-50">

    <div class="md:ml-[284px] min-h-screen">
        
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
            <div>
                <h1 class="text-lg font-semibold text-slate-800">Séquences de relance</h1>
                <p class="text-xs text-slate-500">Gérez vos scénarios d'escalade</p>
            </div>
            
            <button @click="showNewSequenceModal = true" class="flex items-center gap-2 px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
                <i class="fas fa-plus"></i>Nouvelle séquence
            </button>
        </header>

        <main class="p-6">
            <!-- Stats Row -->
            <div class="flex flex-wrap gap-3 mb-6">
                <div class="bg-white rounded-lg border border-slate-200 px-4 py-3 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-sky-50 flex items-center justify-center">
                        <i class="fas fa-stream text-sky-500"></i>
                    </div>
                    <div>
                        <p class="text-xl font-bold text-slate-800" x-text="sequences.length"></p>
                        <p class="text-xs text-slate-500">Séquences</p>
                    </div>
                </div>
            </div>
            
            <!-- Filters Bar -->
            <div class="bg-white rounded-lg border border-slate-200 p-3 mb-6 flex flex-wrap items-center gap-3">
                <div class="relative flex-1 min-w-[200px] max-w-md">
                    <i class="fas fa-search text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 text-sm"></i>
                    <input type="text" x-model="searchQuery" placeholder="Rechercher une séquence..."
                        class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                </div>
                
                <div class="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
                    <button @click="filterAll()" :class="filterType === 'all' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'"
                        class="px-3 py-1.5 rounded-md text-sm font-medium">Toutes</button>
                    
                    <button @click="filterRelance()" :class="filterType === 'relance' ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-500'"
                        class="px-3 py-1.5 rounded-md text-sm font-medium">Relance</button>
                    
                    <button @click="filterSuivi()" :class="filterType === 'suivi' ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-500'"
                        class="px-3 py-1.5 rounded-md text-sm font-medium">Suivi</button>
                </div>
            </div>
            
            <!-- Sequences Table -->
            <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-slate-200 bg-slate-50/50">
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500 uppercase">Séquence</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500 uppercase">Type</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500 uppercase">Étapes</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="sequence in filteredSequences" :key="sequence.id">
                            <tr class="hover:bg-slate-50/50">
                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-lg bg-sky-100 flex items-center justify-center text-xs font-bold text-sky-600"
                                            x-text="sequence.id">
                                        </div>
                                        
                                        <div>
                                            <p class="text-sm font-medium text-slate-800" x-text="sequence.nom"></p>
                                            <p class="text-xs text-slate-500" x-text="sequence.description"></p>
                                        </div>
                                    </div>
                                </td>
                                
                                <td class="px-4 py-3">
                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-sky-50 text-sky-700 border border-sky-100"
                                        x-text="sequence.type === 'relance' ? 'Relance' : 'Suivi'">
                                    </span>
                                </td>
                                
                                <td class="px-4 py-3">
                                    <span class="text-sm text-slate-700 font-medium" x-text="sequence.etapesTotal"></span>
                                    <span class="text-xs text-slate-400"> étapes</span>
                                </td>
                                
                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-1">
                                        <a :href="`/sequences/${sequence.type}/${sequence.id}`"
                                            class="p-2 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        
                                        <button @click="duplicateSequence(sequence)" class="p-2 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- New Sequence Modal -->
    <div x-show="showNewSequenceModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50">
        <div @click.away="closeModal()" class="bg-white rounded-xl shadow-xl w-full max-w-lg">
            
            <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                <h3 class="text-base font-semibold text-slate-800">Nouvelle séquence</h3>
                
                <button @click="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Nom *</label>
                    <input type="text" x-model="newSequence.nom" placeholder="Ex: Relance standard clients"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Type</label>
                    <select x-model="newSequence.type" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                        <option value="relance">Relance</option>
                        <option value="suivi">Suivi</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                    <textarea x-model="newSequence.description" rows="3"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm resize-none"></textarea>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50/50 flex items-center justify-end gap-3">
                <button @click="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm">Annuler</button>
                
                <button @click="createSequence()" :disabled="!newSequence.nom"
                    class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white rounded-lg text-sm">
                    Créer
                </button>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% include 'sequences/alpinejs.html' %}

</body>
</html>
