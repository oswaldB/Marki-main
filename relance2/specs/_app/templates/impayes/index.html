<!-- templates/impayes/index.html -->
<!-- Page Impayés - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impayés | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="impayes"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="impayes" x-init="init()">
  
  <!-- Header -->
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Impayés</h1>
      <span class="text-slate-400">/</span>
      <span class="text-sm text-slate-500">Liste des factures impayées</span>
    </div>
    
    <div class="flex items-center gap-3">
      <button @click="syncData()" :disabled="loading"
              class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-all">
        <i class="fas fa-sync" :class="loading ? 'fa-spin' : ''"></i>
        <span>Synchroniser</span>
      </button>
    </div>
  </header>

  <main class="p-6">
    
    <!-- Filters -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-6">
      <div class="flex flex-wrap gap-4">
        <input type="text" x-model="filters.search" placeholder="Rechercher..."
               class="px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
        
        <select x-model="filters.statut" class="px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
          <option value="">Tous les statuts</option>
          <option value="impaye">Impayé</option>
          <option value="suspendu">Suspendu</option>
        </select>
      </div>
    </div>
    
    <!-- Loading -->
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <!-- Table -->
    <template x-if="!loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
          <p class="text-sm text-slate-600">
            <span x-text="filteredImpayes.length"></span> impayé(s)
          </p>
          
          <!-- Pagination -->
          <div class="flex items-center gap-2">
            <button @click="paginationPrev()" :disabled="currentPage === 1"
                    class="px-3 py-1 text-slate-600 hover:bg-slate-100 rounded-lg disabled:opacity-50">
              <i class="fas fa-chevron-left"></i>
            </button>
            <span class="text-sm text-slate-600">Page <span x-text="currentPage"></span> / <span x-text="totalPages"></span></span>
            <button @click="paginationNext()" :disabled="currentPage === totalPages"
                    class="px-3 py-1 text-slate-600 hover:bg-slate-100 rounded-lg disabled:opacity-50">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
        
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-600 font-medium">
            <tr>
              <th class="px-6 py-3 cursor-pointer hover:bg-slate-100" @click="sortByNumero()">
                N° Facture <i class="fas fa-sort"></i>
              </th>
              <th class="px-6 py-3 cursor-pointer hover:bg-slate-100" @click="sortByDossier()">
                Dossier <i class="fas fa-sort"></i>
              </th>
              <th class="px-6 py-3 cursor-pointer hover:bg-slate-100" @click="sortByPayeur()">
                Payeur <i class="fas fa-sort"></i>
              </th>
              <th class="px-6 py-3 cursor-pointer hover:bg-slate-100 text-right" @click="sortByMontant()">
                Montant <i class="fas fa-sort"></i>
              </th>
              <th class="px-6 py-3 cursor-pointer hover:bg-slate-100" @click="sortByEcheance()">
                Échéance <i class="fas fa-sort"></i>
              </th>
              <th class="px-6 py-3">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-for="impaye in paginatedImpayes" :key="impaye.id">
              <tr class="hover:bg-slate-50/50">
                <td class="px-6 py-4 font-medium text-slate-900" x-text="impaye.nfacture"></td>
                <td class="px-6 py-4 font-mono text-slate-700" x-text="impaye.numero_dossier || '-'"></td>
                <td class="px-6 py-4 text-slate-700" x-text="impaye.payeur_nom || 'Non attribué'"></td>
                <td class="px-6 py-4 text-right font-medium" x-text="formatMoney(impaye.montant_total)"></td>
                <td class="px-6 py-4 text-slate-600" x-text="formatDate(impaye.date_echeance)"></td>
                <td class="px-6 py-4">
                  <div class="flex gap-2">
                    <button @click="openDetail(impaye.id)" class="text-sky-600 hover:text-sky-800">
                      <i class="fas fa-eye"></i>
                    </button>
                    <button @click="suspendFacture(impaye.id)" x-show="impaye.statut !== 'suspendu'" class="text-amber-600 hover:text-amber-800">
                      <i class="fas fa-pause"></i>
                    </button>
                    <button @click="unsuspendFacture(impaye.id)" x-show="impaye.statut === 'suspendu'" class="text-green-600 hover:text-green-800">
                      <i class="fas fa-play"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>

    <!-- Error -->
    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <div class="flex items-start gap-3">
        <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-red-800">Erreur</p>
          <p class="text-sm text-red-600" x-text="error"></p>
        </div>
      </div>
    </div>
    
  </main>
</div>

<!-- ✅ Alpine.js À LA FIN DU BODY -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>

<!-- Initialisation Alpine.js avec workflows -->
{% include 'impayes/alpinejs.html' %}

</body>
</html>
