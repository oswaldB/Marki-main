<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('settingsUtilisateurs', () => ({

            // UI State
            loading: false,
            error: null,
            
            // Data
            users: [],
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'settings_utilisateurs/workflows/initial-load.html' %},
            {% include 'settings_utilisateurs/workflows/open-add-user.html' %},
            {% include 'settings_utilisateurs/workflows/edit-user.html' %},
            {% include 'settings_utilisateurs/workflows/update-user.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'settings_utilisateurs/workflows/workflow-init.html' %}
        }));
    });
</script>
