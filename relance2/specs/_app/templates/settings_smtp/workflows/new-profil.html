<!-- Mega-function: Nouveau profil -->

newProfil: async function() {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'newProfil' });
    
    window.location.href = '/settings-smtp-detail?action=new';
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
