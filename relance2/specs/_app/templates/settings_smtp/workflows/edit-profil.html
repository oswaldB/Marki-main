<!-- Mega-function: Éditer profil -->

editProfil: async function(id) {
    const workflowId = crypto.randomUUID();
    log.info('WORKFLOW_START', { workflowId, workflow: 'editProfil', profilId: id });
    
    window.location.href = `/settings-smtp-detail?id=${id}`;
    
    log.info('WORKFLOW_SUCCESS', { workflowId });
}
