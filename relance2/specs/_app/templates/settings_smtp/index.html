<!-- templates/settings_smtp/index.html -->
<!-- Page Settings SMTP - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paramètres SMTP | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="settings"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="settingsSmtp" x-init="init()">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <h1 class="text-base font-semibold text-slate-700">Paramètres SMTP</h1>
  </header>

  <main class="p-6">
    
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <template x-if="!loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
        <h2 class="text-lg font-semibold text-slate-800 mb-4">Profils SMTP</h2>
        
        <div class="space-y-4">
          <template x-for="profil in profils" :key="profil.id">
            <div class="flex items-center justify-between p-4 border border-slate-200 rounded-lg hover:bg-slate-50">
              <div>
                <p class="font-medium text-slate-900" x-text="profil.nom"></p>
                <p class="text-sm text-slate-500" x-text="profil.email"></p>
              </div>
              <div class="flex gap-2">
                <button @click="editProfil(profil.id)" class="text-sky-600 hover:text-sky-800">
                  <i class="fas fa-edit"></i>
                </button>
                <button @click="testProfil(profil.id)" class="text-green-600 hover:text-green-800">
                  <i class="fas fa-play"></i>
                </button>
                <button @click="deleteProfil(profil.id)" class="text-red-600 hover:text-red-800">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </template>
        </div>
        
        <button @click="newProfil()" class="mt-6 px-4 py-2 bg-sky-500 text-white rounded-lg hover:bg-sky-600">
          <i class="fas fa-plus mr-2"></i>Nouveau profil
        </button>
      </div>
    </template>

    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600" x-text="error"></p>
    </div>
    
  </main>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>
{% include 'settings_smtp/alpinejs.html' %}

</body>
</html>
