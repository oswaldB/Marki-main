<!-- templates/impayes_suspendus/alpinejs.html -->
<!-- Initialisation Alpine.js - NOUVEAU PATTERN: Props → Workflows → Init -->
<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('impayesSuspendus', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Data
            impayesSuspendus: [],
            
            // Helpers
            formatMoney(amount) {
                return new Intl.NumberFormat('fr-FR', { 
                    style: 'currency', 
                    currency: 'EUR',
                    minimumFractionDigits: 2
                }).format(amount);
            },
            
            formatDate(dateStr) {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return new Intl.DateTimeFormat('fr-FR', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric' 
                }).format(date);
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'impayes_suspendus/workflows/initial-load.html' %},
            {% include 'impayes_suspendus/workflows/reactivate-impaye.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'impayes_suspendus/workflows/workflow-init.html' %}
        }));
    });
</script>
