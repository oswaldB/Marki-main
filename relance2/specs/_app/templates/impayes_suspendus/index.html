<!-- templates/impayes_suspendus/index.html -->
<!-- Page Impayés Suspendus - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impayés Suspendus | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="impayes"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="impayesSuspendus" x-init="init()">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Impayés Suspendus</h1>
      <span class="text-slate-400">/</span>
      <span class="text-sm text-slate-500">Factures en attente de réactivation</span>
    </div>
    
    <a href="/impayes" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-all">
      <i class="fas fa-arrow-left"></i>
      <span>Retour</span>
    </a>
  </header>

  <main class="p-6">
    
    <!-- Info banner -->
    <div class="bg-orange-50 border border-orange-200 rounded-xl p-4 mb-6">
      <div class="flex items-start gap-3">
        <i class="fas fa-pause-circle text-orange-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-orange-800">Impayés suspendus</p>
          <p class="text-sm text-orange-600">Ces factures sont temporairement exclues des relances. Vous pouvez les réactiver.</p>
        </div>
      </div>
    </div>
    
    <!-- Loading -->
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>
    
    <!-- Empty -->
    <template x-if="!loading && impayesSuspendus.length === 0">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm py-16">
        <div class="text-center">
          <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check text-green-500 text-2xl"></i>
          </div>
          <h3 class="text-lg font-medium text-slate-900 mb-1">Aucun impayé suspendu</h3>
          <p class="text-sm text-slate-500">Toutes les factures sont actives.</p>
        </div>
      </div>
    </template>
    
    <!-- Table -->
    <template x-if="!loading && impayesSuspendus.length > 0">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
          <p class="text-sm text-slate-600">
            <span x-text="impayesSuspendus.length"></span> facture(s) suspendue(s)
          </p>
        </div>
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-600 font-medium">
            <tr>
              <th class="px-6 py-3">N° Facture</th>
              <th class="px-6 py-3">Payeur</th>
              <th class="px-6 py-3 text-right">Montant</th>
              <th class="px-6 py-3">Date suspension</th>
              <th class="px-6 py-3 text-right">Action</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-for="impaye in impayesSuspendus" :key="impaye.id">
              <tr class="hover:bg-slate-50/50">
                <td class="px-6 py-4 font-medium text-slate-900" x-text="impaye.nfacture"></td>
                <td class="px-6 py-4 text-slate-700" x-text="impaye.payeur_nom || 'Non attribué'"></td>
                <td class="px-6 py-4 text-right font-medium" x-text="formatMoney(impaye.montant_total)"></td>
                <td class="px-6 py-4 text-slate-600" x-text="formatDate(impaye.date_suspension)"></td>
                <td class="px-6 py-4 text-right">
                  <button 
                    @click="reactivateImpaye(impaye.id)"
                    :disabled="loading"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-green-700 bg-green-100 hover:bg-green-200 rounded-lg transition-colors disabled:opacity-50"
                  >
                    <i class="fas fa-play"></i>
                    <span>Réactiver</span>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
    
    <!-- Error -->
    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <div class="flex items-start gap-3">
        <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-red-800">Erreur</p>
          <p class="text-sm text-red-600" x-text="error"></p>
        </div>
      </div>
    </div>
    
  </main>
</div>

<!-- ✅ Alpine.js À LA FIN DU BODY -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>

<!-- Initialisation Alpine.js avec workflows -->
{% include 'impayes_suspendus/alpinejs.html' %}

</body>
</html>
