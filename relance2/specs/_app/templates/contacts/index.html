<!-- templates/contacts/index.html -->
<!-- Page Contacts - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50">

<sidebar-nav-dual page="contacts"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50" x-data="contacts" x-init="init()">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Contacts</h1>
    </div>
  </header>

  <main class="p-6">
    
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <template x-if="!loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
          <p class="text-sm text-slate-600"><span x-text="contacts.length"></span> contact(s)</p>
        </div>
        
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 text-slate-600 font-medium">
            <tr>
              <th class="px-6 py-3">Nom</th>
              <th class="px-6 py-3">Email</th>
              <th class="px-6 py-3">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-for="contact in contacts" :key="contact.id">
              <tr class="hover:bg-slate-50/50">
                <td class="px-6 py-4 font-medium text-slate-900" x-text="contact.nom"></td>
                <td class="px-6 py-4 text-slate-700" x-text="contact.email"></td>
                <td class="px-6 py-4">
                  <button @click="toggleBlacklist(contact.id)" 
                          :class="contact.blacklist ? 'text-red-600' : 'text-slate-400'"
                          class="hover:text-red-800">
                    <i class="fas fa-ban"></i>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>

    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600" x-text="error"></p>
    </div>
    
  </main>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/static/components/sidebar-nav-dual.js"></script>
{% include 'contacts/alpinejs.html' %}

</body>
</html>
