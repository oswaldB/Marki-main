<!-- templates/contacts/alpinejs.html -->
<!-- Initialisation Alpine.js - NOUVEAU PATTERN: Props → Workflows → Init -->
<script>
    // Logger global pour la page
    const log = {
        debug: (event, data) => console.log(`[DEBUG][${event}]`, JSON.stringify(data)),
        info: (event, data) => console.log(`[INFO][${event}]`, JSON.stringify(data)),
        warn: (event, data) => console.warn(`[WARN][${event}]`, JSON.stringify(data)),
        error: (event, data) => console.error(`[ERROR][${event}]`, JSON.stringify(data))
    };

    document.addEventListener('alpine:init', () => {
        Alpine.data('contacts', () => ({
            // =====================================================
            // 1. PROPS RÉACTIVES (STATE)
            // =====================================================
            
            // UI State
            loading: false,
            error: null,
            
            // Data
            contacts: [],
            
            // Helpers
            formatDate(dateStr) {
                if (!dateStr) return '-';
                return new Date(dateStr).toLocaleDateString('fr-FR');
            },
            
            // =====================================================
            // 2. WORKFLOWS
            // =====================================================
            {% include 'contacts/workflows/initial-load.html' %},
            {% include 'contacts/workflows/toggle-blacklist.html' %},
            
            // =====================================================
            // 3. INIT (en dernier)
            // =====================================================
            {% include 'contacts/workflows/workflow-init.html' %}
        }));
    });
</script>
