<!-- templates/portail_mission/index.html -->
<!-- Page Portail Mission - Template Jinja2 + Alpine.js -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Mission | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="portailMission" x-init="init()">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-semibold text-slate-800">Portail Mission</h1>
      </div>
      <button @click="logout()" class="text-slate-600 hover:text-slate-800">
        <i class="fas fa-sign-out-alt"></i>
        Déconnexion
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6">
    
    <!-- Loading -->
    <template x-if="loading">
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8">
        <div class="flex justify-center">
          <i class="fas fa-spinner fa-spin text-slate-400 text-2xl"></i>
        </div>
      </div>
    </template>

    <!-- Content -->
    <template x-if="!loading && mission">
      <div class="space-y-6">
        
        <!-- Mission Info -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <h2 class="text-lg font-semibold text-slate-800 mb-4" x-text="mission.nom"></h2>
          <p class="text-slate-600" x-text="mission.description"></p>
          
          <div class="mt-4 flex gap-4">
            <button @click="downloadFacture()" 
                    :disabled="loading"
                    class="inline-flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition-colors">
              <i class="fas fa-download"></i>
              Télécharger facture
            </button>
            
            <button @click="reglerFacture()"
                    :disabled="loading"
                    class="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 transition-colors">
              <i class="fas fa-credit-card"></i>
              Régler
            </button>
          </div>
        </div>
        
      </div>
    </template>

    <!-- Error -->
    <div x-show="error" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-xl">
      <div class="flex items-start gap-3">
        <i class="fas fa-exclamation-circle text-red-500 mt-0.5"></i>
        <div>
          <p class="font-medium text-red-800">Erreur</p>
          <p class="text-sm text-red-600" x-text="error"></p>
        </div>
      </div>
    </div>
    
  </main>

<!-- ✅ Alpine.js À LA FIN DU BODY -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<!-- Initialisation Alpine.js avec workflows -->
{% include 'portail_mission/alpinejs.html' %}

</body>
</html>
