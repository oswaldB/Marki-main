<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marki - Connexion Loading (Mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  
  <div class="w-full max-w-md">
    
    <div class="bg-white rounded-lg shadow-lg p-8">
      
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-lg mx-auto mb-4 flex items-center justify-center">
          <span class="text-white text-2xl font-bold">M</span>
        </div>
        <h1 class="text-3xl font-bold text-slate-800">Marki</h1>
        <p class="text-slate-500 mt-2">Gestion des impayés</p>
      </div>
      
      <!-- Formulaire en loading -->
      <form>
        
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input 
            type="text" 
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-100"
            value="admin@marki.fr"
          >
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
          <input 
            type="password" 
            disabled
            class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-100"
            value="••••••••"
          >
        </div>
        
        <!-- Bouton loading -->
        <button 
          type="submit"
          disabled
          class="w-full bg-blue-600 text-white py-2 rounded-lg opacity-50 flex items-center justify-center"
        >
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Connexion...
        </button>
        
      </form>
      
    </div>
  </div>
  
</body>
</html>
