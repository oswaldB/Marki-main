<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marki - Connexion Erreur (Mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-lg mx-auto mb-4 flex items-center justify-center">
          <span class="text-white text-2xl font-bold">M</span>
        </div>
        <h1 class="text-3xl font-bold text-slate-800">Marki</h1>
        <p class="text-slate-500 mt-2">Gestion des impayés</p>
      </div>
      
      <!-- Formulaire avec erreurs -->
      <form>
        <!-- Email avec erreur -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input 
            type="text" 
            class="w-full px-3 py-2 border border-red-500 rounded-lg focus:ring-2 focus:ring-red-500"
            placeholder="admin@marki.fr"
          >
          <p class="text-red-500 text-sm mt-1">Email requis</p>
        </div>
        
        <!-- Password avec erreur -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
          <input 
            type="password" 
            class="w-full px-3 py-2 border border-red-500 rounded-lg focus:ring-2 focus:ring-red-500"
            placeholder="••••••••"
          >
          <p class="text-red-500 text-sm mt-1">Mot de passe requis</p>
        </div>
        
        <!-- Erreur globale -->
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
          <div class="flex items-center">
            <svg class="w-5 h-5 text-red-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span class="text-red-700 text-sm">Identifiants invalides</span>
          </div>
        </div>
        
        <button 
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium"
        >
          Se connecter
        </button>
        
      </form>
      
    </div>
  </div>
  
</body>
</html>
