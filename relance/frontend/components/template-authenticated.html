<!-- Template pour pages authentifiées -->

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAGE_NAME | Marki</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="../components/sidebar-nav-dual.js"></script>
  <script src="../components/utils.js"></script>
  
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="pageData()" x-init="init()">

  <sidebar-nav-dual page="PAGE_NAME"></sidebar-nav-dual>

  <div class="md:ml-[72px] min-h-screen bg-slate-50">
    
    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <h1 class="text-base font-semibold text-slate-700" x-text="pageTitle">Titre</h1>
        <span class="text-slate-400">/</span>
        <span class="text-sm text-slate-500" x-text="pageSubtitle">Sous-titre</span>
      </div>
    </header>

    <!-- Content -->
    <main class="p-6">
      
      <!-- Loading -->
      <div x-show="loading" x-cloak class="bg-white rounded-xl border border-slate-200 p-8 animate-pulse">
        <div class="h-4 bg-slate-200 rounded w-1/3 mb-4"></div>
        <div class="space-y-3">
          <div class="h-3 bg-slate-200 rounded"></div>
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
        </div>
      </div>
      
      <!-- Error -->
      <div x-show="error" x-cloak class="bg-sky-50 border border-sky-100 rounded-xl p-4">
        <i class="fas fa-exclamation-circle text-sky-500"></i>
        <p class="text-sm text-sky-700" x-text="error"></p>
      </div>
      
      <!-- Content -->
      <div x-show="!loading && !error">
        <!-- VOTRE CONTENU -->
      </div>
      
    </main>
  </div>

  <script>
    function pageData() {
      return {
        loading: false,
        error: null,
        pageTitle: 'Titre',
        pageSubtitle: 'Sous-titre',
        
        init() {
          this.checkAuth();
          this.loadData();
        },
        
        checkAuth() {
          if (!localStorage.getItem('marki_token')) {
            window.location.href = '../login/';
          }
        },
        
        async loadData() {
          this.loading = true;
          try {
            // Charger données
            await new Promise(r => setTimeout(r, 500));
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        }
      }
    }
  </script>

</body>
</html>
