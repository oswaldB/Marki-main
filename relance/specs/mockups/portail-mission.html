<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail Mission | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="portailMissionPage()" x-init="init()">

<!-- Token Invalid View -->
<template x-if="!tokenValid">
  <div class="min-h-screen bg-slate-50 flex items-center justify-center">
    <div class="text-center max-w-md px-6">
      <div class="w-20 h-20 bg-sky-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-key text-sky-500 text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 mb-2">Token invalide</h1>
      <p class="text-slate-500 mb-6">Le lien d'accès à cette mission a expiré ou n'est pas valide. Veuillez contacter votre interlocuteur pour recevoir un nouveau lien.</p>
      <a href="./login.html" class="inline-flex items-center gap-2 px-6 py-3 bg-sky-500 hover:bg-sky-600 text-white rounded-lg font-medium">
        <i class="fas fa-sign-in-alt"></i>
        Se connecter
      </a>
    </div>
  </div>
</template>

<!-- Main Portail (when token valid) -->
<template x-if="tokenValid">
  <div class="min-h-screen bg-slate-50">
    
    <!-- Header -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
      <div class="flex items-center gap-3">
        <img src="./marki-logo.png" alt="Marki" class="h-8">
        <span class="text-slate-400">|</span>
        <h1 class="text-base font-semibold text-slate-700">Mission</h1>
      </div>
      <button @click="logout()" class="text-slate-400 hover:text-slate-600">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </header>

    <main class="p-6 max-w-4xl mx-auto">
      
      <!-- Mission Card -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
        <div class="flex items-start justify-between mb-4">
          <div>
            <span class="px-2.5 py-1 text-xs font-medium rounded-full bg-sky-100 text-sky-700 mb-2 inline-block">Mission</span>
            <h2 class="text-2xl font-bold text-slate-900" x-text="mission?.nom"></h2>
          </div>
          <div class="text-right">
            <p class="text-sm text-slate-500">Montant</p>
            <p class="text-xl font-bold text-slate-900" x-text="formatMoney(mission?.montant)"></p>
          </div>
        </div>
        
        <p class="text-slate-600 mb-4" x-text="mission?.description"></p>
        
        <div class="flex items-center gap-6 text-sm text-slate-500 flex-wrap">
          <span><i class="fas fa-calendar mr-1"></i><span x-text="mission?.dateDebut + ' - ' + mission?.dateFin"></span></span>
          <span><i class="fas fa-user mr-1"></i><span x-text="mission?.intervenant"></span></span>
          <span><i class="fas fa-building mr-1"></i><span x-text="mission?.client"></span></span>
          <span><i class="fas fa-map-marker-alt mr-1"></i><span x-text="mission?.adresse || 'Adresse non spécifiée'"></span></span>
        </div>
        
        <div class="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 gap-4 text-sm">
          <div>
            <span class="text-slate-500">Date d'intervention:</span>
            <span class="font-medium text-slate-900 ml-2" x-text="mission?.dateIntervention || '-'"></span>
          </div>
          <div>
            <span class="text-slate-500">Jours depuis échéance:</span>
            <span class="font-medium ml-2" :class="mission?.joursDepuisEcheance > 0 ? 'text-sky-600' : 'text-slate-900'" x-text="(mission?.joursDepuisEcheance > 0 ? '+' : '') + mission?.joursDepuisEcheance + 'j'"></span>
          </div>
        </div>
      </div>
      
      <!-- Documents -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Rapport -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 rounded-lg bg-sky-100 flex items-center justify-center">
              <i class="fas fa-file-alt text-sky-600 text-xl"></i>
            </div>
            <div>
              <h3 class="font-semibold text-slate-900">Rapport de mission</h3>
              <p class="text-sm text-slate-500">Document complet de la mission</p>
            </div>
          </div>
          <button @click="downloadRapport()" class="w-full py-2.5 bg-sky-50 hover:bg-sky-100 text-sky-700 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
            <i class="fas fa-download"></i>
            Télécharger le rapport
          </button>
        </div>
        
        <!-- Facture -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 rounded-lg bg-sky-100 flex items-center justify-center">
              <i class="fas fa-file-invoice text-sky-600 text-xl"></i>
            </div>
            <div>
              <h3 class="font-semibold text-slate-900">Facture</h3>
              <p class="text-sm text-slate-500" x-text="mission?.facture?.numero"></p>
            </div>
          </div>
          
          <div class="mb-4 p-3 bg-slate-50 rounded-lg">
            <div class="flex items-center justify-between text-sm">
              <span class="text-slate-600">Montant TTC</span>
              <span class="font-semibold text-slate-900" x-text="formatMoney(mission?.facture?.montant)"></span>
            </div>
            <div class="flex items-center justify-between text-sm mt-1">
              <span class="text-slate-600">Échéance</span>
              <span x-text="mission?.facture?.echeance"></span>
            </div>
          </div>
          
          <div class="flex gap-2">
            <button @click="downloadFacture()" class="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition-all">
              <i class="fas fa-download mr-1"></i>Télécharger
            </button>
            <button @click="reglerFacture()" x-show="mission?.facture?.statut !== 'payee'" class="flex-1 py-2.5 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium transition-all">
              <i class="fas fa-credit-card mr-1"></i>Régler
            </button>
          </div>
        </div>
      </div>
      
    </main>
    
    <!-- Footer avec logo -->
    <footer class="bg-white border-t border-slate-200 py-6 mt-12">
      <div class="max-w-4xl mx-auto px-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="./marki-logo.png" alt="Marki" class="h-6">
          <span class="text-sm text-slate-500">Propulsé par Marki</span>
        </div>
        <p class="text-xs text-slate-400">© 2024 Marki - Tous droits réservés</p>
      </div>
    </footer>
  </div>
</template>

<script>
function portailMissionPage() {
  return {
    toast: { show: false, type: 'success', title: '', message: '' },
    tokenValid: true,
    
    mission: {
      id: 1,
      nom: 'Audit Comptable Annuel 2024',
      description: 'Mission d\'audit complet des comptes de l\'exercice 2024, incluant la vérification des immobilisations, stocks, créances et dettes.',
      dateDebut: '01/01/2024',
      dateFin: '31/03/2024',
      montant: 15000,
      intervenant: 'Jean Dupont',
      client: 'ACME Corp',
      adresse: '12 Rue de la Paix, 75002 Paris',
      dateIntervention: '15/01/2024',
      joursDepuisEcheance: 45,
      facture: {
        numero: 'FAC-MISSION-2024-001',
        montant: 15000,
        echeance: '30/04/2024',
        statut: 'impayee'
      }
    },
    
    init() {
      const urlParams = new URLSearchParams(window.location.search);
      if (window.location.search.includes('invalid=true')) {
        this.tokenValid = false;
      }
    },
    
    logout() {
      window.location.href = './login.html';
    },
    
    downloadRapport() {
      this.showToast('Info', 'Téléchargement du rapport de mission...', 'success');
    },
    
    downloadFacture() {
      this.showToast('Info', 'Téléchargement de la facture...', 'success');
    },
    
    reglerFacture() {
      this.showToast('Info', 'Redirection vers la page de paiement...', 'success');
    },
    
    formatMoney(amount) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
    },
    
    showToast(title, message, type = 'success') {
      this.toast = { show: true, title, message, type };
      setTimeout(() => this.toast.show = false, 3000);
    }
  }
}
</script>


    <!-- Toast Notification -->
    <div x-show="toast.show" x-transition class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50">
      <i :class="toast.type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'" class="fas"></i>
      <div>
        <p class="font-medium text-sm" x-text="toast.title"></p>
        <p class="text-xs text-slate-300" x-text="toast.message"></p>
      </div>
    </div>
</body>
</html>
