<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - SMTP | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./components/sidebar-nav.js"></script>
  <style>html { font-family: 'Inter', sans-serif; } body { margin: 0; background: #fafafa; }</style>
</head><body>

<sidebar-nav page="settings-smtp"></sidebar-nav>

<main style="margin-left: 260px; padding: 32px; min-height: 100vh;">
  <div style="margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #e5e5e5;">
    <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: 600; color: #0f172a; letter-spacing: -0.5px;">Configuration SMTP</h1>
    <p style="margin: 0; color: #64748b; font-size: 15px;">Configuration email</p>
    <span style="display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; padding: 6px 12px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: monospace; color: #475569;">↗ /settings/smtp-profil</span>
  </div>

  <div class="max-w-xl">
    <div class="bg-white rounded-2xl border border-slate-200 p-8 shadow-sm space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Serveur SMTP</label>
        <input type="text" value="smtp.gmail.com" 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Port</label>
        <input type="text" value="587" 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <input type="email" value="relances@monentreprise.fr" 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
      </div>
      
      <div class="flex gap-3 pt-4">
        <button class="px-5 py-2.5 bg-sky-500 hover:bg-sky-600 text-white rounded-xl text-sm font-medium transition-all flex items-center gap-2">
          <i class="fas fa-save"></i>
          Enregistrer
        </button>
        <button class="px-5 py-2.5 border border-slate-200 hover:border-slate-300 text-slate-700 rounded-xl text-sm font-medium transition-all flex items-center gap-2">
          <i class="fas fa-paper-plane"></i>
          Tester
        </button>
      </div>
    </div>
  </div>
</main>

</body></html>
