<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./components/sidebar-nav-dual.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="dashboardPage()" x-init="init()">

<!-- Sidebar -->
<sidebar-nav-dual page="dashboard"></sidebar-nav-dual>

<!-- Main Content -->
<div class="md:ml-[284px] min-h-screen bg-slate-50">
  
  <!-- Header -->
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-semibold text-slate-700">Dashboard</h1>
      <span class="text-slate-400">/</span>
      <span class="text-sm text-slate-500">Vue d'ensemble de l'activité</span>
    </div>
    
    <div class="flex items-center gap-4">
      <!-- Dernière synchro -->
      <div class="text-right" x-show="lastSyncTime">
        <p class="text-xs text-slate-400">Dernière synchro</p>
        <p class="text-sm font-medium text-slate-600" x-text="lastSyncTime"></p>
      </div>
      
      <button 
        @click="syncData()"
        :disabled="syncing"
        class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-all disabled:opacity-50"
      >
        <i x-show="!syncing" class="fas fa-sync-alt"></i>
        <i x-show="syncing" class="fas fa-circle-notch fa-spin"></i>
        <span x-text="syncing ? 'Synchronisation...' : 'Synchroniser'"></span>
      </button>
    </div>
  </header>

  <!-- Content -->
  <main class="p-6">
    
    <!-- Loading State -->
    <template x-if="loading">
      <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
        <template x-for="i in 10" :key="i">
          <div class="bg-white rounded-xl border border-slate-200 p-4 animate-pulse">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 bg-slate-200 rounded-lg"></div>
              <div class="flex-1">
                <div class="h-3 bg-slate-200 rounded w-2/3 mb-2"></div>
                <div class="h-6 bg-slate-200 rounded w-1/2"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>
    
    <!-- Error State -->
    <template x-if="error">
      <div class="bg-sky-50 border border-sky-100 rounded-xl p-4 mb-6">
        <div class="flex items-start gap-3">
          <i class="fas fa-exclamation-circle text-sky-500 mt-0.5"></i>
          <div>
            <p class="text-sm font-medium text-sky-800">Erreur de chargement</p>
            <p class="text-sm text-sky-600 mt-1" x-text="error"></p>
            <button @click="loadData()" class="mt-2 text-sm text-sky-700 hover:text-sky-800 underline">Réessayer</button>
          </div>
        </div>
      </div>
    </template>
    
    <!-- Content -->
    <template x-if="!loading && !error">
      <div class="space-y-6">
        
        <!-- KPI Row 1 -->
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
          
          <!-- KPI: Factures en attente -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-50">
                <i class="fas fa-file-invoice text-sky-500 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <p class="text-xs text-slate-500 font-medium truncate">Factures en attente</p>
                  <i class="fas fa-info-circle text-slate-400 text-xs" title="Factures avec reste à payer > 0"></i>
                </div>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.facturesEnAttente"></p>
                <p class="text-xs text-slate-400 mt-1">reste à payer > 0</p>
              </div>
            </div>
          </div>
          
          <!-- KPI: Impayés actifs -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-100">
                <i class="fas fa-exclamation-triangle text-sky-600 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <p class="text-xs text-slate-500 font-medium truncate">Impayés actifs</p>
                  <i class="fas fa-info-circle text-slate-400 text-xs"></i>
                </div>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.impayesActifs"></p>
                <p class="text-xs text-slate-400 mt-1">en relance</p>
              </div>
            </div>
          </div>
          
          <!-- KPI: Montant total -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-200">
                <i class="fas fa-euro-sign text-sky-700 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <p class="text-xs text-slate-500 font-medium truncate">Montant total</p>
                  <i class="fas fa-info-circle text-slate-400 text-xs"></i>
                </div>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="formatMoney(kpis.montantTotal)"></p>
                <p class="text-xs text-slate-400 mt-1">DSO: 42 jours</p>
              </div>
            </div>
          </div>
          
          <!-- KPI: Relances du jour -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-50">
                <i class="fas fa-envelope text-sky-500 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <p class="text-xs text-slate-500 font-medium truncate">Relances du jour</p>
                  <i class="fas fa-info-circle text-slate-400 text-xs"></i>
                </div>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.relancesJour"></p>
                <p class="text-xs text-sky-600 mt-1 font-medium">8 réponses reçues</p>
              </div>
            </div>
          </div>
          
          <!-- KPI: Taux recouvrement -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-300">
                <i class="fas fa-chart-pie text-sky-800 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <p class="text-xs text-slate-500 font-medium truncate">Taux recouvrement</p>
                  <i class="fas fa-info-circle text-slate-400 text-xs"></i>
                </div>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.tauxRecouvrement + '%'"></p>
                <p class="text-xs text-sky-600 mt-1 font-medium">+5% vs mois dernier</p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- KPI Row 2: Ancienneté (5 cases exactement comme la référence) -->
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
          
          <!-- Ancienneté < 7j -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-50">
                <i class="fas fa-clock text-sky-400 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-500 font-medium">Moins de 7 jours</p>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.anciennete.moins7j"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="formatMoney(kpis.anciennete.moins7jMontant)"></p>
              </div>
            </div>
          </div>
          
          <!-- Ancienneté 8-30j -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-100">
                <i class="fas fa-clock text-sky-500 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-500 font-medium">8 à 30 jours</p>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.anciennete.j8a30"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="formatMoney(kpis.anciennete.j8a30Montant)"></p>
              </div>
            </div>
          </div>
          
          <!-- Ancienneté 31-60j -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-200">
                <i class="fas fa-clock text-sky-600 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-500 font-medium">31 à 60 jours</p>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.anciennete.j31a60"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="formatMoney(kpis.anciennete.j31a60Montant)"></p>
              </div>
            </div>
          </div>
          
          <!-- Ancienneté 60-120j -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-300">
                <i class="fas fa-clock text-sky-700 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-500 font-medium">60 à 120 jours</p>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.anciennete.j60a120"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="formatMoney(kpis.anciennete.j60a120Montant)"></p>
              </div>
            </div>
          </div>
          
          <!-- Ancienneté > 120j -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-start gap-3 p-4">
              <div class="p-2 rounded-lg bg-sky-400">
                <i class="fas fa-exclamation-triangle text-sky-900 text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-500 font-medium">Plus de 120 jours</p>
                <p class="text-2xl font-bold text-slate-900 mt-0.5" x-text="kpis.anciennete.plus120j"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="formatMoney(kpis.anciennete.plus120jMontant)"></p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Smart Marki Section - En haut, état tiroir fermé par défaut -->
        <div class="bg-gradient-to-r from-sky-500 to-sky-600 rounded-xl shadow-sm overflow-hidden" x-data="{ open: false }">
          <div @click="open = !open" class="px-6 py-4 border-b border-white/10 flex items-center justify-between cursor-pointer hover:bg-white/5 transition-colors">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-white/20 flex items-center justify-center overflow-hidden">
                <img src="./marki-logo.png" alt="Marki" class="w-8 h-8 object-contain">
              </div>
              <div>
                <h3 class="font-semibold text-white">Smart Marki</h3>
                <p class="text-sm text-sky-100">Conseils et recommandations personnalisés</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <span class="px-3 py-1 bg-white/20 text-white text-xs font-medium rounded-full">
                <i class="fas fa-chart-line mr-1"></i>
                Efficacité: 78%
              </span>
              <i class="fas fa-chevron-down text-white transition-transform" :class="open ? 'rotate-180' : ''"></i>
            </div>
          </div>
          <div x-show="open" x-collapse class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Conseil 1 -->
            <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/10">
              <div class="flex items-start gap-3">
                <div class="p-2 rounded-lg bg-sky-400/20">
                  <i class="fas fa-lightbulb text-sky-300"></i>
                </div>
                <div>
                  <p class="font-medium text-white text-sm">Optimisez vos relances</p>
                  <p class="text-sm text-sky-100 mt-1">
                    Vos relances R2 ont un taux de réponse de 45%. Envisagez d'ajouter une étape SMS entre R1 et R2.
                  </p>
                </div>
              </div>
            </div>
            <!-- Conseil 2 -->
            <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/10">
              <div class="flex items-start gap-3">
                <div class="p-2 rounded-lg bg-sky-400/20">
                  <i class="fas fa-exclamation-triangle text-sky-300"></i>
                </div>
                <div>
                  <p class="font-medium text-white text-sm">Attention aux délais</p>
                  <p class="text-sm text-sky-100 mt-1">
                    3 clients dépassent les 120 jours d'ancienneté. Privilégiez un contact téléphonique direct.
                  </p>
                </div>
              </div>
            </div>
            <!-- Conseil 3 -->
            <div class="bg-white/10 backdrop-blur-sm rounded-lg p-4 border border-white/10">
              <div class="flex items-start gap-3">
                <div class="p-2 rounded-lg bg-sky-400/20">
                  <i class="fas fa-trophy text-sky-300"></i>
                </div>
                <div>
                  <p class="font-medium text-white text-sm">Votre progression</p>
                  <p class="text-sm text-sky-100 mt-1">
                    Vous avez récupéré +12% de créances ce mois-ci par rapport au mois dernier. Continuez ainsi !
                  </p>
                </div>
              </div>
            </div>
          </div>
          <div x-show="open" x-collapse class="px-6 py-3 bg-white/5 border-t border-white/10">
            <div class="flex items-center justify-between text-sm">
              <span class="text-sky-200">
                <i class="fas fa-sync-alt mr-1"></i>
                Mise à jour il y a 2 heures
              </span>
              <a href="./smart-marki.html" class="text-white hover:text-sky-100 font-medium">
                Voir tous les insights <i class="fas fa-arrow-right ml-1"></i>
              </a>
            </div>
          </div>
        </div>
        
        <!-- Nouvelles factures importées -->
        <div x-show="newInvoices.length > 0" x-cloak class="bg-sky-50 border border-sky-200 rounded-xl p-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="p-2 rounded-lg bg-sky-100">
                <i class="fas fa-file-import text-sky-600 text-lg"></i>
              </div>
              <div>
                <p class="font-semibold text-sky-900">Nouvelles factures importées</p>
                <p class="text-sm text-sky-700">
                  <span x-text="newInvoices.length"></span> facture(s) depuis la dernière synchronisation
                </p>
              </div>
            </div>
            <a href="./impayes.html" class="px-4 py-2 bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium rounded-lg transition-colors">
              Voir les factures
            </a>
          </div>
        </div>
        
        <!-- Events / Activité récente -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="fas fa-history text-slate-400"></i>
              <h3 class="font-semibold text-slate-900">Événements récents</h3>
            </div>
            <button @click="clearEvents()" class="text-xs text-slate-500 hover:text-slate-700">
              Effacer tout
            </button>
          </div>
          <div class="divide-y divide-slate-100 max-h-64 overflow-y-auto">
            <template x-for="event in events" :key="event.id">
              <div class="px-6 py-3 flex items-start gap-3 hover:bg-slate-50/50 transition-colors">
                <div class="mt-0.5">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center"
                       :class="{
                         'bg-sky-100 text-sky-600': event.type === 'sync',
                         'bg-sky-200 text-sky-700': event.type === 'import',
                         'bg-sky-300 text-sky-800': event.type === 'payment',
                         'bg-sky-400 text-sky-900': event.type === 'relance',
                         'bg-sky-500 text-white': event.type === 'alert'
                       }">
                    <i class="fas text-xs" :class="event.icon"></i>
                  </div>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-slate-900" x-text="event.title"></p>
                  <p class="text-sm text-slate-500" x-text="event.description"></p>
                  <p class="text-xs text-slate-400 mt-1" x-text="event.time"></p>
                </div>
              </div>
            </template>
            <div x-show="events.length === 0" class="px-6 py-8 text-center text-slate-400 text-sm">
              Aucun événement récent
            </div>
          </div>
        </div>
        
        <!-- Graphique Section avec Chart.js -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100">
            <h3 class="font-semibold text-slate-900">Évolution des impayés</h3>
            <p class="text-sm text-slate-500">Montant facturé vs reste à payer par mois (12 mois)</p>
          </div>
          <div class="p-6 h-80">
            <canvas id="evolutionChart"></canvas>
          </div>
        </div>
        
        <!-- Top Débiteurs avec toggle vue -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden" x-data="{ viewMode: 'list' }">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-semibold text-slate-900">Top débiteurs</h3>
            <div class="flex items-center gap-3">
              <!-- Toggle view -->
              <div class="flex items-center bg-slate-100 rounded-lg p-1">
                <button 
                  @click="viewMode = 'list'"
                  :class="viewMode === 'list' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-500 hover:text-slate-700'"
                  class="px-3 py-1.5 text-xs font-medium rounded-md transition-all flex items-center gap-1.5"
                >
                  <i class="fas fa-list"></i>
                  Liste
                </button>
                <button 
                  @click="viewMode = 'card'"
                  :class="viewMode === 'card' ? 'bg-white shadow-sm text-slate-700' : 'text-slate-500 hover:text-slate-700'"
                  class="px-3 py-1.5 text-xs font-medium rounded-md transition-all flex items-center gap-1.5"
                >
                  <i class="fas fa-th-large"></i>
                  Cartes
                </button>
              </div>
              <a href="./impayes.html" class="text-sm text-sky-600 hover:text-sky-700 font-medium flex items-center gap-1">
                Voir tout
                <i class="fas fa-arrow-right text-xs"></i>
              </a>
            </div>
          </div>
          
          <!-- Vue Liste -->
          <template x-if="viewMode === 'list'">
            <div class="divide-y divide-slate-100">
              <template x-for="debtor in topDebtors" :key="debtor.id">
                <div class="px-6 py-4 flex items-center justify-between hover:bg-slate-50/50 transition-colors">
                  <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-semibold text-sm"
                         x-text="debtor.initials">
                    </div>
                    <div>
                      <p class="font-medium text-slate-900" x-text="debtor.name"></p>
                      <p class="text-sm text-slate-500">
                        <span x-text="debtor.impayesCount"></span> impayé(s) · 
                        <span x-text="debtor.jours"></span> jours de retard
                      </p>
                    </div>
                  </div>
                  <div class="flex items-center gap-6">
                    <span class="font-semibold text-slate-900" x-text="formatMoney(debtor.montant)"></span>
                    <span class="px-2.5 py-1 text-xs font-medium rounded-full"
                          :class="{
                            'bg-sky-100 text-sky-700': debtor.relance === 'R1',
                            'bg-sky-300 text-sky-800': debtor.relance === 'R2',
                            'bg-sky-500 text-white': debtor.relance === 'R3'
                          }"
                          x-text="'Relance ' + debtor.relance">
                    </span>
                  </div>
                </div>
              </template>
            </div>
          </template>
          
          <!-- Vue Cartes -->
          <template x-if="viewMode === 'card'">
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              <template x-for="debtor in topDebtors" :key="debtor.id">
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 hover:border-sky-300 transition-colors">
                  <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-semibold text-sm"
                           x-text="debtor.initials">
                      </div>
                      <div>
                        <p class="font-medium text-slate-900 text-sm" x-text="debtor.name"></p>
                        <p class="text-xs text-slate-500" x-text="debtor.jours + ' jours de retard'"></p>
                      </div>
                    </div>
                    <span class="px-2 py-0.5 text-xs font-medium rounded-full"
                          :class="{
                            'bg-sky-100 text-sky-700': debtor.relance === 'R1',
                            'bg-sky-300 text-sky-800': debtor.relance === 'R2',
                            'bg-sky-500 text-white': debtor.relance === 'R3'
                          }"
                          x-text="debtor.relance">
                    </span>
                  </div>
                  <div class="space-y-2">
                    <div class="flex justify-between text-sm">
                      <span class="text-slate-500">Montant dû:</span>
                      <span class="font-semibold text-slate-900" x-text="formatMoney(debtor.montant)"></span>
                    </div>
                    <div class="flex justify-between text-sm">
                      <span class="text-slate-500">Nombre d'impayés:</span>
                      <span class="font-medium text-slate-900" x-text="debtor.impayesCount"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
        
      </div>
    </template>
    
  </main>
</div>

<script>
function dashboardPage() {
  return {
    loading: false,
    error: null,
    syncing: false,
    lastSyncTime: 'Aujourd\'hui à 09:45',
    chart: null,
    
    kpis: {
      facturesEnAttente: 45,
      impayesActifs: 28,
      montantTotal: 128500,
      relancesJour: 18,
      tauxRecouvrement: 68,
      anciennete: {

        j60a120: 8,
        j60a120Montant: 22700,
        plus120j: 5,
        plus120jMontant: 20100
      }
    },
    
    newInvoices: [
      { id: 1, nfacture: 'F-2024-0156', montant: 3500, date: '2024-01-15' },
      { id: 2, nfacture: 'F-2024-0157', montant: 2800, date: '2024-01-15' },
      { id: 3, nfacture: 'F-2024-0158', montant: 4200, date: '2024-01-14' }
    ],
    
    events: [
      { 
        id: 1, 
        type: 'sync', 
        icon: 'fa-sync-alt',
        title: 'Synchronisation effectuée', 
        description: '3 nouvelles factures importées depuis ADTI',
        time: 'Il y a 2 heures'
      },
      { 
        id: 2, 
        type: 'payment', 
        icon: 'fa-check-circle',
        title: 'Paiement reçu', 
        description: 'ACME Corp a réglé la facture F-2024-0123 (€4,230)',
        time: 'Il y a 3 heures'
      },
      { 
        id: 3, 
        type: 'relance', 
        icon: 'fa-paper-plane',
        title: 'Relances envoyées', 
        description: '12 relances R2 ont été envoyées automatiquement',
        time: 'Hier à 18:30'
      },
      { 
        id: 4, 
        type: 'alert', 
        icon: 'fa-exclamation-circle',
        title: 'Nouveau contact sans email', 
        description: 'Le contact "Dupont SAS" n\'a pas d\'adresse email configurée',
        time: 'Hier à 14:15'
      },
      { 
        id: 5, 
        type: 'import', 
        icon: 'fa-file-import',
        title: 'Import de contacts', 
        description: '15 nouveaux contacts ont été importés',
        time: 'Il y a 2 jours'
      }
    ],
    
    topDebtors: [
      { id: 1, name: 'ACME Corp', initials: 'AC', jours: 87, montant: 45230, relance: 'R3', impayesCount: 3 },
      { id: 2, name: 'TechStart SARL', initials: 'TS', jours: 52, montant: 28150, relance: 'R2', impayesCount: 2 },
      { id: 3, name: 'BuildPlus SA', initials: 'BP', jours: 34, montant: 18900, relance: 'R1', impayesCount: 1 },
      { id: 4, name: 'Digital Agency', initials: 'DA', jours: 28, montant: 12500, relance: 'R1', impayesCount: 1 },
      { id: 5, name: 'Consulting Pro', initials: 'CP', jours: 45, montant: 9800, relance: 'R2', impayesCount: 2 }
    ],
    
    // Données pour le graphique
    chartData: {
      labels: ['Avant', 'Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sept', 'Oct', 'Nov', 'Déc'],
      montantsPayes: [45000, 52000, 48000, 61000, 55000, 58000, 62000, 59000, 65000, 70000, 68000, 72000, 75000],
      restesAPayer: [28000, 32000, 35000, 42000, 38000, 41000, 39000, 43000, 47000, 52000, 48000, 51000, 49000],
      facturesImpayees: [12, 15, 18, 22, 19, 21, 20, 23, 25, 28, 26, 27, 24]
    },
    
    init() {
      this.loadData().then(() => {
        this.$nextTick(() => {
          this.initChart();
        });
      });
    },
    
    initChart() {
      const ctx = document.getElementById('evolutionChart');
      if (!ctx) return;
      
      this.chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: this.chartData.labels,
          datasets: [
            {
              label: 'Reste à payer',
              data: this.chartData.restesAPayer,
              backgroundColor: '#7dd3fc',
              borderRadius: 4,
              yAxisID: 'y',
              order: 2,
            },
            {
              label: 'Montant payé',
              data: this.chartData.montantsPayes,
              backgroundColor: '#0ea5e9',
              borderRadius: 4,
              yAxisID: 'y',
              order: 2,
            },
            {
              type: 'line',
              label: 'Nb factures impayées',
              data: this.chartData.facturesImpayees,
              borderColor: '#0369a1',
              backgroundColor: '#0369a1',
              pointBackgroundColor: '#0369a1',
              pointRadius: 4,
              borderWidth: 2,
              tension: 0.3,
              yAxisID: 'y1',
              order: 1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: {
                usePointStyle: true,
                padding: 15,
              }
            },
            tooltip: {
              callbacks: {
                label(ctx) {
                  if (ctx.dataset.yAxisID === 'y1') {
                    return ` ${ctx.parsed.y} facture${ctx.parsed.y > 1 ? 's' : ''} impayée${ctx.parsed.y > 1 ? 's' : ''}`;
                  }
                  const val = ctx.parsed.y;
                  if (val >= 1000) return ` ${ctx.dataset.label} : ${(val / 1000).toFixed(1)} k€`;
                  return ` ${ctx.dataset.label} : ${val.toLocaleString('fr-FR')} €`;
                }
              }
            }
          },
          scales: {
            y: {
              stacked: true,
              position: 'left',
              ticks: {
                callback: (val) => {
                  if (val >= 1000) return (val / 1000).toFixed(0) + ' k€';
                  return val + ' €';
                },
              },
              grid: { color: '#f3f4f6' },
            },
            y1: {
              position: 'right',
              beginAtZero: true,
              ticks: {
                stepSize: 1,
                callback: (val) => val + ' fa.',
              },
              grid: { drawOnChartArea: false },
            },
            x: {
              stacked: true,
              grid: { display: false }
            },
          },
        }
      });
    },
    
    async loadData() {
      this.loading = true;
      this.error = null;
      
      try {
        await new Promise(r => setTimeout(r, 800));
      } catch (err) {
        this.error = err.message || 'Erreur lors du chargement des données';
      } finally {
        this.loading = false;
      }
      
      // Réinitialiser le graphique après le chargement
      this.$nextTick(() => {
        if (!this.chart) {
          this.initChart();
        }
      });
    },
    
    async syncData() {
      this.syncing = true;
      try {
        await new Promise(r => setTimeout(r, 1500));
        this.lastSyncTime = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        await this.loadData();
      } catch (err) {
        this.error = err.message;
      } finally {
        this.syncing = false;
      }
    },
    
    clearEvents() {
      this.events = [];
    },
    
    formatMoney(amount) {
      return new Intl.NumberFormat('fr-FR', {
        style: 'currency',
        currency: 'EUR',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(amount);
    }
  }
}
</script>
