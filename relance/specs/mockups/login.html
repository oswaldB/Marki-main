<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./components/sidebar-nav.js"></script>
  <style>
    html { font-family: 'Inter', sans-serif; }
    body { margin: 0; background: #fafafa; }
  </style>
</head>
<body>

<!-- Sidebar -->
<sidebar-nav page="login"></sidebar-nav>

<!-- Main Content -->
<main style="margin-left: 260px; padding: 32px; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  
  <div class="w-full max-w-sm">
    
    <!-- Logo -->
    <div class="text-center mb-10">
      <i class="fas fa-layer-group text-sky-500 text-4xl mb-4"></i>
      <h2 class="text-2xl font-semibold text-slate-900 tracking-tight">Connexion</h2>
      <p class="text-slate-500 mt-2 text-sm">Accédez à votre espace Marki</p>
    </div>

    <!-- Formulaire -->
    <form class="bg-white rounded-2xl border border-slate-200 p-8 space-y-4">
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <input type="email" value="admin@marki.fr" 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm 
                      focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 
                      transition-all">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Mot de passe</label>
        <input type="password" value="••••••••" 
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm 
                      focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 
                      transition-all">
      </div>
      
      <button type="button" 
              class="w-full mt-6 bg-sky-500 hover:bg-sky-600 text-white py-2.5 px-4 rounded-xl 
                     text-sm font-medium transition-all shadow-sm hover:shadow-md">
        Se connecter
      </button>
    </form>

  </div>
</main>

</body>
</html>
