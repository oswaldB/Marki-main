<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail Impayé | Marki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="./components/sidebar-nav-dual.js"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="impayeDetailPage()" x-init="init()">

<sidebar-nav-dual page="impayes"></sidebar-nav-dual>

<div class="md:ml-[284px] min-h-screen bg-slate-50">
  
  <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="./impayes.html" class="text-slate-400 hover:text-slate-600">
        <i class="fas fa-arrow-left"></i>
      </a>
      <div>
        <h1 class="text-base font-semibold text-slate-700" x-text="impaye?.numero || 'Chargement...'"></h1>
        <span x-show="impaye?.numeroDossier" class="text-sm text-slate-400" x-text="impaye?.numeroDossier"></span>
      </div>
    </div>
    
    <div class="flex items-center gap-2">
      <span class="px-2.5 py-1 text-xs font-medium rounded-full"
            :class="{
              'bg-slate-100 text-slate-700': impaye?.statut === 'non-payee',
              'bg-sky-100 text-sky-700': impaye?.statut === 'en-relance',
              'bg-sky-100 text-sky-700': impaye?.statut === 'suspendue'
            }"
            x-text="getStatutLabel(impaye?.statut)">
      </span>
      
      <button @click="openPdf()" class="flex items-center gap-2 px-3 py-2 text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-lg text-sm font-medium transition-all">
        <i class="fas fa-file-pdf"></i>PDF
      </button>
    </div>
  </header>

  <main class="p-6">
    
    <div x-show="loading" class="text-center py-12 text-slate-400">Chargement...</div>
    
    <template x-if="!loading && impaye">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Colonne gauche: Infos facture, bien, missions, interventions, payeur, apporteur, propriétaire, historique -->
        <div class="lg:col-span-2 space-y-6">
          
          <!-- Section Facture -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-file-invoice text-slate-400 mr-2"></i>Informations de la facture
              </h3>
            </div>
            <div class="p-6 space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">N° Facture</p>
                  <p class="font-semibold text-slate-900" x-text="impaye?.numero"></p>
                </div>
                <div>
                  <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">N° Dossier</p>
                  <p class="font-mono text-slate-700" x-text="impaye?.numeroDossier || '-'"></p>
                </div>
                <div>
                  <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">Date de facture</p>
                  <p class="text-slate-900" x-text="impaye?.dateFacture"></p>
                </div>
                <div>
                  <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">Échéance</p>
                  <p class="text-slate-900" x-text="impaye?.echeance"></p>
                </div>
              </div>
              <div class="pt-4 border-t border-slate-100">
                <div class="flex justify-between items-center mb-2">
                  <span class="text-sm text-slate-500">Montant TTC</span>
                  <span class="font-medium" x-text="formatMoney(impaye?.montant)"></span>
                </div>
                <div class="flex justify-between items-center">
                  <span class="text-sm font-medium text-slate-700">Reste à payer</span>
                  <span class="text-xl font-bold text-sky-600" x-text="formatMoney(impaye?.resteAPayer)"></span>
                </div>
                <div x-show="impaye?.tauxPaye < 100" class="mt-3">
                  <div class="flex items-center gap-2">
                    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                      <div class="h-full bg-sky-500 rounded-full" :style="'width: ' + impaye?.tauxPaye + '%'"></div>
                    </div>
                    <span class="text-sm font-medium" x-text="impaye?.tauxPaye + '% payé'"></span>
                  </div>
                </div>
                <p x-show="impaye?.joursRetard > 0" class="text-sm text-sky-600 mt-2" x-text="impaye?.joursRetard + ' jours de retard'"></p>
              </div>
            </div>
          </div>
          
          <!-- Section Bien -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-building text-slate-400 mr-2"></i>Informations du bien
              </h3>
            </div>
            <div class="p-6">
              <div class="space-y-3">
                <div>
                  <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">Adresse</p>
                  <p class="text-slate-900" x-text="impaye?.bien?.adresse || '12 Rue de la Paix, 75002 Paris'"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                  <div>
                    <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">Type</p>
                    <p class="text-slate-900" x-text="impaye?.bien?.type || 'Bureaux'"></p>
                  </div>
                  <div>
                    <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-1">Surface</p>
                    <p class="text-slate-900" x-text="impaye?.bien?.surface || '250 m²'"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Section Missions et Interventions -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-tasks text-slate-400 mr-2"></i>Missions et interventions
              </h3>
              <button @click="addIntervention()" class="text-sm text-sky-600 hover:text-sky-700 font-medium">
                <i class="fas fa-plus mr-1"></i>Ajouter
              </button>
            </div>
            <div class="p-6">
              <div class="space-y-4">
                <!-- Missions -->
                <template x-if="impaye?.missions?.length">
                  <div class="mb-4">
                    <p class="text-xs text-slate-500 uppercase tracking-wider font-medium mb-2">Missions</p>
                    <div class="space-y-2">
                      <template x-for="(mission, index) in impaye?.missions" :key="index">
                        <div class="p-3 bg-slate-50 rounded-lg border border-slate-100">
                          <div class="flex items-center justify-between">
                            <span class="font-medium text-slate-900" x-text="mission.type"></span>
                            <span class="text-xs text-slate-500" x-text="mission.dateIntervention"></span>
                          </div>
                          <p class="text-xs text-slate-500 mt-1" x-text="mission.description"></p>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                
                <!-- Interventions -->
                <template x-for="(intervention, index) in impaye?.interventions || []" :key="index">
                  <div class="p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <div class="flex items-start justify-between mb-2">
                      <div class="flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-600 text-xs">
                          <i class="fas fa-wrench"></i>
                        </span>
                        <div>
                          <p class="text-sm font-medium text-slate-900" x-text="intervention.type"></p>
                          <p class="text-xs text-slate-500" x-text="intervention.date + ' par ' + intervention.agent"></p>
                        </div>
                      </div>
                    </div>
                    <p x-show="intervention.description" class="text-sm text-slate-600 mt-2" x-text="intervention.description"></p>
                    <div x-show="intervention.bien" class="mt-2 flex items-center gap-2 text-xs text-slate-500">
                      <i class="fas fa-building"></i>
                      <span x-text="intervention.bien"></span>
                    </div>
                  </div>
                </template>
                <div x-show="!(impaye?.interventions?.length) && !(impaye?.missions?.length)" class="text-center text-slate-400 text-sm py-8">
                  <i class="fas fa-clipboard-list text-3xl mb-2"></i>
                  <p>Aucune mission ou intervention</p>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Section Payeur -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-user text-slate-400 mr-2"></i>Payeur
              </h3>
            </div>
            <div class="p-6">
              <div class="flex items-start gap-4">
                <div class="w-16 h-16 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-semibold text-xl" x-text="impaye?.payeur?.initials"></div>
                <div class="flex-1">
                  <h4 class="text-lg font-semibold text-slate-900" x-text="impaye?.payeur?.nom"></h4>
                  <p class="text-slate-500" x-text="impaye?.payeur?.entreprise"></p>
                  <div class="mt-3 space-y-1 text-sm">
                    <p x-show="impaye?.payeur?.email" class="text-slate-600">
                      <i class="fas fa-envelope text-slate-400 mr-2 w-4"></i>
                      <a :href="'mailto:' + impaye?.payeur?.email" class="hover:text-sky-600" x-text="impaye?.payeur?.email"></a>
                    </p>
                    <div x-show="impaye?.payeur?.emailForce" class="bg-sky-50 border border-sky-200 rounded-lg p-3 mt-2">
                      <p class="text-slate-600 flex items-center gap-2">
                        <i class="fas fa-envelope text-sky-500 mr-2 w-4"></i>
                        <a :href="'mailto:' + impaye?.payeur?.emailForce" class="text-sky-600 hover:underline font-medium" x-text="impaye?.payeur?.emailForce"></a>
                        <span class="px-2 py-0.5 bg-sky-100 text-sky-700 text-xs rounded-full">Email forcé</span>
                      </p>
                      <p class="text-xs text-slate-500 mt-1 ml-6">Cet email sera utilisé pour les relances</p>
                    </div>
                    <p x-show="impaye?.payeur?.telephone" class="text-slate-600">
                      <i class="fas fa-phone text-slate-400 mr-2 w-4"></i>
                      <span x-text="impaye?.payeur?.telephone"></span>
                    </p>
                    <p x-show="impaye?.payeur?.adresse" class="text-slate-600">
                      <i class="fas fa-map-marker-alt text-slate-400 mr-2 w-4"></i>
                      <span x-text="impaye?.payeur?.adresse"></span>
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <!-- Section Apporteur d'affaire -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-handshake text-slate-400 mr-2"></i>Apporteur d'affaire
              </h3>
            </div>
            <div class="p-6">
              <div class="flex items-start gap-4" x-show="impaye?.apporteur">
                <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-semibold" x-text="impaye?.apporteur?.initials || 'AA'"></div>
                <div class="flex-1">
                  <h4 class="font-semibold text-slate-900" x-text="impaye?.apporteur?.nom || 'Agence Partenaire'"></h4>
                  <p x-show="impaye?.apporteur?.email" class="text-sm text-slate-600">
                    <i class="fas fa-envelope text-slate-400 mr-2"></i>
                    <span x-text="impaye?.apporteur?.email || 'contact@agence.fr'"></span>
                  </p>
                  <p x-show="impaye?.apporteur?.telephone" class="text-sm text-slate-600">
                    <i class="fas fa-phone text-slate-400 mr-2"></i>
                    <span x-text="impaye?.apporteur?.telephone || '01 23 45 67 89'"></span>
                  </p>
                </div>
              </div>
              <p x-show="!impaye?.apporteur" class="text-slate-400 text-sm">Aucun apporteur d'affaire</p>
            </div>
          </div>
          
          <!-- Section Propriétaire -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-key text-slate-400 mr-2"></i>Propriétaire
              </h3>
            </div>
            <div class="p-6">
              <div class="flex items-start gap-4" x-show="impaye?.proprietaire">
                <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center text-sky-700 font-semibold" x-text="impaye?.proprietaire?.initials || 'PR'"></div>
                <div class="flex-1">
                  <h4 class="font-semibold text-slate-900" x-text="impaye?.proprietaire?.nom || 'M. Dupont'"></h4>
                  <p x-show="impaye?.proprietaire?.email" class="text-sm text-slate-600">
                    <i class="fas fa-envelope text-slate-400 mr-2"></i>
                    <span x-text="impaye?.proprietaire?.email || 'proprietaire@email.fr'"></span>
                  </p>
                </div>
              </div>
              <p x-show="!impaye?.proprietaire" class="text-slate-400 text-sm">Aucun propriétaire renseigné</p>
            </div>
          </div>
          
          <!-- Section Historique des relances -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-history text-sky-500 mr-2"></i>Historique des relances
              </h3>
              <span class="text-xs text-slate-500" x-text="(impaye?.historique?.length || 0) + ' événements'"></span>
            </div>
            <div class="p-6">
              <div class="space-y-6">
                <template x-for="(event, index) in impaye?.historique || []" :key="index">
                  <div class="relative pl-8">
                    <!-- Timeline line -->
                    <div x-show="index < (impaye?.historique?.length || 0) - 1" class="absolute left-3 top-8 bottom-0 w-0.5 bg-slate-200"></div>
                    
                    <!-- Icon -->
                    <div class="absolute left-0 top-0 w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-xs"
                         :class="{
                           'bg-sky-100 text-sky-600': event.type === 'relance',
                           'bg-sky-100 text-sky-600': event.type === 'paiement',
                           'bg-sky-100 text-sky-600': event.type === 'suspension',
                           'bg-slate-100 text-slate-600': event.type === 'systeme'
                         }"
                    >
                      <i class="fas" :class="event.icon"></i>
                    </div>
                    
                    <!-- Content -->
                    <div>
                      <div class="flex items-center justify-between mb-1">
                        <p class="text-sm font-medium text-slate-900" x-text="event.titre"></p>
                        <span class="text-xs text-slate-400" x-text="event.date"></span>
                      </div>
                      <p x-show="event.description" class="text-sm text-slate-600" x-text="event.description"></p>
                      
                      <!-- Email details -->
                      <div x-show="event.emails" class="mt-3 space-y-2">
                        <template x-for="email in event.emails" :key="email.id">
                          <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                            <div class="flex items-center justify-between mb-1">
                              <span class="text-xs font-medium text-slate-600" x-text="email.sujet"></span>
                              <span class="text-xs px-2 py-0.5 rounded-full" 
                                    :class="email.statut === 'ouvert' ? 'bg-sky-100 text-sky-700' : 'bg-slate-100 text-slate-600'"
                                    x-text="email.statut === 'ouvert' ? 'Ouvert' : 'Envoyé'"></span>
                            </div>
                            <p class="text-xs text-slate-500" x-text="'À: ' + email.destinataire"></p>
                            <p x-show="email.dateOuverture" class="text-xs text-sky-600 mt-1" x-text="'Ouvert le ' + email.dateOuverture"></p>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>
                <div x-show="!impaye?.historique?.length" class="text-center text-slate-400 text-sm py-8">
                  <i class="fas fa-inbox text-3xl mb-2"></i>
                  <p>Aucun historique</p>
                </div>
              </div>
            </div>
          </div>
          
        </div>
        
        <!-- Colonne droite: Métadonnées, Actions, Note personnelle -->
        <div class="lg:col-span-1 space-y-6">
          
          <!-- Métadonnées -->
          <div class="bg-slate-50 rounded-xl border border-slate-200 p-6">
            <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-4">Métadonnées</h3>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between">
                <span class="text-slate-500">Créé le</span>
                <span class="text-slate-700" x-text="impaye?.dateCreation"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-500">Importé le</span>
                <span class="text-slate-700" x-text="impaye?.dateImport"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-500">Source</span>
                <span class="text-slate-700" x-text="impaye?.source || 'ADTI'"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-500">ID interne</span>
                <span class="text-slate-700 font-mono text-xs" x-text="impaye?.id"></span>
              </div>
            </div>
          </div>
          
          <!-- Actions -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-cogs text-slate-400 mr-2"></i>Actions
              </h3>
            </div>
            <div class="p-6 space-y-4">
              
              <!-- Séquence -->
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Séquence de relance</label>
                <div class="flex items-center gap-3">
                  <select x-model="impaye.sequence" class="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500">
                    <option value="">Aucune séquence</option>
                    <option value="R1">R1 - Première relance (J+15)</option>
                    <option value="R2">R2 - Deuxième relance (J+30)</option>
                    <option value="R3">R3 - Troisième relance (J+45)</option>
                    <option value="R4">R4 - Dernière relance (J+60)</option>
                  </select>
                  <button @click="changerSequence()" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
                    <i class="fas fa-save"></i>
                  </button>
                </div>
                <p x-show="impaye.sequence" class="text-xs text-slate-500 mt-2">
                  <i class="fas fa-info-circle mr-1"></i>Prochaine relance prévue le <span x-text="impaye?.prochaineRelance"></span>
                </p>
              </div>
              
              <!-- Actions suspendre/pause -->
              <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-100">
                <template x-if="impaye?.statut !== 'suspendue'">
                  <button @click="showSuspendForm = true" class="flex items-center justify-center gap-2 p-3 border-2 border-sky-200 rounded-xl hover:bg-sky-50 transition-all text-left">
                    <div class="w-10 h-10 rounded-lg bg-sky-100 flex items-center justify-center text-sky-600">
                      <i class="fas fa-pause"></i>
                    </div>
                    <div>
                      <p class="font-medium text-slate-900 text-sm">Suspendre</p>
                      <p class="text-xs text-slate-500">Empêcher les relances</p>
                    </div>
                  </button>
                </template>
                <template x-if="impaye?.statut === 'suspendue'">
                  <button @click="showUnsuspendConfirm = true" class="flex items-center justify-center gap-2 p-3 border-2 border-sky-200 rounded-xl hover:bg-sky-50 transition-all text-left">
                    <div class="w-10 h-10 rounded-lg bg-sky-100 flex items-center justify-center text-sky-600">
                      <i class="fas fa-play"></i>
                    </div>
                    <div>
                      <p class="font-medium text-slate-900 text-sm">Réactiver</p>
                      <p class="text-xs text-slate-500">Reprendre les relances</p>
                    </div>
                  </button>
                </template>
                
                <button @click="showBlacklistConfirm = true" class="flex items-center justify-center gap-2 p-3 border-2 border-sky-200 rounded-xl hover:bg-sky-50 transition-all text-left" :disabled="impaye?.blacklisted">
                  <div class="w-10 h-10 rounded-lg bg-sky-100 flex items-center justify-center text-sky-600">
                    <i class="fas fa-ban"></i>
                  </div>
                  <div>
                    <p class="font-medium text-slate-900 text-sm">Blacklister</p>
                    <p class="text-xs text-slate-500">Bloquer définitivement</p>
                  </div>
                </button>
              </div>
              
            </div>
          </div>
          
          <!-- Formulaire de suspension -->
          <div x-show="showSuspendForm" x-collapse class="bg-sky-50 border border-sky-200 rounded-xl p-6">
            <div class="flex items-center gap-2 mb-4">
              <i class="fas fa-pause-circle text-sky-500"></i>
              <h3 class="font-semibold text-sky-900">Suspendre les relances</h3>
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-sky-900 mb-1.5">Motif de suspension *</label>
                <select x-model="suspendForm.motif" class="w-full px-3 py-2 bg-white border border-sky-200 rounded-lg text-sm">
                  <option value="">Choisir un motif...</option>
                  <option value="litige">Litige en cours</option>
                  <option value="arrangement">Arrangement avec le client</option>
                  <option value="procedure">Procédure judiciaire</option>
                  <option value="cessation">Cessation d'activité</option>
                  <option value="autre">Autre</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-sky-900 mb-1.5">Détail (optionnel)</label>
                <textarea x-model="suspendForm.detail" rows="3" class="w-full px-3 py-2 bg-white border border-sky-200 rounded-lg text-sm" placeholder="Précisez si nécessaire..."></textarea>
              </div>
              <div class="flex items-center justify-end gap-2">
                <button @click="showSuspendForm = false" class="px-4 py-2 text-sky-700 hover:bg-sky-100 rounded-lg text-sm font-medium">Annuler</button>
                <button @click="suspendImpaye()" :disabled="!suspendForm.motif" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white rounded-lg text-sm font-medium">
                  Confirmer la suspension
                </button>
              </div>
            </div>
          </div>
          
          <!-- Note personnelle -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">
                <i class="fas fa-sticky-note text-slate-400 mr-2"></i>Note personnelle
              </h3>
            </div>
            <div class="p-6">
              <textarea x-model="impaye.note" rows="4" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500" placeholder="Ajouter une note personnelle sur cette facture..."></textarea>
              <button @click="saveNote()" class="mt-3 px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-lg text-sm font-medium">
                <i class="fas fa-save mr-1"></i>Enregistrer la note
              </button>
            </div>
          </div>
          
        </div>
        
      </div>
    </template>
    
    <!-- Modal Confirmation Désuspension -->
    <div x-show="showUnsuspendConfirm" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" x-transition.opacity>
      <div class="absolute inset-0 bg-slate-500/75" @click="showUnsuspendConfirm = false"></div>
      <div class="relative bg-white rounded-xl shadow-xl max-w-md w-full p-6" x-transition.scale>
        <div class="text-center mb-6">
          <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center mx-auto mb-3">
            <i class="fas fa-play text-sky-600 text-xl"></i>
          </div>
          <h3 class="text-lg font-semibold text-slate-900 mb-2">Réactiver les relances ?</h3>
          <p class="text-sm text-slate-600">La facture sera à nouveau éligible aux relances automatiques.</p>
        </div>
        <div class="flex items-center justify-center gap-2">
          <button @click="showUnsuspendConfirm = false" class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg text-sm font-medium">Annuler</button>
          <button @click="unsuspendImpaye()" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
            <i class="fas fa-check mr-1"></i>Confirmer
          </button>
        </div>
      </div>
    </div>
    
    <!-- Modal Confirmation Blacklist -->
    <div x-show="showBlacklistConfirm" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" x-transition.opacity>
      <div class="absolute inset-0 bg-slate-500/75" @click="showBlacklistConfirm = false"></div>
      <div class="relative bg-white rounded-xl shadow-xl max-w-md w-full p-6" x-transition.scale>
        <div class="text-center mb-6">
          <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center mx-auto mb-3">
            <i class="fas fa-ban text-sky-600 text-xl"></i>
          </div>
          <h3 class="text-lg font-semibold text-slate-900 mb-2">Blacklister cette facture ?</h3>
          <p class="text-sm text-slate-600">Le payeur ne recevra plus aucune relance pour cette facture. Cette action est irréversible.</p>
        </div>
        <div class="flex items-center justify-center gap-2">
          <button @click="showBlacklistConfirm = false" class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg text-sm font-medium">Annuler</button>
          <button @click="blacklistImpaye()" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white rounded-lg text-sm font-medium">
            <i class="fas fa-ban mr-1"></i>Blacklister
          </button>
        </div>
      </div>
    </div>
    
    <!-- Modal Ajouter Intervention -->
    <div x-show="showAddInterventionModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" x-transition.opacity>
      <div class="absolute inset-0 bg-slate-500/75" @click="showAddInterventionModal = false"></div>
      <div class="relative bg-white rounded-xl shadow-xl max-w-md w-full p-6" x-transition.scale>
        <h3 class="text-lg font-semibold text-slate-900 mb-4">
          <i class="fas fa-tools text-sky-500 mr-2"></i>Nouvelle intervention
        </h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Type d'intervention *</label>
            <select x-model="newIntervention.type" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm">
              <option value="">Choisir...</option>
              <option value="Visite sur site">Visite sur site</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Réparation">Réparation</option>
              <option value="Installation">Installation</option>
              <option value="Contrôle">Contrôle</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Agent *</label>
            <input type="text" x-model="newIntervention.agent" placeholder="Nom de l'agent" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Date *</label>
            <input type="date" x-model="newIntervention.date" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Bien concerné</label>
            <input type="text" x-model="newIntervention.bien" placeholder="Ex: Bureaux étage 2" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
            <textarea x-model="newIntervention.description" rows="3" placeholder="Détails de l'intervention..." class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm"></textarea>
          </div>
        </div>
        <div class="flex items-center justify-end gap-2 mt-6">
          <button @click="showAddInterventionModal = false" class="px-4 py-2 text-slate-700 hover:bg-slate-100 rounded-lg text-sm font-medium">Annuler</button>
          <button @click="saveIntervention()" :disabled="!newIntervention.type || !newIntervention.agent || !newIntervention.date" class="px-4 py-2 bg-sky-500 hover:bg-sky-600 disabled:bg-slate-300 text-white rounded-lg text-sm font-medium">
            <i class="fas fa-save mr-1"></i>Enregistrer
          </button>
        </div>
      </div>
    </div>
    
  </main>
</div>

<script>
function impayeDetailPage() {
  return {
    toast: { show: false, type: 'success', title: '', message: '' },
    loading: true,
    showSuspendForm: false,
    showUnsuspendConfirm: false,
    showBlacklistConfirm: false,
    showAddInterventionModal: false,
    
    suspendForm: { motif: '', detail: '' },
    newIntervention: { type: '', agent: '', date: '', bien: '', description: '' },
    
    impaye: {
      id: 1,
      numero: 'FAC-2024-001',
      numeroDossier: 'D-2024-045',
      dateFacture: '15/01/2024',
      echeance: '15/02/2024',
      joursRetard: 45,
      montant: 12500,
      resteAPayer: 8500,
      tauxPaye: 32,
      statut: 'en-relance',
      sequence: 'R2',
      prochaineRelance: '05/04/2024',
      note: '',
      blacklisted: false,
      dateCreation: '15/01/2024 10:30',
      dateImport: '16/01/2024 08:15',
      source: 'ADTI',
      bien: {
        adresse: '12 Rue de la Paix, 75002 Paris',
        type: 'Bureaux',
        surface: '250 m²'
      },
      missions: [
        { type: 'Diagnostic amiante', dateIntervention: '10/01/2024', description: 'Diagnostic réglementaire avant travaux' },
        { type: 'DPE', dateIntervention: '12/01/2024', description: 'Diagnostic de performance énergétique' }
      ],
      payeur: {
        nom: 'Jean Dupont',
        entreprise: 'ACME Corp',
        email: 'contact@acme.fr',
        emailForce: 'finance@acme.fr',
        telephone: '01 23 45 67 89',
        adresse: '123 Rue de Paris, 75001 Paris',
        initials: 'JD'
      },
      apporteur: {
        nom: 'Agence Immo Plus',
        email: 'contact@agenceplus.fr',
        telephone: '01 98 76 54 32',
        initials: 'AI'
      },
      proprietaire: {
        nom: 'M. Martin Dupont',
        email: 'm.dupont@email.fr',
        initials: 'MD'
      },
      historique: [
        { 
          type: 'relance', 
          icon: 'fa-paper-plane', 
          titre: 'Relance R2 envoyée', 
          date: '15/03/2024', 
          description: 'Email envoyé à contact@acme.fr',
          emails: [
            { id: 1, sujet: 'Relance - Facture FAC-2024-001 impayée', destinataire: 'contact@acme.fr', statut: 'ouvert', dateOuverture: '15/03/2024 10:23' }
          ]
        },
        { 
          type: 'paiement', 
          icon: 'fa-euro-sign', 
          titre: 'Paiement partiel reçu', 
          date: '10/03/2024', 
          description: '4 000,00 € reçus par virement' 
        },
        { 
          type: 'relance', 
          icon: 'fa-paper-plane', 
          titre: 'Relance R1 envoyée', 
          date: '01/03/2024', 
          description: 'Email envoyé à contact@acme.fr',
          emails: [
            { id: 2, sujet: 'Rappel - Votre facture est arrivée à échéance', destinataire: 'contact@acme.fr', statut: 'ouvert', dateOuverture: '02/03/2024 09:15' }
          ]
        },
        { 
          type: 'systeme', 
          icon: 'fa-file-import', 
          titre: 'Facture importée', 
          date: '16/01/2024', 
          description: 'Import automatique depuis ADTI' 
        }
      ],
      interventions: [
        {
          type: 'Maintenance',
          date: '10/02/2024',
          agent: 'Pierre Martin',
          bien: 'Bureaux étage 2',
          description: 'Révision annuelle du système de climatisation'
        },
        {
          type: 'Visite sur site',
          date: '15/01/2024',
          agent: 'Marie Dubois',
          bien: 'Salle de réunion',
          description: 'Mise en place du nouveau équipement audiovisuel'
        }
      ]
    },
    
    init() {
      // Simuler le chargement depuis l'URL /impayes/id
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      console.log('Chargement impayé ID:', id);
      
      setTimeout(() => {
        this.loading = false;
      }, 500);
    },
    
    changerSequence() {
      this.showToast('Séquence mise à jour', this.impaye.sequence, 'success');
      // Ajouter à l'historique
      this.impaye.historique.unshift({
        type: 'systeme',
        icon: 'fa-exchange-alt',
        titre: 'Séquence modifiée',
        date: new Date().toLocaleDateString('fr-FR'),
        description: 'Nouvelle séquence : ' + this.impaye.sequence
      });
    },
    
    suspendImpaye() {
      this.impaye.statut = 'suspendue';
      this.showSuspendForm = false;
      this.impaye.historique.unshift({
        type: 'suspension',
        icon: 'fa-pause',
        titre: 'Facture suspendue',
        date: new Date().toLocaleDateString('fr-FR'),
        description: 'Motif : ' + this.suspendForm.motif
      });
      this.showToast('Succès', 'Facture suspendue avec succès', 'success');
    },
    
    unsuspendImpaye() {
      this.impaye.statut = 'en-relance';
      this.showUnsuspendConfirm = false;
      this.impaye.historique.unshift({
        type: 'systeme',
        icon: 'fa-play',
        titre: 'Facture réactivée',
        date: new Date().toLocaleDateString('fr-FR'),
        description: 'Les relances sont à nouveau actives'
      });
      this.showToast('Succès', 'Facture réactivée avec succès', 'success');
    },
    
    blacklistImpaye() {
      this.impaye.blacklisted = true;
      this.impaye.statut = 'suspendue';
      this.showBlacklistConfirm = false;
      this.impaye.historique.unshift({
        type: 'suspension',
        icon: 'fa-ban',
        titre: 'Payeur blacklisted',
        date: new Date().toLocaleDateString('fr-FR'),
        description: 'Aucune relance ne sera plus envoyée'
      });
      this.showToast('Succès', 'Payeur blacklisted avec succès', 'success');
    },
    
    saveNote() {
      this.showToast('Succès', 'Note enregistrée avec succès', 'success');
    },
    
    addIntervention() {
      this.newIntervention = { type: '', agent: '', date: new Date().toISOString().split('T')[0], bien: '', description: '' };
      this.showAddInterventionModal = true;
    },
    
    saveIntervention() {
      if (!this.impaye.interventions) {
        this.impaye.interventions = [];
      }
      this.impaye.interventions.unshift({...this.newIntervention});
      this.showAddInterventionModal = false;
      this.showToast('Succès', 'Intervention enregistrée avec succès', 'success');
    },
    
    openPdf() {
      this.showToast('Info', 'Ouverture du PDF...', 'success');
    },
    
    getStatutLabel(statut) {
      const labels = { 'non-payee': 'Non payée', 'en-relance': 'En relance', 'suspendue': 'Suspendue' };
      return labels[statut] || statut;
    },
    
    formatMoney(amount) {
      return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
    },
    
    showToast(title, message, type = 'success') {
      this.toast = { show: true, title, message, type };
      setTimeout(() => this.toast.show = false, 3000);
    }
  }
}
</script>


    <!-- Toast Notification -->
    <div x-show="toast.show" x-transition class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50">
      <i :class="toast.type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'" class="fas"></i>
      <div>
        <p class="font-medium text-sm" x-text="toast.title"></p>
        <p class="text-xs text-slate-300" x-text="toast.message"></p>
      </div>
    </div>
</body>
</html>
