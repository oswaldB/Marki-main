<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lien expiré | Portail Client</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center">

  <!-- Écran Lien Temporaire Expiré -->
  <div class="text-center max-w-md px-6 py-12">
    <!-- Icon -->
    <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <i class="fas fa-clock text-amber-500 text-3xl"></i>
    </div>
    
    <!-- Titre -->
    <h1 class="text-2xl font-bold text-slate-900 mb-3">
      Lien temporaire expiré
    </h1>
    
    <!-- Message -->
    <p class="text-slate-600 mb-8 leading-relaxed">
      Merci d'utiliser celui reçu par email pour en générer un nouveau et voir vos documents.
    </p>
    
    <!-- Action -->
    <div class="space-y-3">
      <p class="text-sm text-slate-500">
        <i class="fas fa-envelope mr-1"></i>
        Vérifiez votre boîte de réception ou vos spams
      </p>
      
      <div class="pt-4 border-t border-slate-200">
        <p class="text-xs text-slate-400 mb-2">Besoin d'aide ?</p>
        <a href="mailto:contact@marki.fr" class="text-sm text-sky-600 hover:text-sky-700 font-medium">
          <i class="fas fa-envelope mr-1"></i>
          contact@marki.fr
        </a>
      </div>
    </div>
  </div>

</body>
</html>
